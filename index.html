<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星云漩涡 | 螺旋星轨 · 黑洞吞噬小星辰</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            color: white;
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 22px;
            z-index: 100;
            border: 1px solid rgba(200, 100, 255, 0.7);
            pointer-events: none;
            font-family: monospace;
            max-width: 360px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .info-panel h1 {
            margin: 0 0 5px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #c084fc, #f0a3ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .info-panel p { margin: 4px 0; font-size: 0.8rem; opacity: 0.9; }
        .quote { font-style: italic; font-size: 0.75rem; border-top: 1px solid rgba(200,100,255,0.4); margin-top: 8px; padding-top: 6px; }
        
        .controls-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #ccc;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        
        .music-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #d4a5ff;
            cursor: pointer;
            z-index: 100;
            border: 1px solid #a855f7;
            font-family: monospace;
            transition: 0.2s;
            pointer-events: auto;
            font-weight: 500;
        }
        .music-btn:hover {
            background: #a855f7;
            color: black;
            transform: scale(1.02);
        }
        
        .star-label {
            background: radial-gradient(circle, rgba(80, 40, 140, 0.92), rgba(40, 20, 80, 0.88));
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid rgba(200, 120, 255, 0.7);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Segoe UI', monospace;
            box-shadow: 0 0 20px rgba(160, 80, 255, 0.4);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .star-label:hover {
            transform: scale(1.1);
            background: radial-gradient(circle, rgba(120, 70, 220, 0.98), rgba(80, 40, 140, 0.92));
            border-color: #ffaaee;
            box-shadow: 0 0 40px rgba(200, 100, 255, 1);
        }
        .star-label small {
            font-size: 9px;
            opacity: 0.85;
            font-weight: normal;
        }
        
        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            color: #e2b0ff;
            border-top: 2px solid #c084fc;
            z-index: 200;
            font-size: 0.85rem;
            text-align: center;
            white-space: nowrap;
            font-family: monospace;
            transition: opacity 0.3s;
            pointer-events: none;
            font-weight: 500;
        }
        
        @media (max-width: 700px) {
            .star-label { font-size: 10px; padding: 4px 12px; }
            .info-panel { padding: 8px 15px; max-width: 260px; font-size: 11px; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🌀 螺旋星轨 · 黑洞吞噬</h1>
        <p>✨ 高中开发者 | 星辰造物主 ✨</p>
        <p>📡 小星星沿螺旋路径缓缓坠入黑洞</p>
        <div class="quote" id="hitokoto-display">🌠 螺旋星轨，星辰如缕，被引力之渊缓缓吞噬...</div>
    </div>
    <div class="controls-hint">
        🖱️ 鼠标拖拽旋转视角 | 右键平移 | 滚动缩放 | ✨ 点击大星星探索作品 ✨ | 🌟 小星星沿螺旋轨道坠入黑洞
    </div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊旋律 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020005);
        scene.fog = new THREE.FogExp2(0x020005, 0.00015);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(8, 6, 26);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        controls.update();
        
        // ================= 1. 黑洞建模 (深邃宏伟) =================
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, 128, 128),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.03, metalness: 0.96, emissive: 0x330033, emissiveIntensity: 0.85 })
        );
        scene.add(blackHoleCore);
        
        // 内吸积盘 (高速旋转)
        const innerAcc = new THREE.Mesh(
            new THREE.TorusGeometry(2.25, 0.12, 96, 280),
            new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288, emissiveIntensity: 1.2, transparent: true })
        );
        innerAcc.rotation.x = Math.PI / 2 + 0.2;
        scene.add(innerAcc);
        
        const midAcc = new THREE.Mesh(
            new THREE.TorusGeometry(2.9, 0.14, 110, 320),
            new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0xcc44aa, emissiveIntensity: 0.95, transparent: true })
        );
        midAcc.rotation.x = Math.PI / 2 - 0.05;
        scene.add(midAcc);
        
        const outerAcc = new THREE.Mesh(
            new THREE.TorusGeometry(3.6, 0.16, 120, 360),
            new THREE.MeshStandardMaterial({ color: 0xcc88ff, emissive: 0x8844cc, emissiveIntensity: 0.75, transparent: true })
        );
        outerAcc.rotation.x = Math.PI / 2 + 0.08;
        scene.add(outerAcc);
        
        // 黑洞光晕
        const eventHorizonGlow = new THREE.Mesh(
            new THREE.SphereGeometry(2.0, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xaa44ff, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending })
        );
        scene.add(eventHorizonGlow);
        
        // 周围粒子晕
        const dustCount = 4000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = [];
        for (let i = 0; i < dustCount; i++) {
            const r = 1.8 + Math.random() * 2.3;
            const ang = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.3;
            dustPos.push(Math.cos(ang) * r, yOff, Math.sin(ang) * r);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xff88dd, size: 0.05, blending: THREE.AdditiveBlending });
        const dustRing = new THREE.Points(dustGeo, dustMat);
        scene.add(dustRing);
        
        // 黑洞标签
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 奇点深渊 🌀<br><small>「引力之渊 | 螺旋星轨的终点」</small>`;
        blackHoleDiv.style.background = "rgba(0,0,0,0.85)";
        blackHoleDiv.style.border = "2px solid #ff44aa";
        blackHoleDiv.style.pointerEvents = "none";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 1.7, 0);
        scene.add(blackHoleLabel);
        
        // 光源
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        const coreLight = new THREE.PointLight(0xff55cc, 1.4, 35);
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);
        const fillLight = new THREE.PointLight(0x8866ff, 0.7);
        fillLight.position.set(5, 4, 6);
        scene.add(fillLight);
        
        // ================= 2. 星云粒子系统 (装饰，缓慢旋转) =================
        const nebulaCount = 12000;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPosArr = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            const radius = 5 + Math.pow(Math.random(), 1.3) * 38;
            const angle = Math.random() * Math.PI * 2;
            const spiral = radius * 0.35;
            const finalAngle = angle + spiral;
            const yVal = Math.sin(radius * 0.55) * 1.5 + (Math.random() - 0.5) * 1.8;
            nebulaPosArr[i*3] = Math.cos(finalAngle) * radius;
            nebulaPosArr[i*3+1] = yVal * (1 - radius / 45);
            nebulaPosArr[i*3+2] = Math.sin(finalAngle) * radius;
            const mix = Math.min(1, radius / 30);
            nebulaColors[i*3] = 0.55 + mix * 0.4;
            nebulaColors[i*3+1] = 0.35 + mix * 0.45;
            nebulaColors[i*3+2] = 0.85 + mix * 0.15;
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPosArr, 3));
        nebulaGeom.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        const nebulaMat = new THREE.PointsMaterial({ size: 0.085, vertexColors: true, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
        const nebulaCloud = new THREE.Points(nebulaGeom, nebulaMat);
        scene.add(nebulaCloud);
        
        // 背景繁星
        const bgStarCount = 7000;
        const bgStarGeom = new THREE.BufferGeometry();
        const bgStarPos = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            bgStarPos[i*3] = (Math.random() - 0.5) * 320;
            bgStarPos[i*3+1] = (Math.random() - 0.5) * 180;
            bgStarPos[i*3+2] = (Math.random() - 0.5) * 200 - 80;
        }
        bgStarGeom.setAttribute('position', new THREE.BufferAttribute(bgStarPos, 3));
        const bgStarMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.1, transparent: true, opacity: 0.55 });
        const bgStars = new THREE.Points(bgStarGeom, bgStarMat);
        scene.add(bgStars);
        
        // ================= 3. 大星星 (作品) 分布在外围轨道，不受黑洞影响 =================
        const worksData = [
            { name: "💻 星轨编译器", desc: "Python字节码分析 · 可视化执行流", link: "https://github.com/fallingmeteorite/star-compiler", color: 0x6c9eff, icon: "🪐" },
            { name: "🎮 流光·虚幻引擎", desc: "UE5开放世界 · 动态星空粒子系统", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0x88ddff, icon: "✨" },
            { name: "🔧 逆向星芒", desc: "软件逆向分析笔记 & CTF 实战库", link: "https://github.com/fallingmeteorite/reverse-constellation", color: 0xdd88aa, icon: "⚙️" },
            { name: "🤖 星尘·嵌入式OS", desc: "STM32微型实时系统 · 星图显示", link: "https://github.com/fallingmeteorite/stardust-rtos", color: 0x77cc88, icon: "📡" },
            { name: "📡 流星信标", desc: "全栈导航站 + 动态星空API", link: "https://github.com/fallingmeteorite/meteor-beacon", color: 0xffaa88, icon: "🌠" },
            { name: "🎨 光源AI绘画", desc: "AI创意工具 · 社区生成平台", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0xdd99ff, icon: "🎨" },
            { name: "🌌 星尘档案馆", desc: "全部开源项目索引与开发日志", link: "https://github.com/fallingmeteorite", color: 0xccccdd, icon: "⭐" },
            { name: "🌀 黑洞边缘实验室", desc: "WebGL奇幻交互实验 & 粒子系统", link: "https://github.com/fallingmeteorite/horizon-lab", color: 0xff99cc, icon: "🌌" },
            { name: "📖 星海博客", desc: "技术随笔与星空哲思", link: "https://fallingmeteorite.github.io", color: 0xffaa77, icon: "📖" },
            { name: "🔮 幻境渲染器", desc: "实时体积光与星云渲染", link: "https://github.com/fallingmeteorite/nebula-render", color: 0x77aaff, icon: "🔮" }
        ];
        
        function createStarShape(color, size = 0.42) {
            const geometry = new THREE.IcosahedronGeometry(size, 0);
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i], y = positions[i+1], z = positions[i+2];
                const len = Math.sqrt(x*x + y*y + z*z);
                const spike = 1 + Math.sin(len * 7) * 0.18;
                positions[i] = x * spike;
                positions[i+1] = y * spike;
                positions[i+2] = z * spike;
            }
            geometry.computeVertexNormals();
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.68, metalness: 0.4, roughness: 0.22 });
            return new THREE.Mesh(geometry, material);
        }
        
        class BigStar {
            constructor(data) {
                this.data = data;
                const radius = 13 + Math.random() * 28;
                const angle = Math.random() * Math.PI * 2;
                this.radius = radius;
                this.angle = angle;
                this.yOffset = (Math.random() - 0.5) * 2.5;
                this.orbitSpeed = 0.00045 + Math.random() * 0.00065;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset;
                
                this.mesh = createStarShape(data.color, 0.42 + Math.random() * 0.1);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                
                this.glowLight = new THREE.PointLight(data.color, 0.75, 15);
                this.mesh.add(this.glowLight);
                
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc.substring(0, 28)}…</small>`;
                div.style.pointerEvents = 'auto';
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast(data.name, data.desc, data.link);
                    this.mesh.material.emissiveIntensity = 1.5;
                    this.glowLight.intensity = 1.3;
                    setTimeout(() => {
                        this.mesh.material.emissiveIntensity = 0.68;
                        this.glowLight.intensity = 0.75;
                    }, 450);
                });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.65, this.z);
                scene.add(this.label);
            }
            update(time) {
                this.angle += this.orbitSpeed;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(time * 0.0007) * 0.1;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.7, this.z);
                this.mesh.rotation.y += 0.002;
                this.mesh.rotation.x += 0.001;
                const breath = 0.6 + Math.sin(time * 0.002) * 0.2;
                this.glowLight.intensity = 0.6 + breath * 0.2;
            }
        }
        
        const bigStars = worksData.map(d => new BigStar(d));
        
        // ================= 4. 小星星：沿螺旋路径慢慢靠近黑洞，被销毁 =================
        // 螺旋路径公式：半径逐渐减小，角度加速旋转，模拟被引力吸入
        const SMALL_STAR_COUNT = 2200;
        const DESTROY_RADIUS = 2.2; // 到达这个半径就被销毁
        
        class SpiralStar {
            constructor() {
                this.reset();
            }
            
            reset() {
                // 初始半径：分布在外围 12 到 42 之间
                this.radius = 12 + Math.random() * 32;
                // 初始角度随机
                this.angle = Math.random() * Math.PI * 2;
                // 添加螺旋偏移，让星星分布更自然
                const spiralOffset = this.radius * 0.2;
                this.angle += spiralOffset;
                // Y轴偏移：随半径减小而趋向0，模拟被拉向赤道面
                this.yOffset = (Math.random() - 0.5) * 2.8;
                
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset * (this.radius / 30);
                
                // 径向坠落速度 (半径减小速度) - 缓慢但可见
                this.fallSpeed = 0.0012 + Math.random() * 0.002;
                // 角速度基础值，半径越小角速度越快（螺旋加速）
                this.baseAngularSpeed = 0.004 + Math.random() * 0.006;
                
                // 创建星星网格 (小多面体，更精致)
                const geom = Math.random() > 0.6 ? new THREE.IcosahedronGeometry(0.11 + Math.random() * 0.08, 0) : new THREE.DodecahedronGeometry(0.1 + Math.random() * 0.07, 0);
                const hue = 0.55 + Math.random() * 0.3;
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(hue, 0.9, 0.65),
                    emissive: 0xaa88ff,
                    emissiveIntensity: 0.45,
                    metalness: 0.2,
                    roughness: 0.3
                });
                if (this.mesh) scene.remove(this.mesh);
                this.mesh = new THREE.Mesh(geom, material);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                this.active = true;
                // 记录初始颜色用于渐变
                this.initialColor = new THREE.Color().setHSL(hue, 0.9, 0.65);
            }
            
            update() {
                if (!this.active) return false;
                
                // 半径逐渐减小 (向黑洞坠落)
                this.radius -= this.fallSpeed;
                
                // 角速度随半径减小而增加 (螺旋加速效果)
                const angularSpeed = this.baseAngularSpeed * (1 + (1 - Math.min(1, this.radius / 10)) * 1.5);
                this.angle += angularSpeed;
                
                // 到达销毁半径
                if (this.radius <= DESTROY_RADIUS) {
                    this.destroy();
                    return false;
                }
                
                // 计算新位置
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                // Y轴逐渐向赤道面靠拢
                this.y = this.yOffset * (this.radius / 30) * 0.7;
                this.mesh.position.set(this.x, this.y, this.z);
                
                // 自转
                this.mesh.rotation.x += 0.03;
                this.mesh.rotation.y += 0.04;
                
                // 靠近黑洞时变红变亮
                const proximity = Math.max(0, Math.min(1, (this.radius - 2.5) / 12));
                const intensity = 0.35 + (1 - proximity) * 0.9;
                this.mesh.material.emissiveIntensity = 0.3 + (1 - proximity) * 0.85;
                
                if (this.radius < 5.5) {
                    const hotMix = 1 - (this.radius - 2.2) / 3.5;
                    this.mesh.material.color.setRGB(1.0, 0.4 + hotMix * 0.5, 0.2 + hotMix * 0.5);
                } else {
                    this.mesh.material.color = this.initialColor;
                }
                
                return true;
            }
            
            destroy() {
                this.active = false;
                // 创建销毁特效：星星碎裂并被吸入
                createDestructionEffect(this.mesh.position.clone());
                scene.remove(this.mesh);
                // 在远处重生新的小星星，保持总数稳定
                setTimeout(() => {
                    const newStar = new SpiralStar();
                    spiralStars.push(newStar);
                }, 40);
            }
        }
        
        // 销毁特效：星星爆裂成粒子螺旋吸入黑洞
        function createDestructionEffect(position) {
            const particleCount = 80;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 0.8;
                positions[i*3+1] = (Math.random() - 0.5) * 0.8;
                positions[i*3+2] = (Math.random() - 0.5) * 0.8;
                velocities.push({
                    x: (Math.random() - 0.5) * 0.15,
                    y: (Math.random() - 0.5) * 0.15,
                    z: (Math.random() - 0.5) * 0.15
                });
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.07, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geom, mat);
            particles.position.copy(position);
            scene.add(particles);
            
            let progress = 0;
            const startPos = position.clone();
            const endPos = new THREE.Vector3(0, 0, 0);
            
            function animateDestroy() {
                progress += 0.08;
                if (progress >= 1) {
                    scene.remove(particles);
                    return;
                }
                const t = Math.pow(progress, 0.7);
                particles.position.lerpVectors(startPos, endPos, t);
                particles.scale.setScalar(1 - t * 0.85);
                particles.rotation.z += 0.12;
                particles.rotation.x += 0.08;
                requestAnimationFrame(animateDestroy);
            }
            requestAnimationFrame(animateDestroy);
            
            // 额外添加一圈光晕
            const glowRing = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xff8866, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending })
            );
            glowRing.position.copy(position);
            scene.add(glowRing);
            let glowScale = 1;
            function animateGlow() {
                glowScale += 0.08;
                glowRing.scale.setScalar(glowScale);
                glowRing.material.opacity = 0.8 - (glowScale - 1) * 0.6;
                if (glowScale > 2.5) {
                    scene.remove(glowRing);
                    return;
                }
                requestAnimationFrame(animateGlow);
            }
            requestAnimationFrame(animateGlow);
        }
        
        // 创建螺旋小星星群
        let spiralStars = [];
        for (let i = 0; i < SMALL_STAR_COUNT; i++) {
            spiralStars.push(new SpiralStar());
        }
        
        // 额外：生成螺旋轨迹的视觉辅助 (几缕可见的螺旋光带，增强视觉效果)
        const trailCount = 8;
        const trailMeshes = [];
        for (let i = 0; i < trailCount; i++) {
            const points = [];
            const startR = 28;
            const endR = 2.5;
            const angleOffset = (i / trailCount) * Math.PI * 2;
            for (let r = startR; r > endR; r -= 0.35) {
                const angle = angleOffset + (startR - r) * 0.45;
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;
                const y = Math.sin(r * 0.3) * 0.8;
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0xaa66ff, transparent: true, opacity: 0.25 });
            const trailLine = new THREE.Line(lineGeo, lineMat);
            scene.add(trailLine);
            trailMeshes.push(trailLine);
        }
        
        // ================= 音乐系统 =================
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.4;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        
        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(e => console.log("需要交互"));
            }
        }
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(err => console.log(err));
            } else {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                } else {
                    bgMusic.pause();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔇";
                }
            }
        });
        
        function showToast(title, desc, url) {
            let old = document.getElementById('dynamicToast');
            if(old) old.remove();
            const toast = document.createElement('div');
            toast.id = 'dynamicToast';
            toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将打开链接`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1800);
            setTimeout(() => toast.remove(), 2300);
            if(url) setTimeout(() => window.open(url, '_blank'), 700);
        }
        
        fetch('https://v1.hitokoto.cn')
            .then(res => res.json())
            .then(data => document.getElementById('hitokoto-display').innerHTML = `🌠 “${data.hitokoto}” — ${data.from}`)
            .catch(() => document.getElementById('hitokoto-display').innerHTML = '🌀 螺旋星轨，星辰缓缓坠入奇点');
        
        // ================= 动画循环 =================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            
            // 更新大星星
            bigStars.forEach(star => star.update(time));
            
            // 更新螺旋小星星
            for (let i = spiralStars.length - 1; i >= 0; i--) {
                const star = spiralStars[i];
                const alive = star.update();
                if (!alive) {
                    spiralStars.splice(i, 1);
                }
            }
            
            // 星云缓慢旋转
            nebulaCloud.rotation.y += 0.0005;
            
            // 黑洞吸积盘旋转
            innerAcc.rotation.z += 0.011;
            midAcc.rotation.z -= 0.008;
            outerAcc.rotation.z += 0.006;
            dustRing.rotation.y += 0.004;
            
            // 黑洞脉动
            const pulse = 1 + Math.sin(time * 0.004) * 0.012;
            blackHoleCore.scale.set(pulse, pulse, pulse);
            eventHorizonGlow.scale.setScalar(1 + Math.sin(time * 0.005) * 0.025);
            coreLight.intensity = 1.0 + Math.sin(time * 0.0035) * 0.3;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("%c✨ 螺旋星轨效果 | 小星星沿螺旋路径慢慢坠入黑洞 | 到达中心后被销毁并重生 ✨", "color: #ffaa88; font-size: 14px");
    </script>
</body>
</html>
