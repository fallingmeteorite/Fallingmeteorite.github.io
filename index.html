<body>
    <div class="info-panel">
        <h1>🌀 四条螺旋支路 · 星辰归墟</h1>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"

    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010003);
        scene.fog = new THREE.FogExp2(0x010003, 0.0001);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(10, 8, 22);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        controls.update();
        
        // ================= 1. 黑洞建模 =================
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.7, 128, 128),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.02, metalness: 0.98, emissive: 0x330033, emissiveIntensity: 0.95 })
        );
        scene.add(blackHoleCore);
        
        // 吸积盘
        const innerAcc = new THREE.Mesh(
            new THREE.TorusGeometry(2.35, 0.13, 100, 300),
            new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288, emissiveIntensity: 1.3, transparent: true })
        );
        innerAcc.rotation.x = Math.PI / 2 + 0.2;
        scene.add(innerAcc);
        
        const midAcc = new THREE.Mesh(
            new THREE.TorusGeometry(3.0, 0.15, 120, 340),
            new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0xcc44aa, emissiveIntensity: 1.0, transparent: true })
        );
        midAcc.rotation.x = Math.PI / 2 - 0.05;
        scene.add(midAcc);
        
        const outerAcc = new THREE.Mesh(
            new THREE.TorusGeometry(3.8, 0.17, 130, 380),
            new THREE.MeshStandardMaterial({ color: 0xcc88ff, emissive: 0x8844cc, emissiveIntensity: 0.8, transparent: true })
        );
        outerAcc.rotation.x = Math.PI / 2 + 0.08;
        scene.add(outerAcc);
        
        // 黑洞光晕
        const eventHorizonGlow = new THREE.Mesh(
            new THREE.SphereGeometry(2.1, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xaa44ff, transparent: true, opacity: 0.22, blending: THREE.AdditiveBlending })
        );
        scene.add(eventHorizonGlow);
        
        // 周围粒子晕
        const dustCount = 4500;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = [];
        for (let i = 0; i < dustCount; i++) {
            const r = 1.8 + Math.random() * 2.5;
            const ang = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.4;
            dustPos.push(Math.cos(ang) * r, yOff, Math.sin(ang) * r);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xff88dd, size: 0.055, blending: THREE.AdditiveBlending });
        const dustRing = new THREE.Points(dustGeo, dustMat);
        scene.add(dustRing);
        
        // 黑洞标签
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 奇点深渊 🌀<br><small>「四条螺旋支路的终点」</small>`;
        blackHoleDiv.style.background = "rgba(0,0,0,0.85)";
        blackHoleDiv.style.border = "2px solid #ff44aa";
        blackHoleDiv.style.pointerEvents = "none";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 1.9, 0);
        scene.add(blackHoleLabel);
        
        // 光源
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        const coreLight = new THREE.PointLight(0xff55cc, 1.5, 38);
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);
        const fillLight = new THREE.PointLight(0x8866ff, 0.7);
        fillLight.position.set(5, 4, 6);
        scene.add(fillLight);
        
        // ================= 2. 外围旋转星轨 =================
        const RING_RADIUS = 22;
        const RING_PARTICLE_COUNT = 1800;
        const ringParticles = [];
        
        // 创建外围旋转星轨的粒子环
        const ringGeo = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(RING_PARTICLE_COUNT * 3);
        const ringColors = new Float32Array(RING_PARTICLE_COUNT * 3);
        for (let i = 0; i < RING_PARTICLE_COUNT; i++) {
            const angle = (i / RING_PARTICLE_COUNT) * Math.PI * 2;
            const x = Math.cos(angle) * RING_RADIUS;
            const z = Math.sin(angle) * RING_RADIUS;
            const y = Math.sin(angle * 3) * 0.5 + (Math.random() - 0.5) * 0.6;
            ringPositions[i*3] = x;
            ringPositions[i*3+1] = y;
            ringPositions[i*3+2] = z;
            ringColors[i*3] = 0.7 + Math.random() * 0.3;
            ringColors[i*3+1] = 0.5 + Math.random() * 0.4;
            ringColors[i*3+2] = 0.9 + Math.random() * 0.1;
        }
        ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));
        ringGeo.setAttribute('color', new THREE.BufferAttribute(ringColors, 3));
        const ringMat = new THREE.PointsMaterial({ size: 0.12, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const outerRing = new THREE.Points(ringGeo, ringMat);
        scene.add(outerRing);
        
        // ================= 3. 四条螺旋支路 (从外围星轨延伸到黑洞) =================
        // 四个支路的方向角度: 45°, 135°, 225°, 315° (让支路分布在四个象限)
        const BRANCH_ANGLES = [Math.PI / 4, 3 * Math.PI / 4, 5 * Math.PI / 4, 7 * Math.PI / 4];
        const BRANCH_COLORS = [0xff66aa, 0x66ffaa, 0x66aaff, 0xffaa66];
        const BRANCH_NAMES = ["右上", "左上", "左下", "右下"];
        
        // 为每条支路创建可视化螺旋线
        const branchLines = [];
        BRANCH_ANGLES.forEach((angle, idx) => {
            const points = [];
            // 从半径 20 螺旋下降到 2.5
            for (let r = 20; r > 2.5; r -= 0.3) {
                // 螺旋角度：从起始角度开始，半径越小角度变化越大，形成螺旋效果
                const spiralAngle = angle + (20 - r) * 0.55;
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                // 添加自然的Y轴摆动
                const y = Math.sin(r * 0.8) * 0.4;
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: BRANCH_COLORS[idx], transparent: true, opacity: 0.6 });
            const spiralLine = new THREE.Line(lineGeo, lineMat);
            scene.add(spiralLine);
            branchLines.push(spiralLine);
            
            // 添加光点点缀
            const glowPoints = [];
            for (let r = 20; r > 2.8; r -= 1.2) {
                const spiralAngle = angle + (20 - r) * 0.55;
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.8) * 0.4;
                glowPoints.push(new THREE.Vector3(x, y, z));
            }
            const glowGeom = new THREE.BufferGeometry().setFromPoints(glowPoints);
            const glowMat = new THREE.PointsMaterial({ color: BRANCH_COLORS[idx], size: 0.15, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
            const glowPointsObj = new THREE.Points(glowGeom, glowMat);
            scene.add(glowPointsObj);
        });
        
        // ================= 4. 小星星：在外围星轨上生成，然后进入螺旋支路，慢慢靠近黑洞 =================
        const STARS_PER_BRANCH = 380;  // 每条支路上的星星数量
        const DESTROY_DISTANCE = 2.8;
        
        class SpiralBranchStar {
            constructor(branchIdx, startRadius) {
                this.branchIdx = branchIdx;
                this.angle = BRANCH_ANGLES[branchIdx];
                this.startRadius = startRadius || 18 + Math.random() * 8;
                this.radius = this.startRadius;
                // 坠落速度 (不同星星速度略有差异)
                this.fallSpeed = 0.0012 + Math.random() * 0.002;
                // 螺旋系数
                this.spiralFactor = 0.52 + Math.random() * 0.1;
                // 横向摆动幅度
                this.swayAmp = 0.25 + Math.random() * 0.35;
                this.swayFreq = 0.7 + Math.random() * 0.6;
                this.yAmp = 0.2 + Math.random() * 0.3;
                
                // 创建星星网格
                const geom = Math.random() > 0.6 ? 
                    new THREE.IcosahedronGeometry(0.12 + Math.random() * 0.08, 0) : 
                    new THREE.DodecahedronGeometry(0.11 + Math.random() * 0.07, 0);
                const hue = 0.55 + Math.random() * 0.35;
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(hue, 0.9, 0.65),
                    emissive: 0xaa88ff,
                    emissiveIntensity: 0.5,
                    metalness: 0.2,
                    roughness: 0.3
                });
                this.mesh = new THREE.Mesh(geom, material);
                this.updatePosition();
                scene.add(this.mesh);
                this.active = true;
                this.initialColor = new THREE.Color().setHSL(hue, 0.9, 0.65);
                this.phase = Math.random() * Math.PI * 2;
            }
            
            updatePosition() {
                // 螺旋路径：半径减小，角度随半径变化
                const spiralAngle = this.angle + (20 - this.radius) * this.spiralFactor;
                // 基础位置
                let x = Math.cos(spiralAngle) * this.radius;
                let z = Math.sin(spiralAngle) * this.radius;
                // 添加自然摆动，让路径更生动
                const sway = Math.sin(this.radius * this.swayFreq + this.phase) * this.swayAmp;
                // 垂直于径向方向的摆动
                const perpX = -Math.sin(spiralAngle) * sway;
                const perpZ = Math.cos(spiralAngle) * sway;
                x += perpX;
                z += perpZ;
                // Y轴摆动
                const y = Math.sin(this.radius * 0.9 + this.phase) * this.yAmp;
                this.mesh.position.set(x, y, z);
            }
            
            update() {
                if (!this.active) return false;
                
                // 半径减小 (向黑洞坠落)
                this.radius -= this.fallSpeed;
                this.phase += 0.03;
                
                // 到达销毁半径
                if (this.radius <= DESTROY_DISTANCE) {
                    this.destroy();
                    return false;
                }
                
                this.updatePosition();
                
                // 自转
                this.mesh.rotation.x += 0.03;
                this.mesh.rotation.y += 0.04;
                
                // 靠近黑洞时变红变亮
                const proximity = Math.max(0, Math.min(1, (this.radius - 2.5) / 12));
                this.mesh.material.emissiveIntensity = 0.4 + (1 - proximity) * 0.9;
                
                if (this.radius < 6) {
                    const hotMix = 1 - (this.radius - 2.2) / 4;
                    this.mesh.material.color.setRGB(1.0, 0.4 + hotMix * 0.5, 0.2 + hotMix * 0.5);
                } else {
                    this.mesh.material.color = this.initialColor;
                }
                
                return true;
            }
            
            destroy() {
                this.active = false;
                createDestructionEffect(this.mesh.position.clone(), BRANCH_COLORS[this.branchIdx]);
                scene.remove(this.mesh);
                // 重生在外围星轨上，然后进入同一条支路
                setTimeout(() => {
                    const newStar = new SpiralBranchStar(this.branchIdx, 20 + Math.random() * 6);
                    spiralStars.push(newStar);
                }, 40);
            }
        }
        
        // 销毁特效
        function createDestructionEffect(position, color) {
            const particleCount = 70;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 0.8;
                positions[i*3+1] = (Math.random() - 0.5) * 0.8;
                positions[i*3+2] = (Math.random() - 0.5) * 0.8;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: color, size: 0.07, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geom, mat);
            particles.position.copy(position);
            scene.add(particles);
            
            let progress = 0;
            const startPos = position.clone();
            const endPos = new THREE.Vector3(0, 0, 0);
            
            function animateDestroy() {
                progress += 0.09;
                if (progress >= 1) {
                    scene.remove(particles);
                    return;
                }
                const t = Math.pow(progress, 0.7);
                particles.position.lerpVectors(startPos, endPos, t);
                particles.scale.setScalar(1 - t * 0.85);
                particles.rotation.z += 0.12;
                requestAnimationFrame(animateDestroy);
            }
            requestAnimationFrame(animateDestroy);
            
            // 光晕
            const glowRing = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, 8, 8),
                new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending })
            );
            glowRing.position.copy(position);
            scene.add(glowRing);
            let glowScale = 1;
            function animateGlow() {
                glowScale += 0.1;
                glowRing.scale.setScalar(glowScale);
                glowRing.material.opacity = 0.8 - (glowScale - 1) * 0.55;
                if (glowScale > 2.5) {
                    scene.remove(glowRing);
                    return;
                }
                requestAnimationFrame(animateGlow);
            }
            requestAnimationFrame(animateGlow);
        }
        
        // 创建小星星，均匀分布在四条支路上
        let spiralStars = [];
        for (let branch = 0; branch < 4; branch++) {
            for (let i = 0; i < STARS_PER_BRANCH; i++) {
                const startRadius = 18 + Math.random() * 8;
                const star = new SpiralBranchStar(branch, startRadius);
                spiralStars.push(star);
            }
        }
        
        // ================= 5. 大星星 (作品) =================
        const worksData = [
            { name: "💻 星轨编译器", desc: "Python字节码分析 · 可视化执行流", link: "https://github.com/fallingmeteorite/star-compiler", color: 0x6c9eff, icon: "🪐" },
            { name: "🎮 流光·虚幻引擎", desc: "UE5开放世界 · 动态星空粒子系统", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0x88ddff, icon: "✨" },
            { name: "🔧 逆向星芒", desc: "软件逆向分析笔记 & CTF 实战库", link: "https://github.com/fallingmeteorite/reverse-constellation", color: 0xdd88aa, icon: "⚙️" },
            { name: "🤖 星尘·嵌入式OS", desc: "STM32微型实时系统 · 星图显示", link: "https://github.com/fallingmeteorite/stardust-rtos", color: 0x77cc88, icon: "📡" },
            { name: "📡 流星信标", desc: "全栈导航站 + 动态星空API", link: "https://github.com/fallingmeteorite/meteor-beacon", color: 0xffaa88, icon: "🌠" },
            { name: "🎨 光源AI绘画", desc: "AI创意工具 · 社区生成平台", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0xdd99ff, icon: "🎨" },
            { name: "🌌 星尘档案馆", desc: "全部开源项目索引与开发日志", link: "https://github.com/fallingmeteorite", color: 0xccccdd, icon: "⭐" },
            { name: "🌀 黑洞边缘实验室", desc: "WebGL奇幻交互实验 & 粒子系统", link: "https://github.com/fallingmeteorite/horizon-lab", color: 0xff99cc, icon: "🌌" },
            { name: "📖 星海博客", desc: "技术随笔与星空哲思", link: "https://fallingmeteorite.github.io", color: 0xffaa77, icon: "📖" },
            { name: "🔮 幻境渲染器", desc: "实时体积光与星云渲染", link: "https://github.com/fallingmeteorite/nebula-render", color: 0x77aaff, icon: "🔮" }
        ];
        
        function createStarShape(color, size = 0.42) {
            const geometry = new THREE.IcosahedronGeometry(size, 0);
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i], y = positions[i+1], z = positions[i+2];
                const len = Math.sqrt(x*x + y*y + z*z);
                const spike = 1 + Math.sin(len * 7) * 0.18;
                positions[i] = x * spike;
                positions[i+1] = y * spike;
                positions[i+2] = z * spike;
            }
            geometry.computeVertexNormals();
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.68, metalness: 0.4, roughness: 0.22 });
            return new THREE.Mesh(geometry, material);
        }
        
        class BigStar {
            constructor(data) {
                this.data = data;
                const radius = 14 + Math.random() * 28;
                const angle = Math.random() * Math.PI * 2;
                this.radius = radius;
                this.angle = angle;
                this.yOffset = (Math.random() - 0.5) * 2.4;
                this.orbitSpeed = 0.0004 + Math.random() * 0.0006;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset;
                
                this.mesh = createStarShape(data.color, 0.42 + Math.random() * 0.1);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                
                this.glowLight = new THREE.PointLight(data.color, 0.75, 15);
                this.mesh.add(this.glowLight);
                
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc.substring(0, 28)}…</small>`;
                div.style.pointerEvents = 'auto';
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast(data.name, data.desc, data.link);
                    this.mesh.material.emissiveIntensity = 1.5;
                    this.glowLight.intensity = 1.3;
                    setTimeout(() => {
                        this.mesh.material.emissiveIntensity = 0.68;
                        this.glowLight.intensity = 0.75;
                    }, 450);
                });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.65, this.z);
                scene.add(this.label);
            }
            update(time) {
                this.angle += this.orbitSpeed;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(time * 0.0007) * 0.1;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.7, this.z);
                this.mesh.rotation.y += 0.002;
                this.mesh.rotation.x += 0.001;
                const breath = 0.6 + Math.sin(time * 0.002) * 0.2;
                this.glowLight.intensity = 0.6 + breath * 0.2;
            }
        }
        
        const bigStars = worksData.map(d => new BigStar(d));
        
        // 星云粒子系统
        const nebulaCount = 10000;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPosArr = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            const radius = 6 + Math.pow(Math.random(), 1.2) * 40;
            const angle = Math.random() * Math.PI * 2;
            const spiral = radius * 0.28;
            const finalAngle = angle + spiral;
            const yVal = Math.sin(radius * 0.45) * 1.5 + (Math.random() - 0.5) * 1.8;
            nebulaPosArr[i*3] = Math.cos(finalAngle) * radius;
            nebulaPosArr[i*3+1] = yVal * (1 - radius / 48);
            nebulaPosArr[i*3+2] = Math.sin(finalAngle) * radius;
            const mix = Math.min(1, radius / 35);
            nebulaColors[i*3] = 0.55 + mix * 0.4;
            nebulaColors[i*3+1] = 0.35 + mix * 0.45;
            nebulaColors[i*3+2] = 0.85 + mix * 0.15;
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPosArr, 3));
        nebulaGeom.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        const nebulaMat = new THREE.PointsMaterial({ size: 0.085, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const nebulaCloud = new THREE.Points(nebulaGeom, nebulaMat);
        scene.add(nebulaCloud);
        
        // 背景繁星
        const bgStarCount = 8000;
        const bgStarGeom = new THREE.BufferGeometry();
        const bgStarPos = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            bgStarPos[i*3] = (Math.random() - 0.5) * 350;
            bgStarPos[i*3+1] = (Math.random() - 0.5) * 200;
            bgStarPos[i*3+2] = (Math.random() - 0.5) * 220 - 90;
        }
        bgStarGeom.setAttribute('position', new THREE.BufferAttribute(bgStarPos, 3));
        const bgStarMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.11, transparent: true, opacity: 0.55 });
        const bgStars = new THREE.Points(bgStarGeom, bgStarMat);
        scene.add(bgStars);
        
        // ================= 音乐系统 =================
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.4;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        
        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(e => console.log("需要交互"));
            }
        }
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(err => console.log(err));
            } else {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                } else {
                    bgMusic.pause();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔇";
                }
            }
        });
        
        function showToast(title, desc, url) {
            let old = document.getElementById('dynamicToast');
            if(old) old.remove();
            const toast = document.createElement('div');
            toast.id = 'dynamicToast';
            toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将打开链接`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1800);
            setTimeout(() => toast.remove(), 2300);
            if(url) setTimeout(() => window.open(url, '_blank'), 700);
        }
        
        fetch('https://v1.hitokoto.cn')
            .then(res => res.json())
            .then(data => document.getElementById('hitokoto-display').innerHTML = `🌠 “${data.hitokoto}” — ${data.from}`)
            .catch(() => document.getElementById('hitokoto-display').innerHTML = '🌀 螺旋支路，星辰缓缓坠入奇点');
        
        // ================= 动画循环 =================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            
            // 更新大星星
            bigStars.forEach(star => star.update(time));
            
            // 更新螺旋支路上的小星星
            for (let i = spiralStars.length - 1; i >= 0; i--) {
                const star = spiralStars[i];
                const alive = star.update();
                if (!alive) {
                    spiralStars.splice(i, 1);
                }
            }
            
            // 外围星轨旋转
            outerRing.rotation.y += 0.002;
            
            // 星云缓慢旋转
            nebulaCloud.rotation.y += 0.0004;
            
            // 黑洞吸积盘旋转
            innerAcc.rotation.z += 0.012;
            midAcc.rotation.z -= 0.009;
            outerAcc.rotation.z += 0.007;
            dustRing.rotation.y += 0.005;
            
            // 黑洞脉动
            const pulse = 1 + Math.sin(time * 0.004) * 0.012;
            blackHoleCore.scale.set(pulse, pulse, pulse);
            eventHorizonGlow.scale.setScalar(1 + Math.sin(time * 0.005) * 0.025);
            coreLight.intensity = 1.0 + Math.sin(time * 0.0035) * 0.3;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("%c✨ 外围旋转星轨分出四条螺旋支路 | 小星星沿支路慢慢靠近黑洞并被销毁 ✨", "color: #ffaa88; font-size: 14px");
    </script>
</body>
</html>
