<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>星辰集· Fallingmeteorite</title>
    <meta name="description" content="星穹之下，少年与代码的银河漫游">
    <meta name="keywords" content="星空, 作品集, 高中生, 流星, 创意开发">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
    
    <!-- 字体与图标库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery.fancybox@2.1.5/source/jquery.fancybox.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif;
            background: #030518;
            color: #eef5ff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ========= 深邃星空画布 ========= */
        #universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #02010a);
        }
        #stars-layer, #twinkling-layer, #meteor-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        #meteor-canvas { z-index: 2; }

        /* 主容器磨砂玻璃星空效果 */
        .main-container {
            position: relative;
            z-index: 10;
            background: rgba(3, 8, 28, 0.55);
            backdrop-filter: blur(3px);
            min-height: 100vh;
        }

        /* 星轨导航区 — 如银河飘带 */
        .star-orbit-nav {
            position: relative;
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: radial-gradient(circle at 50% 20%, rgba(30, 40, 80, 0.3) 0%, transparent 80%);
            border-bottom: 1px solid rgba(255,215,140,0.3);
            overflow: hidden;
        }
        .constellation-title {
            position: relative;
            z-index: 5;
            padding: 2rem;
        }
        .glow-name {
            font-size: 4.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6B0, #FFB347, #E08E3A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,180,70,0.5);
            letter-spacing: -0.02em;
        }
        .sub-star {
            font-size: 1.3rem;
            margin-top: 1rem;
            opacity: 0.9;
            letter-spacing: 2px;
            font-weight: 300;
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            background: rgba(10,20,40,0.4);
            border: 1px solid rgba(255,200,100,0.3);
        }
        .typed-cursor {
            font-size: 2rem;
            color: #ffbc6e;
        }

        /* 主内容区 — 星尘卡片布局 */
        .cosmic-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 3rem 2rem 4rem;
        }
        .star-grid {
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
        }
        /* 左侧星云简介区 */
        .nebula-sidebar {
            flex: 1.2;
            min-width: 260px;
        }
        /* 右侧作品星河 */
        .galaxy-works {
            flex: 2.8;
        }

        /* 星光卡片 */
        .star-card {
            background: rgba(12, 20, 38, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 200, 120, 0.25);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 15px 35px -12px rgba(0,0,0,0.4);
        }
        .star-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 180, 70, 0.7);
            background: rgba(20, 32, 55, 0.75);
            box-shadow: 0 25px 40px -14px rgba(255,160,50,0.2);
        }
        .avatar-star {
            text-align: center;
        }
        .avatar-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffbc6e;
            box-shadow: 0 0 0 5px rgba(255,180,70,0.3), 0 0 20px rgba(255,200,100,0.3);
            transition: 0.4s;
        }
        .avatar-img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 0 8px rgba(255,180,70,0.5);
        }
        .star-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 1rem;
            background: linear-gradient(120deg, #FFF2D0, #FFD966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .star-bio {
            font-size: 0.9rem;
            opacity: 0.85;
            margin-top: 0.5rem;
        }
        .social-orbit {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .social-link {
            font-size: 1.8rem;
            color: #cddcff;
            transition: 0.2s;
        }
        .social-link:hover {
            color: #ffb347;
            transform: scale(1.15);
        }
        .stardust-headline {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            border-left: 4px solid #ffb347;
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .hitokoto-box, .poetry-box {
            font-style: normal;
            line-height: 1.55;
            font-size: 0.95rem;
            color: #e5edff;
        }
        .visitor-stats {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(255,210,130,0.3);
        }

        /* 作品集 — 星座画廊 */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }
        .work-item {
            background: rgba(5, 12, 28, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 1.6rem;
            padding: 1.2rem 1.2rem 1.5rem;
            border: 1px solid rgba(255,200,100,0.25);
            transition: all 0.3s;
            cursor: pointer;
        }
        .work-item:hover {
            transform: translateY(-8px) rotate(0.5deg);
            border-color: #ffbc6e;
            background: rgba(20, 35, 60, 0.85);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.5);
        }
        .work-icon {
            font-size: 2.4rem;
            margin-bottom: 0.6rem;
            display: inline-block;
        }
        .work-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0.5rem 0 0.3rem;
            background: linear-gradient(135deg, #FFE1A0, #FFC06F);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .work-desc {
            font-size: 0.85rem;
            opacity: 0.8;
            margin: 0.5rem 0;
            line-height: 1.4;
        }
        .work-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .tag {
            background: rgba(255,180,70,0.2);
            border-radius: 50px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 500;
            border: 0.5px solid rgba(255,200,100,0.6);
        }
        .work-link {
            display: inline-block;
            margin-top: 12px;
            color: #ffc285;
            font-size: 0.8rem;
            text-decoration: none;
            border-bottom: 1px dashed;
        }
        .work-link:hover {
            color: white;
        }
        hr {
            margin: 2rem 0;
            border: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffbc6e, #ff8c42, transparent);
        }
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,200,100,0.2);
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }
        @media (max-width: 780px) {
            .glow-name { font-size: 2.5rem; }
            .star-grid { flex-direction: column; }
            .works-grid { grid-template-columns: 1fr; }
        }
        .constellation-glow {
            animation: pulseGlow 3s infinite;
        }
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 3px #ffb347; }
            50% { text-shadow: 0 0 18px #ffaa44; }
            100% { text-shadow: 0 0 3px #ffb347; }
        }
        .btn-music {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #ffd48a;
            transition: 0.2s;
            margin-left: 12px;
        }
    </style>
</head>
<body>

<div id="universe"></div>
<canvas id="stars-layer"></canvas>
<canvas id="twinkling-layer"></canvas>
<canvas id="meteor-canvas"></canvas>

<div class="main-container">
    <!-- 星轨导航区 -->
    <div class="star-orbit-nav">
        <div class="constellation-title">
            <div class="glow-name">Fallingmeteorite</div>
            <div class="sub-star">
                <span id="dynamic-phrase"></span>
                <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.11"></script>
                <script>
                    new Typed("#dynamic-phrase", {
                        strings: ['🌠 星河滚烫，代码是人间理想', '✨ 以星辰为引，构建数字星海', '🪐 少年追光，亦是发光体'],
                        startDelay: 500,
                        typeSpeed: 70,
                        backSpeed: 35,
                        loop: true,
                        showCursor: true,
                        cursorChar: '✧'
                    });
                </script>
            </div>
        </div>
    </div>

    <div class="cosmic-wrapper">
        <div class="star-grid">
            <!-- 左侧：星尘个人信息 + 星语 -->
            <div class="nebula-sidebar">
                <div class="star-card">
                    <div class="avatar-star">
                        <img class="avatar-img" src="https://picsum.photos/id/29/200/200?grayscale&seed=nebula" alt="流星肖像">
                        <div class="star-name">Fallingmeteorite</div>
                        <div class="star-bio">✨ 高中生 · 独立开发者 · 星尘织梦者 ✨<br>“求知若饥，虚心若愚”</div>
                        <div class="social-orbit">
                            <a href="https://github.com/fallingmeteorite" target="_blank" class="social-link"><i class="fa fa-github"></i></a>
                            <a href="https://space.bilibili.com/1484690146" target="_blank" class="social-link"><i class="fa fa-television"></i></a>
                            <button id="musicToggleBtn" class="social-link btn-music"><i class="fa fa-music"></i></button>
                        </div>
                    </div>
                </div>

                <div class="star-card">
                    <div class="stardust-headline"><i class="fa fa-star-o"></i> <span>✨ 星 辰 一 言</span></div>
                    <div id="hitokoto" class="hitokoto-box">…… 正在连接银河讯号 ……</div>
                </div>

                <div class="star-card">
                    <div class="stardust-headline"><i class="fa fa-moon-o"></i> <span>📜 今 日 星 词</span></div>
                    <div id="jinrishici-sentence" class="poetry-box">—— 且将新火试新茶，诗酒趁年华 ——</div>

                <div class="star-card">
                    <div class="stardust-headline"><i class="fa fa-bar-chart"></i> <span>🌌 星 际 访 客</span></div>
                    <div class="visitor-stats"><span>✨ 流浪星人数 :</span><span id="busuanzi_value_site_uv">-</span></div>
                    <div class="visitor-stats"><span>🌠 总星光访问 :</span><span id="busuanzi_value_site_pv">-</span></div>
                </div>
            </div>

            <!-- 右侧：作品星河（替代技能与光源盒子） -->
            <div class="galaxy-works">
                <div class="star-card" style="padding-bottom: 1rem;">
                    <div class="stardust-headline"><i class="fa fa-cubes"></i> <span>🌟 星 尘 作 品 集</span></div>
                    <div class="works-grid" id="works-container">
                        <!-- 作品动态加载 JS 注入，保证星空感 -->
                    </div>
                    <hr>
                    <div style="text-align: center; font-size: 0.8rem; opacity: 0.7; margin-top: 0.5rem;">
                        <i class="fa fa-github-alt"></i> 更多星辰造物，即将划破夜空
                    </div>
                </div>
                <!-- 额外作者其他星系链接 -->
                <div style="display: flex; gap: 20px; justify-content: flex-end; margin-top: 0.5rem;">
                    <a href="https://github.com/fallingmeteorite" target="_blank" style="color:#ffc285; text-decoration: none;"><i class="fa fa-github"></i> 星际源码仓</a>
                    <a href="https://space.bilibili.com/1484690146" target="_blank" style="color:#ffc285; text-decoration: none;"><i class="fa fa-bilibili"></i> 光年工坊</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div>🌌 © 2024 - 永恒星轨 · Fallingmeteorite | 愿每一行代码，都如流星般闪耀 🌠</div>
        <div style="margin-top: 6px; font-size: 0.7rem;">✦ 以星河为证，热爱永不停歇 ✦</div>
    </footer>
</div>

<!-- 背景音乐控制 -->
<audio id="bgMusic" loop preload="auto" style="display:none;">
    <source src="background_music.mp3" type="audio/mpeg">
</audio>

<!-- 脚本区 -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.4.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jquery.fancybox@2.1.5/source/jquery.fancybox.js"></script>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script src="https://v1.hitokoto.cn/?encode=js&select=%23hitokoto" defer></script>
<script src="https://sdk.jinrishici.com/v2/browser/jinrishici.js" charset="utf-8"></script>
<!-- 看板娘 optional 轻量版 -->
<script src="https://cdn.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/autoload.js"></script>

<script>
    // ---------- 星 空 背 景 全 套 动 效 ----------
    const starsCanvas = document.getElementById('stars-layer');
    const twinkleCanvas = document.getElementById('twinkling-layer');
    const meteorCanvas = document.getElementById('meteor-canvas');
    let width = window.innerWidth, height = window.innerHeight;
    let starsCtx = starsCanvas.getContext('2d');
    let twinkleCtx = twinkleCanvas.getContext('2d');
    let meteorCtx = meteorCanvas.getContext('2d');
    
    function resizeAll() {
        width = window.innerWidth;
        height = window.innerHeight;
        starsCanvas.width = width;
        starsCanvas.height = height;
        twinkleCanvas.width = width;
        twinkleCanvas.height = height;
        meteorCanvas.width = width;
        meteorCanvas.height = height;
        initStars();
        initTwinkles();
    }
    
    let starsArray = [];
    function initStars() {
        starsArray = [];
        const starCount = 550;
        for(let i=0;i<starCount;i++) {
            starsArray.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2.2 + 0.8,
                alpha: Math.random() * 0.6 + 0.3,
            });
        }
    }
    function drawStars() {
        if(!starsCtx) return;
        starsCtx.clearRect(0,0,width,height);
        starsCtx.fillStyle = "#030518";
        starsCtx.fillRect(0,0,width,height);
        for(let s of starsArray) {
            starsCtx.beginPath();
            starsCtx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
            starsCtx.fillStyle = `rgba(255, 240, 200, ${s.alpha})`;
            starsCtx.fill();
        }
        requestAnimationFrame(drawStars);
    }
    
    // 闪烁星星层
    let twinkles = [];
    function initTwinkles() {
        twinkles = [];
        for(let i=0;i<300;i++) {
            twinkles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                rad: Math.random() * 1.5 + 0.5,
                speed: 0.02 + Math.random() * 0.03,
                phase: Math.random() * Math.PI * 2
            });
        }
    }
    function drawTwinkles() {
        if(!twinkleCtx) return;
        twinkleCtx.clearRect(0,0,width,height);
        let now = Date.now() / 1000;
        for(let t of twinkles) {
            let alpha = 0.3 + Math.sin(now * t.speed + t.phase) * 0.4;
            twinkleCtx.beginPath();
            twinkleCtx.arc(t.x, t.y, t.rad, 0, Math.PI*2);
            twinkleCtx.fillStyle = `rgba(255, 210, 130, ${alpha * 0.8})`;
            twinkleCtx.fill();
        }
        requestAnimationFrame(drawTwinkles);
    }
    
    // 流星系统
    class ShootingStar {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * width;
            this.y = Math.random() * height * 0.3;
            this.length = Math.random() * 100 + 70;
            this.speedX = (Math.random() * 12 + 6) * (Math.random() > 0.7 ? 1 : 0.9);
            this.speedY = (Math.random() * 7 + 4) * (Math.random() > 0.7 ? 1 : 0.9);
            this.opacity = Math.random() * 0.7 + 0.4;
            this.active = true;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if(this.x > width + 300 || this.y > height + 250 || this.x < -200 || this.y < -200) {
                this.reset();
                this.x = Math.random() * width;
                this.y = Math.random() * -80;
            }
        }
        draw(ctx) {
            ctx.beginPath();
            let gradient = ctx.createLinearGradient(this.x, this.y, this.x - this.length, this.y - this.length * 0.5);
            gradient.addColorStop(0, `rgba(255, 200, 100, ${this.opacity})`);
            gradient.addColorStop(1, `rgba(255, 80, 50, 0)`);
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.length, this.y - this.length*0.45);
            ctx.lineTo(this.x - this.length*0.7, this.y - this.length*0.3);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 160, 70, 0.9)`;
            ctx.fill();
        }
    }
    let meteors = [];
    function initMeteors(count) {
        meteors = [];
        for(let i=0;i<count;i++) {
            let m = new ShootingStar();
            m.reset();
            meteors.push(m);
        }
    }
    function drawMeteors() {
        if(!meteorCtx) return;
        meteorCtx.clearRect(0,0,width,height);
        for(let m of meteors) {
            m.update();
            m.draw(meteorCtx);
        }
        requestAnimationFrame(drawMeteors);
    }
    
    window.addEventListener('resize', () => {
        resizeAll();
        initMeteors(20);
    });
    resizeAll();
    initMeteors(24);
    drawStars();
    drawTwinkles();
    drawMeteors();
    
    // ---------- 作品数据 (星尘作品集，替换原有技能和光源盒子) ----------
    const worksData = [
        { icon: "🪐", title: "星轨编译器", desc: "轻量级 Python 字节码分析工具，支持可视化执行流。", tags: ["Python", "编译器"], link: "https://github.com/fallingmeteorite/star-compiler" },
        { icon: "🎮", title: "流光·虚幻引擎实验", desc: "基于UE5的开放世界场景，动态星空粒子与实时渲染。", tags: ["Unreal", "C++", "蓝图"], link: "https://www.bilibili.com/video/BV1YC411z7yQ" },
        { icon: "🔧", title: "逆向星芒", desc: "软件逆向分析笔记，包括反汇编与协议分析案例库。", tags: ["逆向工程", "IDA", "CTF"], link: "https://github.com/fallingmeteorite/reverse-constellation" },
        { icon: "🤖", title: "星尘·嵌入式OS雏形", desc: "基于STM32的微型实时系统，实现多任务调度与星图显示。", tags: ["硬件开发", "RTOS", "C"], link: "https://github.com/fallingmeteorite/stardust-rtos" },
        { icon: "📡", title: "流星信标", desc: "全栈个人导航站 + 动态星空API，收集宇宙级灵感。", tags: ["WebGL", "Three.js", "API"], link: "https://github.com/fallingmeteorite/meteor-beacon" }
    ];
    
    function renderWorks() {
        const container = document.getElementById('works-container');
        if(!container) return;
        let html = '';
        worksData.forEach(work => {
            html += `
                <div class="work-item" onclick="window.open('${work.link}', '_blank')">
                    <div class="work-icon">${work.icon}</div>
                    <div class="work-title">${work.title}</div>
                    <div class="work-desc">${work.desc}</div>
                    <div class="work-tags">
                        ${work.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
                    </div>
                    <a href="${work.link}" target="_blank" class="work-link" onclick="event.stopPropagation();">探索星域 →</a>
                </div>
            `;
        });
        container.innerHTML = html;
    }
    renderWorks();
    
    // 今日诗词渲染
    jinrishici.load(function(result) {
        let poetryDiv = document.getElementById('jinrishici-sentence');
        if(poetryDiv && result.data) {
            poetryDiv.innerHTML = `⭐ 「 ${result.data.content} 」<br>✦ —— ${result.data.origin.dynasty} · ${result.data.origin.author} 《${result.data.origin.title}》 ✦`;
        }
    }, function(err){});

    // 音乐控制优雅处理
    const bgAudio = document.getElementById('bgMusic');
    const musicBtn = document.getElementById('musicToggleBtn');
    let musicPlaying = true;
    if(bgAudio) {
        bgAudio.volume = 0.35;
        bgAudio.play().catch(e => console.log("自动播放策略限制，点击音乐按钮唤醒"));
        musicBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if(musicPlaying) {
                bgAudio.pause();
                musicBtn.innerHTML = '<i class="fa fa-volume-off"></i>';
                musicPlaying = false;
            } else {
                bgAudio.play().catch(()=>{});
                musicBtn.innerHTML = '<i class="fa fa-music"></i>';
                musicPlaying = true;
            }
        });
    }
    
    // 标题星尘趣味效果
    let originTitle = document.title;
    document.addEventListener('visibilitychange', () => {
        if(document.hidden) {
            document.title = '🌠 流星划过，稍后回归星河 🌠';
        } else {
            document.title = '✨ Fallingmeteorite · 星辰集 ✨';
            setTimeout(() => { document.title = originTitle; }, 2000);
        }
    });
    
    // 鼠标点击 炫光小流星
    document.body.addEventListener('click', function(e) {
        let starBurst = document.createElement('div');
        starBurst.innerHTML = '✨';
        starBurst.style.position = 'fixed';
        starBurst.style.left = e.clientX + 'px';
        starBurst.style.top = e.clientY + 'px';
        starBurst.style.fontSize = '22px';
        starBurst.style.pointerEvents = 'none';
        starBurst.style.zIndex = '9999';
        starBurst.style.opacity = '0.9';
        starBurst.style.transition = 'all 0.6s ease-out';
        document.body.appendChild(starBurst);
        setTimeout(() => {
            starBurst.style.opacity = '0';
            starBurst.style.transform = 'translateY(-40px) rotate(20deg)';
            setTimeout(() => starBurst.remove(), 700);
        }, 30);
    });
    
    console.log("%c ✨ 欢迎来到 Fallingmeteorite 的星辰宇宙 ✨", "color:#ffbc6e; font-size:16px;");
    console.log("%c 每一颗星星，都是一个未完成的梦", "color:#FFD966");
</script>
</body>
</html>
