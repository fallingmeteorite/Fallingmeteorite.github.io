<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>

<body>
    <div class="info-panel">
        <h1>🌀 大范围星轨 · 螺旋支路坠入黑洞</h1>
        <p>✨ 高中开发者 | 星辰造物主 ✨</p>
        <p>📡 外围大轨道星星圆周运动 | 靠近黑洞时被吸引沿螺旋支路坠落</p>
        <div class="quote" id="hitokoto-display">🌠 广阔星轨，星辰被引力捕获后沿螺旋支路坠入奇点...</div>
    </div>
    <div class="controls-hint">
        🖱️ 鼠标拖拽旋转视角 | 右键平移 | 滚动缩放 | ✨ 点击大星星探索作品 ✨ | 🌟 星星大范围圆周运动，被吸引后螺旋坠入黑洞
    </div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊旋律 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010003);
        scene.fog = new THREE.FogExp2(0x010003, 0.00008);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(22, 15, 32);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        controls.update();
        
        // ================= 1. 黑洞建模 =================
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.8, 128, 128),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.02, metalness: 0.98, emissive: 0x330033, emissiveIntensity: 1.0 })
        );
        scene.add(blackHoleCore);
        
        // 吸积盘
        const innerAcc = new THREE.Mesh(
            new THREE.TorusGeometry(2.45, 0.13, 100, 300),
            new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288, emissiveIntensity: 1.3, transparent: true })
        );
        innerAcc.rotation.x = Math.PI / 2 + 0.2;
        scene.add(innerAcc);
        
        const midAcc = new THREE.Mesh(
            new THREE.TorusGeometry(3.1, 0.15, 120, 340),
            new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0xcc44aa, emissiveIntensity: 1.0, transparent: true })
        );
        midAcc.rotation.x = Math.PI / 2 - 0.05;
        scene.add(midAcc);
        
        const outerAcc = new THREE.Mesh(
            new THREE.TorusGeometry(3.95, 0.17, 130, 380),
            new THREE.MeshStandardMaterial({ color: 0xcc88ff, emissive: 0x8844cc, emissiveIntensity: 0.8, transparent: true })
        );
        outerAcc.rotation.x = Math.PI / 2 + 0.08;
        scene.add(outerAcc);
        
        // 黑洞光晕
        const eventHorizonGlow = new THREE.Mesh(
            new THREE.SphereGeometry(2.2, 64, 64),
            new THREE.MeshBasicMaterial({ color: 0xaa44ff, transparent: true, opacity: 0.22, blending: THREE.AdditiveBlending })
        );
        scene.add(eventHorizonGlow);
        
        // 周围粒子晕
        const dustCount = 5000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = [];
        for (let i = 0; i < dustCount; i++) {
            const r = 2.0 + Math.random() * 2.7;
            const ang = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.6;
            dustPos.push(Math.cos(ang) * r, yOff, Math.sin(ang) * r);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xff88dd, size: 0.06, blending: THREE.AdditiveBlending });
        const dustRing = new THREE.Points(dustGeo, dustMat);
        scene.add(dustRing);
        
        // 黑洞标签
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 奇点深渊 🌀<br><small>「螺旋支路的终点」</small>`;
        blackHoleDiv.style.background = "rgba(0,0,0,0.85)";
        blackHoleDiv.style.border = "2px solid #ff44aa";
        blackHoleDiv.style.pointerEvents = "none";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 2.1, 0);
        scene.add(blackHoleLabel);
        
        // 光源
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        const coreLight = new THREE.PointLight(0xff55cc, 1.6, 42);
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);
        const fillLight = new THREE.PointLight(0x8866ff, 0.8);
        fillLight.position.set(6, 5, 7);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x4488ff, 0.5);
        backLight.position.set(-5, 3, -8);
        scene.add(backLight);
        
        // ================= 2. 四条螺旋支路可视化 =================
        const BRANCH_ANGLES = [Math.PI / 4, 3 * Math.PI / 4, 5 * Math.PI / 4, 7 * Math.PI / 4];
        const BRANCH_COLORS = [0xff66aa, 0x66ffaa, 0x66aaff, 0xffaa66];
        
        // 为每条支路创建可视化螺旋线
        BRANCH_ANGLES.forEach((angle, idx) => {
            const points = [];
            for (let r = 20; r > 2.5; r -= 0.25) {
                const t = (20 - r) / 17.5;
                const spiralAngle = angle + t * (Math.PI / 1.8);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.7) * 0.4;
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: BRANCH_COLORS[idx], transparent: true, opacity: 0.55 });
            const spiralLine = new THREE.Line(lineGeo, lineMat);
            scene.add(spiralLine);
            
            // 光点点缀
            const glowPoints = [];
            for (let r = 20; r > 2.8; r -= 1.2) {
                const t = (20 - r) / 17.5;
                const spiralAngle = angle + t * (Math.PI / 1.8);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.7) * 0.4;
                glowPoints.push(new THREE.Vector3(x, y, z));
            }
            const glowGeom = new THREE.BufferGeometry().setFromPoints(glowPoints);
            const glowMat = new THREE.PointsMaterial({ color: BRANCH_COLORS[idx], size: 0.15, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
            const glowPointsObj = new THREE.Points(glowGeom, glowMat);
            scene.add(glowPointsObj);
        });
        
        // ================= 3. 大星星 (作品) =================
        const worksData = [
            { name: "💻 星轨编译器", desc: "Python字节码分析 · 可视化执行流", link: "https://github.com/fallingmeteorite/star-compiler", color: 0x6c9eff, icon: "🪐" },
            { name: "🎮 流光·虚幻引擎", desc: "UE5开放世界 · 动态星空粒子系统", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0x88ddff, icon: "✨" },
            { name: "🔧 逆向星芒", desc: "软件逆向分析笔记 & CTF 实战库", link: "https://github.com/fallingmeteorite/reverse-constellation", color: 0xdd88aa, icon: "⚙️" },
            { name: "🤖 星尘·嵌入式OS", desc: "STM32微型实时系统 · 星图显示", link: "https://github.com/fallingmeteorite/stardust-rtos", color: 0x77cc88, icon: "📡" },
            { name: "📡 流星信标", desc: "全栈导航站 + 动态星空API", link: "https://github.com/fallingmeteorite/meteor-beacon", color: 0xffaa88, icon: "🌠" },
            { name: "🎨 光源AI绘画", desc: "AI创意工具 · 社区生成平台", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0xdd99ff, icon: "🎨" },
            { name: "🌌 星尘档案馆", desc: "全部开源项目索引与开发日志", link: "https://github.com/fallingmeteorite", color: 0xccccdd, icon: "⭐" },
            { name: "🌀 黑洞边缘实验室", desc: "WebGL奇幻交互实验 & 粒子系统", link: "https://github.com/fallingmeteorite/horizon-lab", color: 0xff99cc, icon: "🌌" },
            { name: "📖 星海博客", desc: "技术随笔与星空哲思", link: "https://fallingmeteorite.github.io", color: 0xffaa77, icon: "📖" },
            { name: "🔮 幻境渲染器", desc: "实时体积光与星云渲染", link: "https://github.com/fallingmeteorite/nebula-render", color: 0x77aaff, icon: "🔮" }
        ];
        
        function createStarShape(color, size = 0.45) {
            const geometry = new THREE.IcosahedronGeometry(size, 0);
            const positions = geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i], y = positions[i+1], z = positions[i+2];
                const len = Math.sqrt(x*x + y*y + z*z);
                const spike = 1 + Math.sin(len * 7) * 0.18;
                positions[i] = x * spike;
                positions[i+1] = y * spike;
                positions[i+2] = z * spike;
            }
            geometry.computeVertexNormals();
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.7, metalness: 0.4, roughness: 0.22 });
            return new THREE.Mesh(geometry, material);
        }
        
        class BigStar {
            constructor(data) {
                this.data = data;
                const radius = 26 + Math.random() * 22;
                const angle = Math.random() * Math.PI * 2;
                this.radius = radius;
                this.angle = angle;
                this.yOffset = (Math.random() - 0.5) * 2.2;
                this.orbitSpeed = 0.0003 + Math.random() * 0.0005;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset;
                
                this.mesh = createStarShape(data.color, 0.44 + Math.random() * 0.1);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                
                this.glowLight = new THREE.PointLight(data.color, 0.8, 18);
                this.mesh.add(this.glowLight);
                
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc.substring(0, 28)}…</small>`;
                div.style.pointerEvents = 'auto';
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast(data.name, data.desc, data.link);
                    this.mesh.material.emissiveIntensity = 1.6;
                    this.glowLight.intensity = 1.4;
                    setTimeout(() => {
                        this.mesh.material.emissiveIntensity = 0.7;
                        this.glowLight.intensity = 0.8;
                    }, 450);
                });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.7, this.z);
                scene.add(this.label);
            }
            update(time) {
                this.angle += this.orbitSpeed;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(time * 0.0006) * 0.12;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.75, this.z);
                this.mesh.rotation.y += 0.002;
                this.mesh.rotation.x += 0.001;
                const breath = 0.6 + Math.sin(time * 0.0018) * 0.2;
                this.glowLight.intensity = 0.65 + breath * 0.2;
            }
        }
        
        const bigStars = worksData.map(d => new BigStar(d));
        
        // ================= 4. 小星星系统 - 修复吸入问题 =================
        const TOTAL_STARS = 2800;
        const ORBIT_RADIUS_MIN = 24;
        const ORBIT_RADIUS_MAX = 52;
        const ATTRACT_RADIUS = 7.5;  // 吸引半径
        
        class SmallStar {
            constructor() {
                this.orbitRadius = ORBIT_RADIUS_MIN + Math.random() * (ORBIT_RADIUS_MAX - ORBIT_RADIUS_MIN);
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.orbitSpeed = 0.0007 + Math.random() * 0.0012;
                this.yOffset = (Math.random() - 0.5) * 2.2;
                
                this.x = Math.cos(this.orbitAngle) * this.orbitRadius;
                this.z = Math.sin(this.orbitAngle) * this.orbitRadius;
                this.y = this.yOffset + Math.sin(this.orbitAngle * 2) * 0.3;
                
                this.state = 'orbit';  // 'orbit' 或 'attracted'
                this.targetBranch = null;
                this.spiralProgress = 0;
                this.spiralStartAngle = 0;
                this.spiralStartRadius = 0;
                this.isBeingAttracted = false;
                
                const geom = Math.random() > 0.6 ? 
                    new THREE.IcosahedronGeometry(0.12 + Math.random() * 0.09, 0) : 
                    new THREE.DodecahedronGeometry(0.11 + Math.random() * 0.08, 0);
                const hue = 0.55 + Math.random() * 0.35;
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(hue, 0.9, 0.65),
                    emissive: 0xaa88ff,
                    emissiveIntensity: 0.45,
                    metalness: 0.2,
                    roughness: 0.3
                });
                this.mesh = new THREE.Mesh(geom, material);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                this.active = true;
                this.initialColor = new THREE.Color().setHSL(hue, 0.9, 0.65);
                this.phase = Math.random() * Math.PI * 2;
                this.rotSpeedX = 0.02 + Math.random() * 0.03;
                this.rotSpeedY = 0.02 + Math.random() * 0.03;
            }
            
            // 检查是否应该被吸引
            checkAttraction() {
                if (this.state !== 'orbit') return false;
                const distToCenter = Math.sqrt(this.x * this.x + this.z * this.z);
                // 当距离小于吸引半径时，开始被吸引
                if (distToCenter <= ATTRACT_RADIUS && !this.isBeingAttracted) {
                    this.startAttraction();
                    return true;
                }
                return false;
            }
            
            // 开始被吸引，进入螺旋支路
            startAttraction() {
                this.state = 'attracted';
                this.isBeingAttracted = true;
                const currentAngle = Math.atan2(this.z, this.x);
                // 选择最近的支路
                let bestBranch = 0;
                let minAngleDiff = Math.PI;
                for (let i = 0; i < BRANCH_ANGLES.length; i++) {
                    let diff = Math.abs(currentAngle - BRANCH_ANGLES[i]);
                    diff = Math.min(diff, Math.PI * 2 - diff);
                    if (diff < minAngleDiff) {
                        minAngleDiff = diff;
                        bestBranch = i;
                    }
                }
                this.targetBranch = bestBranch;
                this.spiralStartAngle = currentAngle;
                this.spiralStartRadius = Math.sqrt(this.x * this.x + this.z * this.z);
                this.spiralProgress = 0;
            }
            
            // 更新螺旋位置 - 沿螺旋路径坠入黑洞
            updateSpiralPosition() {
                // 螺旋进度增加，速度适中确保在四分之一圆弧内完成坠落
                this.spiralProgress += 0.022;
                
                // 到达黑洞中心，销毁并重生
                if (this.spiralProgress >= 1.0) {
                    this.destroy();
                    return false;
                }
                
                // 半径从起始半径线性下降到 2.5
                const startR = Math.min(this.spiralStartRadius, 20);
                const endR = 2.5;
                const radius = startR * (1 - this.spiralProgress) + endR * this.spiralProgress;
                
                // 螺旋角度：从起始角度平滑过渡到目标支路角度 + 90度偏移
                const branchAngle = BRANCH_ANGLES[this.targetBranch];
                let angleDiff = (branchAngle + Math.PI / 1.8) - this.spiralStartAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                const spiralAngle = this.spiralStartAngle + angleDiff * this.spiralProgress;
                
                // 计算位置，添加自然摆动
                let x = Math.cos(spiralAngle) * radius;
                let z = Math.sin(spiralAngle) * radius;
                const sway = Math.sin(this.spiralProgress * Math.PI * 2 + this.phase) * 0.35;
                const perpX = -Math.sin(spiralAngle) * sway;
                const perpZ = Math.cos(spiralAngle) * sway;
                x += perpX;
                z += perpZ;
                const y = Math.sin(this.spiralProgress * Math.PI * 1.5) * 0.35;
                
                this.x = x;
                this.z = z;
                this.y = y;
                this.mesh.position.set(x, y, z);
                
                // 靠近黑洞时变红变亮
                const proximity = Math.max(0, Math.min(1, (radius - 2.2) / 10));
                this.mesh.material.emissiveIntensity = 0.5 + (1 - proximity) * 1.2;
                
                if (radius < 5.5) {
                    const hotMix = 1 - (radius - 2.2) / 3.5;
                    this.mesh.material.color.setRGB(1.0, 0.4 + hotMix * 0.5, 0.2 + hotMix * 0.5);
                } else {
                    this.mesh.material.color = this.initialColor;
                }
                
                return true;
            }
            
            // 更新圆周运动位置
            updateOrbitPosition() {
                this.orbitAngle += this.orbitSpeed;
                if (this.orbitAngle > Math.PI * 2) this.orbitAngle -= Math.PI * 2;
                this.x = Math.cos(this.orbitAngle) * this.orbitRadius;
                this.z = Math.sin(this.orbitAngle) * this.orbitRadius;
                this.y = this.yOffset + Math.sin(this.orbitAngle * 2) * 0.25;
                this.mesh.position.set(this.x, this.y, this.z);
                this.mesh.material.color = this.initialColor;
                this.mesh.material.emissiveIntensity = 0.45;
                return true;
            }
            
            update() {
                if (!this.active) return false;
                
                this.mesh.rotation.x += this.rotSpeedX;
                this.mesh.rotation.y += this.rotSpeedY;
                
                if (this.state === 'orbit') {
                    this.updateOrbitPosition();
                    this.checkAttraction();
                    return true;
                } else {
                    return this.updateSpiralPosition();
                }
            }
            
            destroy() {
                this.active = false;
                createDestructionEffect(this.mesh.position.clone(), BRANCH_COLORS[this.targetBranch || 0]);
                scene.remove(this.mesh);
                // 重生一个新的星星在圆周轨道上
                setTimeout(() => {
                    const newStar = new SmallStar();
                    smallStars.push(newStar);
                }, 40);
            }
        }
        
        // 销毁特效
        function createDestructionEffect(position, color) {
            const particleCount = 80;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 0.9;
                positions[i*3+1] = (Math.random() - 0.5) * 0.9;
                positions[i*3+2] = (Math.random() - 0.5) * 0.9;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: color, size: 0.08, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geom, mat);
            particles.position.copy(position);
            scene.add(particles);
            
            let progress = 0;
            const startPos = position.clone();
            const endPos = new THREE.Vector3(0, 0, 0);
            
            function animateDestroy() {
                progress += 0.09;
                if (progress >= 1) {
                    scene.remove(particles);
                    return;
                }
                const t = Math.pow(progress, 0.7);
                particles.position.lerpVectors(startPos, endPos, t);
                particles.scale.setScalar(1 - t * 0.85);
                particles.rotation.z += 0.12;
                requestAnimationFrame(animateDestroy);
            }
            requestAnimationFrame(animateDestroy);
            
            const glowRing = new THREE.Mesh(
                new THREE.SphereGeometry(0.3, 8, 8),
                new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending })
            );
            glowRing.position.copy(position);
            scene.add(glowRing);
            let glowScale = 1;
            function animateGlow() {
                glowScale += 0.1;
                glowRing.scale.setScalar(glowScale);
                glowRing.material.opacity = 0.8 - (glowScale - 1) * 0.55;
                if (glowScale > 2.6) {
                    scene.remove(glowRing);
                    return;
                }
                requestAnimationFrame(animateGlow);
            }
            requestAnimationFrame(animateGlow);
        }
        
        let smallStars = [];
        for (let i = 0; i < TOTAL_STARS; i++) {
            smallStars.push(new SmallStar());
        }
        
        // ================= 5. 星云粒子系统 =================
        const nebulaCount = 15000;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPosArr = new Float32Array(nebulaCount * 3);
        const nebulaColors = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            const radius = 12 + Math.pow(Math.random(), 1.2) * 52;
            const angle = Math.random() * Math.PI * 2;
            const spiral = radius * 0.25;
            const finalAngle = angle + spiral;
            const yVal = Math.sin(radius * 0.4) * 1.8 + (Math.random() - 0.5) * 2.0;
            nebulaPosArr[i*3] = Math.cos(finalAngle) * radius;
            nebulaPosArr[i*3+1] = yVal * (1 - radius / 60);
            nebulaPosArr[i*3+2] = Math.sin(finalAngle) * radius;
            const mix = Math.min(1, radius / 45);
            nebulaColors[i*3] = 0.55 + mix * 0.4;
            nebulaColors[i*3+1] = 0.35 + mix * 0.45;
            nebulaColors[i*3+2] = 0.85 + mix * 0.15;
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPosArr, 3));
        nebulaGeom.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        const nebulaMat = new THREE.PointsMaterial({ size: 0.09, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const nebulaCloud = new THREE.Points(nebulaGeom, nebulaMat);
        scene.add(nebulaCloud);
        
        // 背景繁星
        const bgStarCount = 10000;
        const bgStarGeom = new THREE.BufferGeometry();
        const bgStarPos = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            bgStarPos[i*3] = (Math.random() - 0.5) * 450;
            bgStarPos[i*3+1] = (Math.random() - 0.5) * 260;
            bgStarPos[i*3+2] = (Math.random() - 0.5) * 280 - 130;
        }
        bgStarGeom.setAttribute('position', new THREE.BufferAttribute(bgStarPos, 3));
        const bgStarMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.12, transparent: true, opacity: 0.55 });
        const bgStars = new THREE.Points(bgStarGeom, bgStarMat);
        scene.add(bgStars);
        
        // 吸引范围指示环
        const attractRing = new THREE.Mesh(
            new THREE.RingGeometry(ATTRACT_RADIUS - 0.4, ATTRACT_RADIUS + 0.4, 64),
            new THREE.MeshBasicMaterial({ color: 0xff66aa, transparent: true, opacity: 0.15, side: THREE.DoubleSide })
        );
        attractRing.rotation.x = -Math.PI / 2;
        attractRing.position.y = -0.15;
        scene.add(attractRing);
        
        // ================= 音乐系统 =================
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.4;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        
        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(e => console.log("需要交互"));
            }
        }
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(err => console.log(err));
            } else {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                } else {
                    bgMusic.pause();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔇";
                }
            }
        });
        
        function showToast(title, desc, url) {
            let old = document.getElementById('dynamicToast');
            if(old) old.remove();
            const toast = document.createElement('div');
            toast.id = 'dynamicToast';
            toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将打开链接`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1800);
            setTimeout(() => toast.remove(), 2300);
            if(url) setTimeout(() => window.open(url, '_blank'), 700);
        }
        
        fetch('https://v1.hitokoto.cn')
            .then(res => res.json())
            .then(data => document.getElementById('hitokoto-display').innerHTML = `🌠 “${data.hitokoto}” — ${data.from}`)
            .catch(() => document.getElementById('hitokoto-display').innerHTML = '🌀 大范围星轨，星辰被引力捕获后沿螺旋支路坠入黑洞');
        
        // ================= 动画循环 =================
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            
            bigStars.forEach(star => star.update(time));
            
            for (let i = smallStars.length - 1; i >= 0; i--) {
                const star = smallStars[i];
                const alive = star.update();
                if (!alive) {
                    smallStars.splice(i, 1);
                }
            }
            
            nebulaCloud.rotation.y += 0.0004;
            
            innerAcc.rotation.z += 0.013;
            midAcc.rotation.z -= 0.01;
            outerAcc.rotation.z += 0.008;
            dustRing.rotation.y += 0.006;
            
            const pulse = 1 + Math.sin(time * 0.004) * 0.013;
            blackHoleCore.scale.set(pulse, pulse, pulse);
            eventHorizonGlow.scale.setScalar(1 + Math.sin(time * 0.005) * 0.028);
            coreLight.intensity = 1.1 + Math.sin(time * 0.0035) * 0.35;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("%c✨ 修复完成！小星星现在会被吸入黑洞 | 半径7.5内被吸引 | 沿螺旋支路坠落并重生 ✨", "color: #ffaa88; font-size: 14px");
    </script>
</body>
</html>
