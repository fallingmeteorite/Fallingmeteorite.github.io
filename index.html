<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>宇宙大爆炸 · 极致震撼 | fallingmeteorite</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            background: #000;
        }
        
        /* 全屏覆盖层：动态太空粉尘 + 引爆按钮 */
        .prelude-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.5s ease;
            will-change: transform, opacity;
            transform-origin: center center;
        }
        .dust-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
        }
        .bigbang-btn-overlay {
            position: relative;
            background: radial-gradient(circle at 30% 10%, #ff7e5e, #feb47b);
            border: none;
            border-radius: 80px;
            padding: 16px 48px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 310;
            box-shadow: 0 0 35px rgba(255, 80, 40, 0.8), 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            letter-spacing: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,200,100,0.9);
            font-family: monospace;
            white-space: nowrap;
            transform: scale(1);
        }
        .bigbang-btn-overlay:hover {
            transform: scale(1.03);
            box-shadow: 0 0 55px rgba(255, 100, 30, 1);
        }
        
        /* 压缩动画 */
        .compress-animation {
            transform: scale(0) translate(0, 0) !important;
            opacity: 0 !important;
            transition: transform 0.55s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.45s ease !important;
        }
        
        /* UI面板初始隐藏 */
        .info-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(8, 5, 20, 0.75); backdrop-filter: blur(14px);
            border-radius: 24px; padding: 14px 24px; z-index: 100;
            border: 1px solid rgba(180, 100, 255, 0.6);
            pointer-events: none; max-width: 440px;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .info-panel h1 { margin: 0 0 6px; font-size: 1.45rem; background: linear-gradient(135deg, #e2a5ff, #a366ff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 1px; }
        .info-panel p { margin: 4px 0; font-size: 0.82rem; opacity: 0.92; }
        .quote { font-style: italic; font-size: 0.75rem; border-top: 1px solid rgba(200, 130, 255, 0.5); margin-top: 9px; padding-top: 7px; color: #ddc9ff; }
        
        .controls-hint {
            position: absolute; bottom: 18px; left: 18px;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
            padding: 6px 16px; border-radius: 28px;
            font-size: 12px; color: #ddd; z-index: 100; pointer-events: none;
            font-family: monospace;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .music-btn {
            position: absolute; bottom: 22px; right: 22px;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
            padding: 8px 20px; border-radius: 44px; font-size: 13px; font-weight: 500;
            color: #e2b0ff; cursor: pointer; z-index: 100; border: 1px solid #b77eff;
            transition: all 0.25s ease; letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
        }
        .music-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .music-btn:hover { background: #b77eff; color: #0a0a1a; transform: scale(1.02); box-shadow: 0 0 15px #b77eff; }
        
        .star-label {
            background: radial-gradient(circle, rgba(100, 50, 160, 0.92), rgba(40, 20, 90, 0.92));
            backdrop-filter: blur(10px); padding: 6px 18px; border-radius: 60px;
            font-size: 13px; font-weight: bold; white-space: nowrap;
            border: 1px solid rgba(210, 130, 255, 0.85);
            pointer-events: auto; cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: system-ui, -apple-system, sans-serif;
            box-shadow: 0 0 12px rgba(160, 80, 255, 0.3);
        }
        .star-label:hover { transform: scale(1.08); background: radial-gradient(circle, rgba(150, 90, 240, 1), rgba(90, 50, 160, 0.98)); border-color: #ffc0ff; box-shadow: 0 0 20px #c88eff; }
        .toast-message {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            padding: 12px 28px; border-radius: 60px; color: #efcdff;
            border-top: 2px solid #cc99ff; border-bottom: 1px solid #aa77ff;
            z-index: 200; font-size: 0.85rem; font-weight: 500;
            white-space: nowrap; font-family: monospace; text-align: center;
            box-shadow: 0 0 25px rgba(170, 100, 255, 0.5);
        }
        @media (max-width: 700px) {
            .star-label { font-size: 9px; padding: 4px 12px; }
            .info-panel { padding: 8px 16px; max-width: 260px; }
            .bigbang-btn-overlay { font-size: 1.2rem; padding: 12px 28px; white-space: nowrap; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
    </style>
</head>
<body>
    <div id="preludeOverlay" class="prelude-overlay">
        <canvas id="dustCanvas" class="dust-canvas"></canvas>
        <button id="bigbangTriggerBtn" class="bigbang-btn-overlay">💥 引爆宇宙 💥</button>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <h1>🌀 星渊幻境 · 大爆炸新生</h1>
        <p>✨ fallingmeteorite · 创世纪元 ✨</p>
        <div class="quote" id="hitokoto-display">⚛️ 奇点绽放，万物伊始 ⚛️</div>
    </div>
    <div class="controls-hint" id="controlsHint">🖱️ 拖拽旋转视角 | 滚动缩放 | ✨ 点击大星探索作品 ✨</div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊共振 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ================= 1. 动态太空粉尘 Canvas =================
        const canvas = document.getElementById('dustCanvas');
        let ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        
        function initParticles() {
            particles = [];
            const particleCount = Math.min(1200, Math.floor(window.innerWidth * window.innerHeight / 3500));
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.6 + 0.2,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.3,
                    color: `hsl(${Math.random() * 80 + 200}, 70%, 65%)`
                });
            }
        }
        
        function drawDust() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#050510');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(150, 100, 255, 0.6)';
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            // 大星云光晕
            for (let i = 0; i < 40; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 4 + 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 130, 255, ${Math.random() * 0.4})`;
                ctx.fill();
            }
            animationId = requestAnimationFrame(drawDust);
        }
        
        window.addEventListener('resize', () => resizeCanvas());
        resizeCanvas();
        drawDust();
        
        // ================= 2. Three.js 场景（震撼升级版）=================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010004);
        scene.fog = new THREE.FogExp2(0x010004, 0.00003);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2200);
        camera.position.set(26, 14, 42);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);
        
        // 后期特效增强
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.9);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 1.1;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 0.9;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        let explosionPlayed = false;
        let allCosmicObjects = [];
        
        function addToUniverse(obj) {
            if (obj) {
                obj.visible = false;
                allCosmicObjects.push(obj);
                scene.add(obj);
            }
            return obj;
        }
        
        // ========= 3. 宇宙天体（极致华丽版）=========
        // 黑洞核心 + 动态吸积盘 + 粒子流
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.9, 160, 160),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.02, metalness: 0.99, emissive: 0xaa22ff, emissiveIntensity: 1.8 })
        );
        addToUniverse(blackHoleCore);
        
        // 三层吸积盘
        const accLayers = [];
        const accParams = [
            { radius: 2.55, width: 0.18, color: 0xff44aa, intensity: 1.9, tilt: 0.2 },
            { radius: 3.35, width: 0.2, color: 0xff88dd, intensity: 1.5, tilt: -0.05 },
            { radius: 4.25, width: 0.22, color: 0xcc88ff, intensity: 1.3, tilt: 0.12 }
        ];
        accParams.forEach(p => {
            const torus = new THREE.Mesh(new THREE.TorusGeometry(p.radius, p.width, 140, 400), new THREE.MeshStandardMaterial({ color: p.color, emissive: p.color, emissiveIntensity: p.intensity, transparent: true }));
            torus.rotation.x = Math.PI / 2 + p.tilt;
            addToUniverse(torus);
            accLayers.push(torus);
        });
        
        // 能量光环
        const energyRings = [];
        const ringColors = [0xff66cc, 0x88aaff, 0xffaa88];
        [2.9, 3.6, 4.4].forEach((rad, idx) => {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(rad, 0.1, 80, 300), new THREE.MeshBasicMaterial({ color: ringColors[idx], transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending }));
            ring.rotation.x = idx === 1 ? Math.PI / 2.5 : Math.PI / 2;
            if (idx === 2) ring.rotation.z = 0.5;
            addToUniverse(ring);
            energyRings.push(ring);
        });
        
        const eventGlow = new THREE.Mesh(new THREE.SphereGeometry(2.4, 80, 80), new THREE.MeshBasicMaterial({ color: 0xd066ff, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending }));
        addToUniverse(eventGlow);
        
        // 引力光环
        const gravityRing = new THREE.Mesh(new THREE.RingGeometry(16.8, 19.2, 100), new THREE.MeshBasicMaterial({ color: 0xff77aa, transparent: true, opacity: 0.6, side: THREE.DoubleSide, blending: THREE.AdditiveBlending }));
        gravityRing.rotation.x = -Math.PI / 2;
        gravityRing.position.y = -0.2;
        addToUniverse(gravityRing);
        
        // 螺旋支路粒子流（更密集）
        const BRANCH_ANGLES = [Math.PI / 4, 3 * Math.PI / 4, 5 * Math.PI / 4, 7 * Math.PI / 4];
        const BRANCH_COLORS = [0xff77bb, 0x77ffbb, 0x88aaff, 0xffaa77];
        BRANCH_ANGLES.forEach((angle, idx) => {
            const points = [];
            for (let r = 19; r > 2.2; r -= 0.2) {
                const t = (19 - r) / 16.8;
                const spiralAngle = angle + t * (Math.PI * 1.4);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.8) * 0.55;
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: BRANCH_COLORS[idx], transparent: true, opacity: 0.95 });
            addToUniverse(new THREE.Line(lineGeo, lineMat));
            
            const glowTrail = [];
            for (let r = 19; r > 2.5; r -= 1.0) {
                const t = (19 - r) / 16.5;
                const spiralAngle = angle + t * (Math.PI * 1.4);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.8) * 0.52;
                glowTrail.push(new THREE.Vector3(x, y, z));
            }
            const trailPoints = new THREE.Points(new THREE.BufferGeometry().setFromPoints(glowTrail), new THREE.PointsMaterial({ color: BRANCH_COLORS[idx], size: 0.32, transparent: true, blending: THREE.AdditiveBlending }));
            addToUniverse(trailPoints);
        });
        
        // 星云粒子系统（大量）
        const nebulaCount = 5500;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPos = [];
        for (let i = 0; i < nebulaCount; i++) {
            const rad = 20 + Math.random() * 70;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 12;
            nebulaPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(nebulaPos), 3));
        const nebulaPoints = new THREE.Points(nebulaGeom, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.2, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending }));
        addToUniverse(nebulaPoints);
        
        // 繁星背景
        const starCount = 10000;
        const starGeom = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < starCount; i++) starPos.push((Math.random() - 0.5) * 700, (Math.random() - 0.5) * 450, (Math.random() - 0.5) * 550 - 150);
        starGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starsField = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xbdd4ff, size: 0.14, transparent: true, opacity: 0.7 }));
        addToUniverse(starsField);
        
        // 黑洞周围吸入粒子流（动态效果）
        const inflowCount = 4000;
        const inflowGeom = new THREE.BufferGeometry();
        const inflowPos = [];
        for (let i = 0; i < inflowCount; i++) {
            const rad = 5 + Math.random() * 12;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 4;
            inflowPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
        }
        inflowGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(inflowPos), 3));
        const inflowPoints = new THREE.Points(inflowGeom, new THREE.PointsMaterial({ color: 0xffaa88, size: 0.12, blending: THREE.AdditiveBlending }));
        addToUniverse(inflowPoints);
        
        // 光源
        const coreLight = new THREE.PointLight(0xff44cc, 2.2, 70);
        coreLight.position.set(0, 0, 0);
        addToUniverse(coreLight);
        const fillLights = [
            new THREE.PointLight(0xaa88ff, 1.0), new THREE.PointLight(0xff77aa, 0.8)
        ];
        fillLights[0].position.set(8, 7, 9);
        fillLights[1].position.set(-6, 5, 12);
        fillLights.forEach(l => addToUniverse(l));
        const ambient = new THREE.AmbientLight(0x15112a);
        scene.add(ambient);
        
        // 黑洞标签
        const blackLabelDiv = document.createElement('div');
        blackLabelDiv.className = 'star-label';
        blackLabelDiv.innerHTML = `🌀 奇点深渊 🌀`;
        blackLabelDiv.style.background = "rgba(0,0,0,0.85)";
        blackLabelDiv.style.border = "2px solid #ff44aa";
        const blackLabel = new CSS2DObject(blackLabelDiv);
        blackLabel.position.set(0, 2.5, 0);
        addToUniverse(blackLabel);
        
        // 作品大星星
        const worksData = [
            { name: "task_scheduling", desc: "⚙️ 高级Python调度器", link: "https://github.com/fallingmeteorite/task_scheduling", color: 0x6c9eff, icon: "✨" },
            { name: "BilBil 主页", desc: "🎬 创意空间", link: "https://space.bilibili.com/1484690146", color: 0x88ddff, icon: "📺" },
            { name: "nsfw-image-check", desc: "🔞 ComfyUI 鉴黄节点", link: "https://github.com/fallingmeteorite/nsfw-image-check-comfyui", color: 0xdd88aa, icon: "🔍" },
            { name: "registry_cleaner", desc: "🧹 注册表清理工具", link: "https://github.com/fallingmeteorite/registry_cleaner", color: 0x77cc88, icon: "🧰" },
            { name: "Illustrate_AI_toolbox", desc: "🎨 依绘工具箱", link: "https://github.com/fallingmeteorite/Illustrate_AI_toolbox", color: 0xffaa88, icon: "🖌️" },
            { name: "Lora_box", desc: "📦 Lora 一键包", link: "https://github.com/fallingmeteorite/Lora_box", color: 0xdd99ff, icon: "💎" },
            { name: "GITHUB 主页", desc: "🐙 开源宇宙", link: "https://github.com/fallingmeteorite/", color: 0xccccdd, icon: "⭐" },
            { name: "task_scheduling文档", desc: "📖 详细说明库", link: "https://fallingmeteorite.github.io/task_scheduling/", color: 0xff99cc, icon: "📘" }
        ];
        
        function createStarShape(color, sz = 0.5) {
            const geom = new THREE.IcosahedronGeometry(sz, 0);
            const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 1.0, metalness: 0.3, roughness: 0.2 });
            return new THREE.Mesh(geom, mat);
        }
        
        class BigStar {
            constructor(data) {
                this.data = data;
                const radius = 24 + Math.random() * 28;
                const angle = Math.random() * Math.PI * 2;
                this.radius = radius;
                this.angle = angle;
                this.yOffset = (Math.random() - 0.5) * 3.5;
                this.speed = 0.00025 + Math.random() * 0.0006;
                this.x = Math.cos(angle) * radius;
                this.z = Math.sin(angle) * radius;
                this.y = this.yOffset;
                this.mesh = createStarShape(data.color, 0.5);
                this.mesh.position.set(this.x, this.y, this.z);
                addToUniverse(this.mesh);
                this.glow = new THREE.PointLight(data.color, 1.0, 25);
                this.mesh.add(this.glow);
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc}</small>`;
                div.addEventListener('click', (e) => { e.stopPropagation(); showToast(data.name, data.desc, data.link); });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.9, this.z);
                addToUniverse(this.label);
            }
            update(t) {
                if (!this.mesh.visible) return;
                this.angle += this.speed;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(t * 0.0007) * 0.2;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.95, this.z);
                this.mesh.rotation.y += 0.004;
                this.glow.intensity = 0.9 + Math.sin(t * 0.0025) * 0.4;
            }
        }
        const bigStars = worksData.map(d => new BigStar(d));
        
        // 小型星星（引力坠落优化）
        const STAR_TOTAL = 3200;
        const ATTRACT_RADIUS = 18.5;
        const GRAVITY = 0.0012;
        
        class SmallStar {
            constructor(type, customRad = null) {
                this.type = type;
                this.gravity = (type !== 'orbit-only');
                this.rad = customRad !== null ? customRad : (this.gravity ? 26 + Math.random() * 28 : 32 + Math.random() * 32);
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.0006 + Math.random() * 0.0018;
                this.yOff = (Math.random() - 0.5) * 3.2;
                this.x = Math.cos(this.angle) * this.rad;
                this.z = Math.sin(this.angle) * this.rad;
                this.y = this.yOff + Math.sin(this.angle * 2) * 0.4;
                this.state = 'orbit';
                this.targetBranch = 0;
                this.spiral = 0;
                this.spiralStartAng = 0;
                this.spiralStartRad = 0;
                const hue = this.gravity ? 0.02 + Math.random() * 0.15 : 0.55 + Math.random() * 0.3;
                const baseCol = new THREE.Color().setHSL(hue, 0.95, 0.65);
                const geom = new THREE.IcosahedronGeometry(0.14 + Math.random() * 0.1, 0);
                const mat = new THREE.MeshStandardMaterial({ color: baseCol, emissive: this.gravity ? 0xff5533 : 0x4488ff, emissiveIntensity: this.gravity ? 0.85 : 0.6, metalness: 0.2 });
                this.mesh = new THREE.Mesh(geom, mat);
                this.mesh.position.set(this.x, this.y, this.z);
                addToUniverse(this.mesh);
                this.active = true;
                this.baseColor = baseCol.clone();
                this.phase = Math.random() * Math.PI * 2;
                this.rotSpeed = 0.012 + Math.random() * 0.03;
            }
            updateOrbit() {
                if (this.gravity && this.state === 'orbit') {
                    this.rad -= GRAVITY;
                    if (this.rad <= ATTRACT_RADIUS) { this.startFall(); return true; }
                    if (this.rad < 28) this.speed = 0.0018 + (30 - this.rad) * 0.00025;
                }
                this.angle += this.speed;
                this.x = Math.cos(this.angle) * this.rad;
                this.z = Math.sin(this.angle) * this.rad;
                this.y = this.yOff + Math.sin(this.angle * 2) * 0.38;
                this.mesh.position.set(this.x, this.y, this.z);
                if (this.gravity && this.rad < 30) {
                    const intens = 0.9 + (32 - this.rad) * 0.1;
                    this.mesh.material.emissiveIntensity = Math.min(2.2, intens);
                } else this.mesh.material.emissiveIntensity = this.gravity ? 0.85 : 0.6;
                return true;
            }
            startFall() {
                this.state = 'fall';
                const curAng = Math.atan2(this.z, this.x);
                let best = 0, minD = Math.PI;
                for (let i = 0; i < BRANCH_ANGLES.length; i++) {
                    let d = Math.abs(curAng - BRANCH_ANGLES[i]);
                    d = Math.min(d, Math.PI * 2 - d);
                    if (d < minD) { minD = d; best = i; }
                }
                this.targetBranch = best;
                this.spiralStartAng = curAng;
                this.spiralStartRad = Math.sqrt(this.x*this.x + this.z*this.z);
                this.spiral = 0;
            }
            updateFall() {
                let delta = 0.025;
                if (this.spiral > 0.45) delta = 0.04;
                if (this.spiral > 0.8) delta = 0.065;
                this.spiral += delta;
                if (this.spiral >= 1.0) { this.destroy(); return false; }
                const rad = this.spiralStartRad * (1 - this.spiral) + 2.4 * this.spiral;
                const branchAng = BRANCH_ANGLES[this.targetBranch];
                let angDiff = (branchAng + Math.PI / 2.2) - this.spiralStartAng;
                while (angDiff > Math.PI) angDiff -= Math.PI*2;
                while (angDiff < -Math.PI) angDiff += Math.PI*2;
                let spiralAng = this.spiralStartAng + angDiff * this.spiral;
                spiralAng += Math.sin(this.spiral * Math.PI * 2.8) * 0.3;
                let x = Math.cos(spiralAng) * rad;
                let z = Math.sin(spiralAng) * rad;
                const sway = Math.sin(this.spiral * Math.PI * 4.5 + this.phase) * 0.22;
                x += -Math.sin(spiralAng) * sway;
                z += Math.cos(spiralAng) * sway;
                const y = Math.sin(this.spiral * Math.PI) * 0.65 * (1 - this.spiral * 0.6);
                this.mesh.position.set(x, y, z);
                const heat = Math.max(0.5, 1 - (rad-2)/14);
                this.mesh.material.emissiveIntensity = 1.3 + (1 - heat) * 2.4;
                if (rad < 6) this.mesh.material.color.setRGB(1.0, 0.35, 0.2);
                else this.mesh.material.color = this.baseColor;
                return true;
            }
            update() {
                if (!this.active) return false;
                this.mesh.rotation.x += this.rotSpeed;
                this.mesh.rotation.y += this.rotSpeed * 0.9;
                if (this.state === 'orbit') return this.updateOrbit();
                else return this.updateFall();
            }
            destroy() {
                this.active = false;
                scene.remove(this.mesh);
                if (this.gravity && this.mesh.visible) {
                    setTimeout(() => { smallStars.push(new SmallStar('falling', 34 + Math.random() * 24)); }, 50);
                }
            }
        }
        
        let smallStars = [];
        for (let i = 0; i < STAR_TOTAL; i++) {
            const type = Math.random() < 0.7 ? 'falling' : 'orbit-only';
            smallStars.push(new SmallStar(type));
        }
        for (let i = 0; i < 180; i++) smallStars.push(new SmallStar('falling', 17 + Math.random() * 6));
        
        // 流星雨（更多、更长）
        class Meteor {
            constructor() { this.active = true; this.reset(); }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const startRad = 50 + Math.random() * 32;
                this.sx = Math.cos(angle) * startRad;
                this.sz = Math.sin(angle) * startRad;
                this.sy = (Math.random() - 0.5) * 16;
                const tAngle = angle + (Math.random() - 0.5) * 1.8;
                this.ex = Math.cos(tAngle) * 5.5;
                this.ez = Math.sin(tAngle) * 5.5;
                this.ey = (Math.random() - 0.5) * 6;
                this.prog = 0;
                this.speed = 0.007 + Math.random() * 0.012;
                this.color = new THREE.Color().setHSL(0.05 + Math.random() * 0.2, 1.0, 0.7);
                this.geom = new THREE.BufferGeometry();
                this.obj = new THREE.Points(this.geom, new THREE.PointsMaterial({ color: this.color, size: 0.28, blending: THREE.AdditiveBlending }));
                scene.add(this.obj);
                if (!explosionPlayed) this.obj.visible = false;
                else this.obj.visible = true;
            }
            update() {
                if (!this.active) return false;
                this.prog += this.speed;
                if (this.prog >= 1) { scene.remove(this.obj); return false; }
                const t = this.prog;
                const x = this.sx * (1 - t) + this.ex * t;
                const z = this.sz * (1 - t) + this.ez * t;
                const y = this.sy * (1 - t) + this.ey * t;
                const trail = [];
                for (let i = 0; i <= 15; i++) {
                    const pt = Math.max(0, t - i * 0.018);
                    if (pt >= 0) {
                        const tx = this.sx * (1 - pt) + this.ex * pt;
                        const tz = this.sz * (1 - pt) + this.ez * pt;
                        const ty = this.sy * (1 - pt) + this.ey * pt;
                        trail.push(tx, ty, tz);
                    }
                }
                if (this.obj.geometry) this.obj.geometry.dispose();
                const newGeom = new THREE.BufferGeometry();
                newGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(trail), 3));
                this.obj.geometry = newGeom;
                return true;
            }
        }
        let meteors = [];
        function spawnMeteor() { if (explosionPlayed && meteors.length < 14 && Math.random() < 0.03) meteors.push(new Meteor()); }
        
        // ========= 震撼爆炸特效：多重冲击波 + 屏幕震动 =========
        function createShockwave() {
            const ringGeo = new THREE.RingGeometry(0.5, 1.2, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffaa66, transparent: true, opacity: 0.9, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(0, 0, 0);
            scene.add(ring);
            let scale = 1;
            function expand() {
                scale += 0.18;
                ring.scale.set(scale, scale, 1);
                ring.material.opacity = 0.9 - (scale - 1) * 0.03;
                if (scale < 18) requestAnimationFrame(expand);
                else scene.remove(ring);
            }
            requestAnimationFrame(expand);
        }
        
        function screenShake() {
            let intensity = 0.25;
            let duration = 30;
            let originalPos = camera.position.clone();
            function shake() {
                if (duration <= 0) {
                    camera.position.copy(originalPos);
                    return;
                }
                camera.position.x = originalPos.x + (Math.random() - 0.5) * intensity;
                camera.position.y = originalPos.y + (Math.random() - 0.5) * intensity;
                intensity *= 0.85;
                duration--;
                requestAnimationFrame(shake);
            }
            shake();
        }
        
        function createBigBang() {
            // 主粒子云
            const pCount = 2800;
            const geom = new THREE.BufferGeometry();
            const pos = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount; i++) {
                pos[i*3] = (Math.random() - 0.5) * 3;
                pos[i*3+1] = (Math.random() - 0.5) * 3;
                pos[i*3+2] = (Math.random() - 0.5) * 3;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const pMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.38, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geom, pMat);
            scene.add(particles);
            
            // 高温粒子
            const hotCount = 1800;
            const hotGeom = new THREE.BufferGeometry();
            const hotPos = [];
            for (let i = 0; i < hotCount; i++) hotPos.push((Math.random() - 0.5) * 3.5, (Math.random() - 0.5) * 3.5, (Math.random() - 0.5) * 3.5);
            hotGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(hotPos), 3));
            const hotMat = new THREE.PointsMaterial({ color: 0xff4422, size: 0.34, blending: THREE.AdditiveBlending });
            const hotParticles = new THREE.Points(hotGeom, hotMat);
            scene.add(hotParticles);
            
            // 全屏闪光
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = '#fff';
            flash.style.zIndex = '350';
            flash.style.opacity = '1';
            flash.style.pointerEvents = 'none';
            flash.style.transition = 'opacity 0.4s ease';
            document.body.appendChild(flash);
            setTimeout(() => flash.style.opacity = '0', 150);
            setTimeout(() => flash.remove(), 650);
            
            let frame = 0;
            function boomAnim() {
                frame++;
                const alpha = Math.max(0, 1 - frame / 42);
                pMat.opacity = alpha * 0.95;
                hotMat.opacity = alpha * 0.9;
                particles.scale.setScalar(1 + frame * 0.65);
                hotParticles.scale.setScalar(1 + frame * 0.6);
                if (frame > 50) {
                    scene.remove(particles);
                    scene.remove(hotParticles);
                    return;
                }
                requestAnimationFrame(boomAnim);
            }
            requestAnimationFrame(boomAnim);
            
            // 多重冲击波
            for (let i = 0; i < 3; i++) setTimeout(() => createShockwave(), i * 80);
            
            // 屏幕震动
            screenShake();
            
            // 音效（更震撼）
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 60;
                gain.gain.value = 0.7;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
                osc.stop(now + 1.5);
                
                // 低频轰鸣
                const sub = audioCtx.createOscillator();
                const subGain = audioCtx.createGain();
                sub.connect(subGain);
                subGain.connect(audioCtx.destination);
                sub.frequency.value = 35;
                subGain.gain.value = 0.5;
                sub.start();
                subGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
                sub.stop(now + 1.2);
            } catch(e) {}
        }
        
        function revealUniverse() {
            allCosmicObjects.forEach(obj => { if (obj) obj.visible = true; });
            explosionPlayed = true;
            document.getElementById('infoPanel').style.opacity = '1';
            document.getElementById('controlsHint').style.opacity = '1';
            document.getElementById('musicToggleBtn').classList.add('visible');
            if (bgMusic && !musicStarted) startMusic();
            setInterval(() => spawnMeteor(), 700);
        }
        
        function startCompressionAndBang() {
            const overlay = document.getElementById('preludeOverlay');
            const btn = document.getElementById('bigbangTriggerBtn');
            if (!overlay) return;
            overlay.classList.add('compress-animation');
            btn.style.transform = 'scale(0)';
            btn.style.opacity = '0';
            setTimeout(() => {
                if (overlay.parentNode) overlay.remove();
                if (animationId) cancelAnimationFrame(animationId);
                createBigBang();
                revealUniverse();
            }, 580);
        }
        
        document.getElementById('bigbangTriggerBtn').addEventListener('click', startCompressionAndBang);
        
        // 音乐本地
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.28;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        function startMusic() { if (!musicStarted && bgMusic) { bgMusic.play().then(() => { musicStarted = true; musicBtn.innerHTML = "🎵 星渊共振 🔊"; }).catch(()=>{}); } }
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) startMusic();
            else if (bgMusic.paused) { bgMusic.play(); musicBtn.innerHTML = "🎵 星渊共振 🔊"; }
            else { bgMusic.pause(); musicBtn.innerHTML = "🎵 星渊共振 🔇"; }
        });
        
        function showToast(title, desc, url) {
            const toast = document.createElement('div'); toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将跳转`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1700);
            setTimeout(() => toast.remove(), 2200);
            if (url) setTimeout(() => window.open(url, '_blank'), 650);
        }
        fetch('https://v1.hitokoto.cn').then(res => res.json()).then(data => document.getElementById('hitokoto-display').innerHTML = `🌌 “${data.hitokoto}” — ${data.from}`).catch(() => {});
        
        // 动画循环
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            bigStars.forEach(s => s.update(time));
            for (let i = smallStars.length-1; i >= 0; i--) if (!smallStars[i].update()) smallStars.splice(i,1);
            for (let i = meteors.length-1; i >= 0; i--) if (!meteors[i].update()) meteors.splice(i,1);
            
            if (explosionPlayed) {
                nebulaPoints.rotation.y += 0.00025;
                inflowPoints.rotation.y -= 0.004;
                gravityRing.rotation.z += 0.003;
                energyRings.forEach((r, idx) => {
                    r.rotation.z += 0.007;
                    if (idx === 1) r.rotation.x += 0.003;
                });
                accLayers.forEach((a, i) => {
                    a.rotation.z += i === 0 ? 0.014 : (i === 1 ? -0.012 : 0.01);
                });
                const pulse = 1 + Math.sin(time * 0.0045) * 0.02;
                blackHoleCore.scale.set(pulse, pulse, pulse);
                eventGlow.scale.setScalar(1 + Math.sin(time * 0.006) * 0.04);
                coreLight.intensity = 1.5 + Math.sin(time * 0.004) * 0.6;
            }
            controls.update();
            effectComposer.render();
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            resizeCanvas();
        });
    </script>
