<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星云漩涡 | 黑洞吞噬小星辰 · 作品永恒漂浮</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            color: white;
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 22px;
            z-index: 100;
            border: 1px solid rgba(200, 100, 255, 0.7);
            pointer-events: none;
            font-family: monospace;
            max-width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .info-panel h1 {
            margin: 0 0 5px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .info-panel p { margin: 4px 0; font-size: 0.8rem; opacity: 0.9; }
        .quote { font-style: italic; font-size: 0.75rem; border-top: 1px solid rgba(200,100,255,0.4); margin-top: 8px; padding-top: 6px; }
        
        .controls-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #ccc;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        
        .music-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #d4a5ff;
            cursor: pointer;
            z-index: 100;
            border: 1px solid #a855f7;
            font-family: monospace;
            transition: 0.2s;
            pointer-events: auto;
            font-weight: 500;
        }
        .music-btn:hover {
            background: #a855f7;
            color: black;
            transform: scale(1.02);
        }
        
        .star-label {
            background: radial-gradient(circle, rgba(80, 40, 140, 0.9), rgba(40, 20, 80, 0.85));
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid rgba(200, 120, 255, 0.6);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Segoe UI', monospace;
            box-shadow: 0 0 20px rgba(160, 80, 255, 0.3);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .star-label:hover {
            transform: scale(1.1);
            background: radial-gradient(circle, rgba(120, 70, 200, 0.95), rgba(80, 40, 140, 0.9));
            border-color: #ffaaee;
            box-shadow: 0 0 30px rgba(200, 100, 255, 0.8);
        }
        .star-label small {
            font-size: 9px;
            opacity: 0.85;
            font-weight: normal;
        }
        
        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            color: #e2b0ff;
            border-top: 2px solid #c084fc;
            z-index: 200;
            font-size: 0.85rem;
            text-align: center;
            white-space: nowrap;
            font-family: monospace;
            transition: opacity 0.3s;
            pointer-events: none;
            font-weight: 500;
        }
        
        @media (max-width: 700px) {
            .star-label { font-size: 10px; padding: 4px 12px; }
            .info-panel { padding: 8px 15px; max-width: 240px; font-size: 11px; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
        
        /* 修复CSS2D渲染器阻止canvas鼠标事件的问题 */
        .css2d-object {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🌀 奇点 · Fallingmeteorite</h1>
        <p>✨ 高中开发者 | 星辰造物主 ✨</p>
        <p>📡 求知若饥 · 虚心若愚</p>
        <div class="quote" id="hitokoto-display">🌠 星云旋涡，小星辰被吞噬，作品永恒漂浮...</div>
    </div>
    <div class="controls-hint">
        🖱️ 鼠标拖拽旋转视角 | 右键平移 | 滚动缩放 | ✨ 点击大星星探索作品 ✨ | 🌟 小星星会被黑洞吸入并在远处重生
    </div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊旋律 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020008);
        scene.fog = new THREE.FogExp2(0x020008, 0.0002); // 降低雾浓度，提升远景可见度
        
        // 透视相机: 视野, 宽高比, 近平面, 远平面
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(5, 6, 22);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = false; // 提升性能
        document.body.appendChild(renderer.domElement);
        
        // CSS2渲染文字标签
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'auto';
        // 关键：让CSS2D的dom元素不拦截canvas的鼠标事件（但标签本身需要可点击）
        labelRenderer.domElement.style.zIndex = '10';
        document.body.appendChild(labelRenderer.domElement);
        
        // ========== 关键优化：OrbitControls 必须正确启用并确保鼠标事件不冲突 ==========
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;          // 惯性效果
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.5;
        controls.panSpeed = 0.8;
        controls.target.set(0, 0, 0);
        controls.update();
        
        // 确保渲染器的canvas不会被动拦截鼠标事件（但OrbitControls已正常绑定）
        renderer.domElement.style.touchAction = 'none'; // 提升触摸响应
        
        // 额外：如果CSS2D标签区域遮挡，设置透明穿透，但标签本身可点击不影响。下面将CSS2D渲染器的domElement设置pointer-events: none? 不行，因为需要点击标签。
        // 但是CSS2D的容器会盖住canvas，导致canvas无法接收鼠标事件？实际上CSS2DRenderer的domElement覆盖在canvas上方，默认透明背景且不阻挡鼠标事件？它默认pointer-events是auto但因为它覆盖全屏，如果它不处理的事件会穿透？需设置为none让canvas接收事件，但标签需要可点击，所以对标签单独设置pointer-events:auto，父容器穿透。
        // 更好的方案：让CSS2D渲染器的根容器不拦截鼠标事件，而内部的标签元素自己接收。
        labelRenderer.domElement.style.pointerEvents = 'none';
        // 但这样所有CSS2D对象都无法点击，需要将每个标签的div样式覆盖回auto
        // 在创建CSS2DObject时通过element.style.pointerEvents = 'auto' 会在后面设置。
        // 我们将所有标签在创建时强制设置pointer-events:auto
        
        // ================= 1. 黑洞核心与吸积盘 =================
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.45, 128, 128),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.08, metalness: 0.92, emissive: 0x330033, emissiveIntensity: 0.65 })
        );
        scene.add(blackHoleCore);
        
        // 内吸积盘 (高亮)
        const accretionInner = new THREE.Mesh(
            new THREE.TorusGeometry(2.05, 0.1, 80, 220),
            new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288, emissiveIntensity: 1.0, transparent: true })
        );
        accretionInner.rotation.x = Math.PI / 2 + 0.15;
        scene.add(accretionInner);
        
        const accretionOuter = new THREE.Mesh(
            new THREE.TorusGeometry(2.85, 0.16, 96, 280),
            new THREE.MeshStandardMaterial({ color: 0xcc66ff, emissive: 0x8833cc, emissiveIntensity: 0.75, transparent: true })
        );
        accretionOuter.rotation.x = Math.PI / 2 - 0.05;
        scene.add(accretionOuter);
        
        // 尘埃晕
        const dustCount = 2800;
        const dustGeo = new THREE.BufferGeometry();
        const dustPositions = [];
        for (let i = 0; i < dustCount; i++) {
            const r = 1.7 + Math.random() * 1.7;
            const theta = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.3;
            dustPositions.push(Math.cos(theta) * r, yOff, Math.sin(theta) * r);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPositions), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0xff99cc, size: 0.045, blending: THREE.AdditiveBlending });
        const dustHalo = new THREE.Points(dustGeo, dustMat);
        scene.add(dustHalo);
        
        // 黑洞标签 (只展示信息，不可点击)
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 奇点 · Fallingmeteorite 🌀<br><small>「高中开发者 | 全栈/逆向/UE5/硬件」</small>`;
        blackHoleDiv.style.background = "rgba(10,0,20,0.9)";
        blackHoleDiv.style.border = "1px solid #ff66cc";
        blackHoleDiv.style.pointerEvents = "none";
        blackHoleDiv.style.cursor = "default";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 1.4, 0);
        scene.add(blackHoleLabel);
        
        // 光源系统
        const ambientLight = new THREE.AmbientLight(0x181830);
        scene.add(ambientLight);
        const coreLight = new THREE.PointLight(0xcc55ff, 1.2, 32);
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);
        const fillLight = new THREE.PointLight(0x8866cc, 0.6);
        fillLight.position.set(5, 4, 6);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x4488ff, 0.45);
        backLight.position.set(-3, 2, -7);
        scene.add(backLight);
        
        // ================= 2. 星云粒子系统 (华丽漩涡) =================
        const nebulaCount = 10000;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPos = new Float32Array(nebulaCount * 3);
        const nebulaColorArr = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            const radius = 3.0 + Math.pow(Math.random(), 1.3) * 28;
            const angle = Math.random() * Math.PI * 2;
            const spiral = radius * 0.42;
            const finalAngle = angle + spiral;
            const yVal = Math.sin(radius * 0.7) * 1.1 + (Math.random() - 0.5) * 1.6;
            const x = Math.cos(finalAngle) * radius;
            const z = Math.sin(finalAngle) * radius;
            nebulaPos[i*3] = x;
            nebulaPos[i*3+1] = yVal * (1 - radius / 32) * 0.9;
            nebulaPos[i*3+2] = z;
            // 颜色：紫蓝到粉红渐变
            const mixT = Math.min(1, radius / 24);
            nebulaColorArr[i*3] = 0.5 + mixT * 0.5;   // R
            nebulaColorArr[i*3+1] = 0.3 + mixT * 0.4; // G
            nebulaColorArr[i*3+2] = 0.8 + mixT * 0.2; // B
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
        nebulaGeom.setAttribute('color', new THREE.BufferAttribute(nebulaColorArr, 3));
        const nebulaMatPoints = new THREE.PointsMaterial({ size: 0.085, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const nebulaCloud = new THREE.Points(nebulaGeom, nebulaMatPoints);
        scene.add(nebulaCloud);
        
        const mistCount = 5000;
        const mistGeom = new THREE.BufferGeometry();
        const mistPositions = new Float32Array(mistCount * 3);
        for (let i = 0; i < mistCount; i++) {
            const r = 10 + Math.random() * 24;
            const ang = Math.random() * Math.PI * 2;
            const sp = r * 0.28;
            const x = Math.cos(ang + sp) * r;
            const z = Math.sin(ang + sp) * r;
            const y = (Math.random() - 0.5) * 2.8;
            mistPositions[i*3] = x;
            mistPositions[i*3+1] = y;
            mistPositions[i*3+2] = z;
        }
        mistGeom.setAttribute('position', new THREE.BufferAttribute(mistPositions, 3));
        const mistMatPoints = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.07, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
        const starMist = new THREE.Points(mistGeom, mistMatPoints);
        scene.add(starMist);
        
        // ================= 3. 大星星 (永恒漂浮作品) =================
        const worksData = [
            { name: "💻 星轨编译器", desc: "Python字节码分析工具 · 可视化执行流", link: "https://github.com/fallingmeteorite/star-compiler", color: 0x6c9eff, icon: "🪐" },
            { name: "🎮 流光·虚幻引擎", desc: "UE5开放世界 · 动态星空粒子系统", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0x88ddff, icon: "✨" },
            { name: "🔧 逆向星芒", desc: "软件逆向分析笔记 & CTF 实战库", link: "https://github.com/fallingmeteorite/reverse-constellation", color: 0xdd88aa, icon: "⚙️" },
            { name: "🤖 星尘·嵌入式OS", desc: "STM32微型实时系统 · 星图显示", link: "https://github.com/fallingmeteorite/stardust-rtos", color: 0x77cc88, icon: "📡" },
            { name: "📡 流星信标", desc: "全栈导航站 + 动态星空API", link: "https://github.com/fallingmeteorite/meteor-beacon", color: 0xffaa88, icon: "🌠" },
            { name: "🎨 光源AI绘画盒子", desc: "AI创意工具 · 社区生成平台", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0xdd99ff, icon: "🎨" },
            { name: "🌌 星尘档案馆", desc: "全部开源项目索引与开发日志", link: "https://github.com/fallingmeteorite", color: 0xccccdd, icon: "⭐" },
            { name: "🌀 黑洞边缘实验室", desc: "WebGL奇幻交互实验 & 粒子系统", link: "https://github.com/fallingmeteorite/horizon-lab", color: 0xff99cc, icon: "🌌" },
            { name: "📖 星海博客", desc: "技术随笔与星空哲思", link: "https://fallingmeteorite.github.io", color: 0xffaa77, icon: "📖" },
            { name: "🔮 幻境渲染器", desc: "实时体积光与星云渲染实验", link: "https://github.com/fallingmeteorite/nebula-render", color: 0x77aaff, icon: "🔮" }
        ];
        
        class BigStar {
            constructor(data) {
                this.data = data;
                const radius = 8.5 + Math.random() * 20;
                const angle = Math.random() * Math.PI * 2;
                const spiralOffset = radius * 0.32;
                this.angle = angle + spiralOffset;
                this.radius = radius;
                this.yOffset = (Math.random() - 0.5) * 2.0;
                this.orbitSpeed = 0.0012 + Math.random() * 0.0018;
                this.floatSpeed = Math.random() * 0.5 + 0.3;
                this.initPos();
                
                const geometry = new THREE.SphereGeometry(0.34 + Math.random() * 0.12, 48, 48);
                const material = new THREE.MeshStandardMaterial({ 
                    color: data.color, 
                    emissive: data.color, 
                    emissiveIntensity: 0.7,
                    metalness: 0.35,
                    roughness: 0.2
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                
                this.glowLight = new THREE.PointLight(data.color, 0.75, 12);
                this.mesh.add(this.glowLight);
                
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc.substring(0, 28)}…</small>`;
                div.style.cursor = 'pointer';
                div.style.pointerEvents = 'auto';  // 确保可点击
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast(data.name, data.desc, data.link);
                    this.mesh.material.emissiveIntensity = 1.4;
                    this.glowLight.intensity = 1.3;
                    setTimeout(() => {
                        if(this.mesh.material) this.mesh.material.emissiveIntensity = 0.7;
                        if(this.glowLight) this.glowLight.intensity = 0.75;
                    }, 450);
                });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.52, this.z);
                scene.add(this.label);
            }
            
            initPos() {
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset;
            }
            
            update(time) {
                this.angle += this.orbitSpeed;
                if (this.angle > Math.PI * 2) this.angle -= Math.PI * 2;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(time * 0.0012 * this.floatSpeed + this.radius) * 0.12;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.55, this.z);
                const breath = 0.6 + Math.sin(time * 0.0025) * 0.2;
                this.glowLight.intensity = 0.6 + breath * 0.25;
            }
        }
        
        const bigStars = [];
        worksData.forEach(data => {
            bigStars.push(new BigStar(data));
        });
        
        // ================= 4. 小星星粒子 (被黑洞吸引，吸入后重生) =================
        const SMALL_STAR_COUNT = 2100;
        const ABSORB_RADIUS = 2.0;
        
        class SmallStar {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.radius = 4.5 + Math.random() * 30;
                this.angle = Math.random() * Math.PI * 2;
                const spiral = this.radius * 0.28;
                this.angle += spiral;
                this.yOffset = (Math.random() - 0.5) * 2.8;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset * (this.radius / 22);
                this.fallSpeed = 0.0028 + Math.random() * 0.005;
                this.orbitSpeed = 0.007 + Math.random() * 0.012;
                const colorVal = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.8, 0.6);
                const geometry = new THREE.SphereGeometry(0.11 + Math.random() * 0.09, 20, 20);
                const material = new THREE.MeshStandardMaterial({ 
                    color: colorVal, 
                    emissive: 0xaa88ff, 
                    emissiveIntensity: 0.4,
                    metalness: 0.1
                });
                if (this.mesh) scene.remove(this.mesh);
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                this.active = true;
            }
            
            update() {
                if (!this.active) return false;
                this.radius -= this.fallSpeed;
                const speedFactor = 1 + Math.max(0, (1 - this.radius / 12) * 1.5);
                this.angle += this.orbitSpeed * speedFactor;
                
                if (this.radius <= ABSORB_RADIUS) {
                    this.absorb();
                    return false;
                }
                
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset * (this.radius / 22) * 0.9;
                this.mesh.position.set(this.x, this.y, this.z);
                
                const proximity = Math.min(1, Math.max(0, (this.radius - 1.5) / 8));
                const intensity = 0.3 + (1 - proximity) * 0.9;
                this.mesh.material.emissiveIntensity = 0.25 + (1 - proximity) * 0.8;
                if (this.radius < 4.5) {
                    const hotMix = 1 - (this.radius - 1.8) / 3;
                    this.mesh.material.color.setRGB(1.0, 0.5 + hotMix * 0.3, 0.3 + hotMix * 0.4);
                }
                return true;
            }
            
            absorb() {
                this.active = false;
                createAbsorbEffect(this.mesh.position.clone());
                scene.remove(this.mesh);
                setTimeout(() => {
                    const newStar = new SmallStar();
                    smallStars.push(newStar);
                }, 45);
            }
        }
        
        function createAbsorbEffect(pos) {
            const particleCount = 55;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 0.8;
                positions[i*3+1] = (Math.random() - 0.5) * 0.8;
                positions[i*3+2] = (Math.random() - 0.5) * 0.8;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.07, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geom, mat);
            particles.position.copy(pos);
            scene.add(particles);
            let prog = 0;
            const startPos = pos.clone();
            const endPos = new THREE.Vector3(0, 0, 0);
            function animatePart() {
                prog += 0.08;
                if (prog >= 1) {
                    scene.remove(particles);
                    return;
                }
                particles.position.lerpVectors(startPos, endPos, prog);
                particles.scale.setScalar(1 - prog * 0.9);
                requestAnimationFrame(animatePart);
            }
            requestAnimationFrame(animatePart);
        }
        
        let smallStars = [];
        for (let i = 0; i < SMALL_STAR_COUNT; i++) {
            smallStars.push(new SmallStar());
        }
        
        // 背景恒星
        const bgStarsCount = 5500;
        const bgStarsGeom = new THREE.BufferGeometry();
        const bgStarsPosArr = new Float32Array(bgStarsCount * 3);
        for (let i = 0; i < bgStarsCount; i++) {
            bgStarsPosArr[i*3] = (Math.random() - 0.5) * 280;
            bgStarsPosArr[i*3+1] = (Math.random() - 0.5) * 160;
            bgStarsPosArr[i*3+2] = (Math.random() - 0.5) * 180 - 60;
        }
        bgStarsGeom.setAttribute('position', new THREE.BufferAttribute(bgStarsPosArr, 3));
        const bgStarMat = new THREE.PointsMaterial({ color: 0xb8d0ff, size: 0.1, transparent: true, opacity: 0.6 });
        const bgStars = new THREE.Points(bgStarsGeom, bgStarMat);
        scene.add(bgStars);
        
        // ========== 音乐 ==========
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.38;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        
        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(e => console.log("自动播放需交互"));
            }
        }
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(err => console.log(err));
            } else {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                } else {
                    bgMusic.pause();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔇";
                }
            }
        });
        
        function showToast(title, desc, url) {
            let old = document.getElementById('dynamicToast');
            if(old) old.remove();
            const toast = document.createElement('div');
            toast.id = 'dynamicToast';
            toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将打开链接`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1800);
            setTimeout(() => toast.remove(), 2300);
            if(url) setTimeout(() => window.open(url, '_blank'), 650);
        }
        
        fetch('https://v1.hitokoto.cn')
            .then(res => res.json())
            .then(data => document.getElementById('hitokoto-display').innerHTML = `🌠 “${data.hitokoto}” — ${data.from}`)
            .catch(() => document.getElementById('hitokoto-display').innerHTML = '🌀 小星坠入奇点，作品永恒漂浮');
        
        // ========== 动画循环 ==========
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            
            bigStars.forEach(star => star.update(time));
            for (let i = smallStars.length-1; i >= 0; i--) {
                const star = smallStars[i];
                const alive = star.update();
                if (!alive) {
                    smallStars.splice(i, 1);
                }
            }
            
            nebulaCloud.rotation.y += 0.0012;
            starMist.rotation.y += 0.0007;
            dustHalo.rotation.y += 0.007;
            dustHalo.rotation.x += 0.0025;
            accretionInner.rotation.z += 0.01;
            accretionOuter.rotation.z -= 0.007;
            
            const pulse = 1 + Math.sin(time * 0.0035) * 0.012;
            blackHoleCore.scale.set(pulse, pulse, pulse);
            coreLight.intensity = 0.9 + Math.sin(time * 0.003) * 0.25;
            
            controls.update(); // 必须每帧调用以应用阻尼
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("%c✨ 优化完成 | 鼠标拖拽/缩放/平移完全正常 | 星辰坠落重生系统运行中 ✨", "color: #bb99ff; font-size: 14px");
    </script>
</body>
</html>
