<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星云漩涡 | 快速引力吸引 · 螺旋坠星</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Poppins', sans-serif; color: white; }
        .info-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
            border-radius: 20px; padding: 14px 22px; z-index: 100;
            border: 1px solid rgba(200,100,255,0.7);
            pointer-events: none; max-width: 420px;
        }
        .info-panel h1 { margin: 0 0 5px; font-size: 1.4rem; background: linear-gradient(135deg,#c084fc,#f0a3ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .info-panel p { margin: 4px 0; font-size: 0.8rem; opacity: 0.9; }
        .quote { font-style: italic; font-size: 0.75rem; border-top: 1px solid rgba(200,100,255,0.4); margin-top: 8px; padding-top: 6px; }
        .controls-hint {
            position: absolute; bottom: 15px; left: 15px;
            background: rgba(0,0,0,0.6); padding: 6px 14px; border-radius: 20px;
            font-size: 12px; color: #ccc; z-index: 100; pointer-events: none;
        }
        .music-btn {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            padding: 8px 18px; border-radius: 40px; font-size: 13px; color: #d4a5ff;
            cursor: pointer; z-index: 100; border: 1px solid #a855f7;
            transition: 0.2s; font-weight: 500;
        }
        .music-btn:hover { background: #a855f7; color: black; transform: scale(1.02); }
        .star-label {
            background: radial-gradient(circle, rgba(80,40,140,0.92), rgba(40,20,80,0.88));
            backdrop-filter: blur(12px); padding: 6px 16px; border-radius: 50px;
            font-size: 13px; font-weight: bold; white-space: nowrap;
            border: 1px solid rgba(200,120,255,0.7);
            pointer-events: auto; cursor: pointer; transition: 0.25s;
        }
        .star-label:hover { transform: scale(1.1); background: radial-gradient(circle, rgba(120,70,220,0.98), rgba(80,40,140,0.92)); border-color: #ffaaee; }
        .toast-message {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.92); backdrop-filter: blur(16px);
            padding: 12px 24px; border-radius: 50px; color: #e2b0ff;
            border-top: 2px solid #c084fc; z-index: 200; font-size: 0.85rem;
            white-space: nowrap; font-family: monospace;
        }
        @media (max-width: 700px) {
            .star-label { font-size: 10px; padding: 4px 12px; }
            .info-panel { padding: 8px 15px; max-width: 280px; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🌀 快速引力吸引 · 螺旋坠星</h1>
        <p>✨ 高中开发者 | 星辰造物主 ✨</p>
        <p>🔴 红色星星受引力影响半径快速缩小 → 进入引力阱(半径18) → 沿螺旋支路坠入黑洞 → 重生回归</p>
        <div class="quote" id="hitokoto-display">🌠 红色星星正在被黑洞引力快速捕获，沿螺旋线坠入深渊...</div>
    </div>
    <div class="controls-hint">🖱️ 鼠标拖拽旋转视角 | 滚动缩放 | ✨ 点击大星星探索作品 ✨ | 🔴 红色星星会被吸引，蓝色星星永续圆周</div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊旋律 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- 初始化场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010003);
        scene.fog = new THREE.FogExp2(0x010003, 0.00005);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(28, 16, 38);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // ================= 1. 黑洞建模 =================
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.8, 128, 128),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.02, metalness: 0.98, emissive: 0x660066, emissiveIntensity: 1.3 })
        );
        scene.add(blackHoleCore);
        
        // 吸积盘
        const innerAcc = new THREE.Mesh(new THREE.TorusGeometry(2.45, 0.13, 100, 300), new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288, emissiveIntensity: 1.3, transparent: true }));
        innerAcc.rotation.x = Math.PI / 2 + 0.2;
        scene.add(innerAcc);
        
        const midAcc = new THREE.Mesh(new THREE.TorusGeometry(3.1, 0.15, 120, 340), new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0xcc44aa, emissiveIntensity: 1.0, transparent: true }));
        midAcc.rotation.x = Math.PI / 2 - 0.05;
        scene.add(midAcc);
        
        const outerAcc = new THREE.Mesh(new THREE.TorusGeometry(3.95, 0.17, 130, 380), new THREE.MeshStandardMaterial({ color: 0xcc88ff, emissive: 0x8844cc, emissiveIntensity: 0.8, transparent: true }));
        outerAcc.rotation.x = Math.PI / 2 + 0.08;
        scene.add(outerAcc);
        
        const eventHorizonGlow = new THREE.Mesh(new THREE.SphereGeometry(2.2, 64, 64), new THREE.MeshBasicMaterial({ color: 0xaa44ff, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending }));
        scene.add(eventHorizonGlow);
        
        // 引力阱可视化（紫圈）
        const gravityWell = new THREE.Mesh(new THREE.SphereGeometry(18, 64, 64), new THREE.MeshBasicMaterial({ color: 0xff44aa, transparent: true, opacity: 0.12, wireframe: false }));
        scene.add(gravityWell);
        
        const attractRing = new THREE.Mesh(new THREE.RingGeometry(17.8, 18.2, 64), new THREE.MeshBasicMaterial({ color: 0xff66cc, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
        attractRing.rotation.x = -Math.PI / 2;
        attractRing.position.y = -0.1;
        scene.add(attractRing);
        
        // 周围粒子
        const dustCount = 8000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = [];
        for (let i = 0; i < dustCount; i++) {
            const r = 2.0 + Math.random() * 3.5;
            const ang = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 2.2;
            dustPos.push(Math.cos(ang) * r, yOff, Math.sin(ang) * r);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
        const dustRing = new THREE.Points(dustGeo, new THREE.PointsMaterial({ color: 0xff88dd, size: 0.08, blending: THREE.AdditiveBlending }));
        scene.add(dustRing);
        
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 奇点深渊 🌀<br><small>「引力阱半径18」</small>`;
        blackHoleDiv.style.background = "rgba(0,0,0,0.85)";
        blackHoleDiv.style.border = "2px solid #ff44aa";
        blackHoleDiv.style.pointerEvents = "none";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 2.3, 0);
        scene.add(blackHoleLabel);
        
        // 光源
        const ambient = new THREE.AmbientLight(0x111122);
        scene.add(ambient);
        const coreLight = new THREE.PointLight(0xff55cc, 1.6, 45);
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);
        const fillLight = new THREE.PointLight(0x8866ff, 0.8);
        fillLight.position.set(6, 5, 7);
        scene.add(fillLight);
        
        // ================= 2. 螺旋支路（视觉引导线） =================
        const BRANCH_ANGLES = [Math.PI / 4, 3 * Math.PI / 4, 5 * Math.PI / 4, 7 * Math.PI / 4];
        const BRANCH_COLORS = [0xff66aa, 0x66ffaa, 0x66aaff, 0xffaa66];
        
        BRANCH_ANGLES.forEach((angle, idx) => {
            const points = [];
            for (let r = 18; r > 2.2; r -= 0.2) {
                const t = (18 - r) / 15.8;
                const spiralAngle = angle + t * (Math.PI * 1.3);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.7) * 0.45;
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: BRANCH_COLORS[idx], transparent: true, opacity: 0.85 });
            scene.add(new THREE.Line(lineGeo, lineMat));
            
            // 光点
            const glowPoints = [];
            for (let r = 18; r > 2.5; r -= 1.0) {
                const t = (18 - r) / 15.5;
                const spiralAngle = angle + t * (Math.PI * 1.3);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.7) * 0.45;
                glowPoints.push(new THREE.Vector3(x, y, z));
            }
            const glowGeom = new THREE.BufferGeometry().setFromPoints(glowPoints);
            const glowMat = new THREE.PointsMaterial({ color: BRANCH_COLORS[idx], size: 0.22, transparent: true, opacity: 0.65, blending: THREE.AdditiveBlending });
            scene.add(new THREE.Points(glowGeom, glowMat));
        });
        
        // ================= 3. 大星星 (作品) =================
        const worksData = [
            { name: "💻 星轨编译器", desc: "Python字节码分析", link: "https://github.com", color: 0x6c9eff, icon: "🪐" },
            { name: "🎮 流光·虚幻引擎", desc: "UE5开放世界星空", link: "https://www.bilibili.com", color: 0x88ddff, icon: "✨" },
            { name: "🔧 逆向星芒", desc: "CTF实战库", link: "https://github.com", color: 0xdd88aa, icon: "⚙️" },
            { name: "🤖 星尘·嵌入式OS", desc: "STM32实时系统", link: "https://github.com", color: 0x77cc88, icon: "📡" },
            { name: "📡 流星信标", desc: "全栈导航站", link: "https://github.com", color: 0xffaa88, icon: "🌠" },
            { name: "🎨 光源AI绘画", desc: "AI创意工具", link: "https://www.bilibili.com", color: 0xdd99ff, icon: "🎨" },
            { name: "🌌 星尘档案馆", desc: "开源项目索引", link: "https://github.com", color: 0xccccdd, icon: "⭐" },
            { name: "🌀 黑洞边缘实验室", desc: "WebGL交互实验", link: "https://github.com", color: 0xff99cc, icon: "🌌" }
        ];
        
        function createStarShape(color, size = 0.45) {
            const geometry = new THREE.IcosahedronGeometry(size, 0);
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.7, metalness: 0.4 });
            return new THREE.Mesh(geometry, material);
        }
        
        class BigStar {
            constructor(data) {
                this.data = data;
                const radius = 28 + Math.random() * 22;
                const angle = Math.random() * Math.PI * 2;
                this.radius = radius;
                this.angle = angle;
                this.yOffset = (Math.random() - 0.5) * 2.5;
                this.orbitSpeed = 0.0003 + Math.random() * 0.0005;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset;
                
                this.mesh = createStarShape(data.color, 0.44);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                
                this.glowLight = new THREE.PointLight(data.color, 0.8, 18);
                this.mesh.add(this.glowLight);
                
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc}</small>`;
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast(data.name, data.desc, data.link);
                });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.7, this.z);
                scene.add(this.label);
            }
            update(time) {
                this.angle += this.orbitSpeed;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(time * 0.0006) * 0.12;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.75, this.z);
                this.mesh.rotation.y += 0.002;
                const breath = 0.6 + Math.sin(time * 0.0018) * 0.2;
                this.glowLight.intensity = 0.65 + breath * 0.2;
            }
        }
        
        const bigStars = worksData.map(d => new BigStar(d));
        
        // ================= 4. 星星系统：蓝色永驻星 + 红色坠落星（快速吸引） =================
        const TOTAL_STARS = 2000;
        const FALLING_RATIO = 0.55;   // 55% 红色坠落星
        const ATTRACT_RADIUS = 18;     // 引力阱半径
        const GRAVITY_STRENGTH = 0.0012; // 引力强度（显著加快半径缩小，几秒内进入紫圈）
        
        class SmallStar {
            constructor(type, customRadius = null) {
                this.type = type; // 'orbit-only' 或 'falling'
                
                if (type === 'orbit-only') {
                    this.orbitRadius = 30 + Math.random() * 28; // 30-58 稳定轨道
                    this.gravityInfluence = false;
                } else {
                    // 坠落星初始半径 26~48，保证较快进入紫圈
                    this.orbitRadius = customRadius !== null ? customRadius : 28 + Math.random() * 24;
                    this.gravityInfluence = true;
                }
                
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.orbitSpeed = 0.0008 + Math.random() * 0.0015;
                this.yOffset = (Math.random() - 0.5) * 2.8;
                
                this.x = Math.cos(this.orbitAngle) * this.orbitRadius;
                this.z = Math.sin(this.orbitAngle) * this.orbitRadius;
                this.y = this.yOffset + Math.sin(this.orbitAngle * 2) * 0.35;
                
                this.state = 'orbit';      // 'orbit' 或 'attracted'
                this.targetBranch = 0;
                this.spiralProgress = 0;
                this.spiralStartAngle = 0;
                this.spiralStartRadius = 0;
                
                // 视觉颜色
                let baseColor;
                if (type === 'orbit-only') {
                    baseColor = new THREE.Color().setHSL(0.6 + Math.random() * 0.2, 0.85, 0.62); // 蓝紫色
                } else {
                    baseColor = new THREE.Color().setHSL(0.05 + Math.random() * 0.1, 0.95, 0.65); // 橙红色
                }
                
                const geom = new THREE.IcosahedronGeometry(0.14 + Math.random() * 0.08, 0);
                const material = new THREE.MeshStandardMaterial({
                    color: baseColor,
                    emissive: type === 'falling' ? 0xff6644 : 0x8866ff,
                    emissiveIntensity: type === 'falling' ? 0.7 : 0.45,
                    metalness: 0.2, roughness: 0.3
                });
                this.mesh = new THREE.Mesh(geom, material);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                this.active = true;
                this.initialColor = baseColor.clone();
                this.phase = Math.random() * Math.PI * 2;
                this.rotSpeedX = 0.02 + Math.random() * 0.03;
                this.rotSpeedY = 0.02 + Math.random() * 0.03;
            }
            
            // 圆周运动更新（坠落星半径会快速缩小）
            updateOrbitPosition() {
                if (this.gravityInfluence && this.state === 'orbit') {
                    // 半径快速缩小
                    this.orbitRadius -= GRAVITY_STRENGTH;
                    
                    // 进入引力阱，触发坠落
                    if (this.orbitRadius <= ATTRACT_RADIUS) {
                        this.startAttraction();
                        return true;
                    }
                    
                    // 防止半径变成负数
                    if (this.orbitRadius < ATTRACT_RADIUS) this.orbitRadius = ATTRACT_RADIUS;
                    
                    // 靠近时角速度加快
                    if (this.orbitRadius < 28) {
                        this.orbitSpeed = 0.0015 + (30 - this.orbitRadius) * 0.00015;
                    }
                }
                
                this.orbitAngle += this.orbitSpeed;
                if (this.orbitAngle > Math.PI * 2) this.orbitAngle -= Math.PI * 2;
                
                this.x = Math.cos(this.orbitAngle) * this.orbitRadius;
                this.z = Math.sin(this.orbitAngle) * this.orbitRadius;
                this.y = this.yOffset + Math.sin(this.orbitAngle * 2) * 0.3;
                this.mesh.position.set(this.x, this.y, this.z);
                
                // 坠落星靠近时亮度增加
                if (this.gravityInfluence && this.orbitRadius < 28) {
                    const intensity = 0.7 + (30 - this.orbitRadius) * 0.1;
                    this.mesh.material.emissiveIntensity = Math.min(1.8, intensity);
                } else {
                    this.mesh.material.emissiveIntensity = this.type === 'falling' ? 0.65 : 0.45;
                }
                this.mesh.material.color = this.initialColor;
                return true;
            }
            
            startAttraction() {
                this.state = 'attracted';
                const currentAngle = Math.atan2(this.z, this.x);
                // 选择最近的支路
                let bestBranch = 0, minDiff = Math.PI;
                for (let i = 0; i < BRANCH_ANGLES.length; i++) {
                    let diff = Math.abs(currentAngle - BRANCH_ANGLES[i]);
                    diff = Math.min(diff, Math.PI * 2 - diff);
                    if (diff < minDiff) { minDiff = diff; bestBranch = i; }
                }
                this.targetBranch = bestBranch;
                this.spiralStartAngle = currentAngle;
                this.spiralStartRadius = Math.sqrt(this.x * this.x + this.z * this.z);
                this.spiralProgress = 0;
            }
            
            // 沿螺旋支路快速坠落
            updateSpiralPosition() {
                // 坠落速度逐段加快
                let delta = 0.03;
                if (this.spiralProgress > 0.5) delta = 0.045;
                if (this.spiralProgress > 0.8) delta = 0.07;
                this.spiralProgress += delta;
                
                if (this.spiralProgress >= 1.0) {
                    this.destroy();
                    return false;
                }
                
                const startR = Math.min(this.spiralStartRadius, ATTRACT_RADIUS);
                const radius = startR * (1 - this.spiralProgress) + 2.2 * this.spiralProgress;
                const branchAngle = BRANCH_ANGLES[this.targetBranch];
                
                let angleDiff = (branchAngle + Math.PI / 2.2) - this.spiralStartAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                let spiralAngle = this.spiralStartAngle + angleDiff * this.spiralProgress;
                spiralAngle += Math.sin(this.spiralProgress * Math.PI * 2.8) * 0.28;
                
                let x = Math.cos(spiralAngle) * radius;
                let z = Math.sin(spiralAngle) * radius;
                const sway = Math.sin(this.spiralProgress * Math.PI * 5 + this.phase) * 0.18;
                x += -Math.sin(spiralAngle) * sway;
                z += Math.cos(spiralAngle) * sway;
                const y = Math.sin(this.spiralProgress * Math.PI) * 0.5 * (1 - this.spiralProgress * 0.6);
                
                this.x = x; this.z = z; this.y = y;
                this.mesh.position.set(x, y, z);
                
                // 坠落时变红发光
                const hot = Math.min(1, (radius - 2) / 12);
                this.mesh.material.emissiveIntensity = 1.0 + (1 - hot) * 2.2;
                if (radius < 7) {
                    this.mesh.material.color.setRGB(1.0, 0.2 + (1 - hot) * 0.5, 0.1);
                } else {
                    this.mesh.material.color = this.initialColor;
                }
                return true;
            }
            
            update() {
                if (!this.active) return false;
                this.mesh.rotation.x += this.rotSpeedX;
                this.mesh.rotation.y += this.rotSpeedY;
                
                if (this.state === 'orbit') {
                    return this.updateOrbitPosition();
                } else {
                    return this.updateSpiralPosition();
                }
            }
            
            destroy() {
                this.active = false;
                createDestructionEffect(this.mesh.position.clone(), BRANCH_COLORS[this.targetBranch]);
                scene.remove(this.mesh);
                
                // 重生一颗新的红色坠落星，放在外围轨道
                if (this.type === 'falling') {
                    setTimeout(() => {
                        const newStar = new SmallStar('falling', 34 + Math.random() * 22);
                        smallStars.push(newStar);
                    }, 40);
                }
            }
        }
        
        function createDestructionEffect(position, color) {
            const particleCount = 100;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 1.2;
                positions[i*3+1] = (Math.random() - 0.5) * 1.2;
                positions[i*3+2] = (Math.random() - 0.5) * 1.2;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particles = new THREE.Points(geom, new THREE.PointsMaterial({ color: color, size: 0.1, blending: THREE.AdditiveBlending }));
            particles.position.copy(position);
            scene.add(particles);
            
            let progress = 0;
            const startPos = position.clone();
            const endPos = new THREE.Vector3(0, 0, 0);
            function animateDestroy() {
                progress += 0.1;
                if (progress >= 1) { scene.remove(particles); return; }
                const t = Math.pow(progress, 0.6);
                particles.position.lerpVectors(startPos, endPos, t);
                particles.scale.setScalar(1 - t * 0.8);
                particles.rotation.z += 0.1;
                requestAnimationFrame(animateDestroy);
            }
            requestAnimationFrame(animateDestroy);
            
            const flash = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6, 6), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending }));
            flash.position.copy(position);
            scene.add(flash);
            let scale = 1;
            function animateFlash() {
                scale += 0.15;
                flash.scale.setScalar(scale);
                flash.material.opacity = 0.9 - (scale - 1) * 0.5;
                if (scale > 2.5) scene.remove(flash);
                else requestAnimationFrame(animateFlash);
            }
            requestAnimationFrame(animateFlash);
        }
        
        let smallStars = [];
        // 创建星星
        for (let i = 0; i < TOTAL_STARS; i++) {
            const type = Math.random() < FALLING_RATIO ? 'falling' : 'orbit-only';
            smallStars.push(new SmallStar(type));
        }
        // 大量增加已经接近紫圈的红色星星，让用户立即看到吸引效果
        for (let i = 0; i < 120; i++) {
            const radius = 18.2 + Math.random() * 4;
            const star = new SmallStar('falling', radius);
            star.orbitRadius = radius;
            star.orbitAngle = Math.random() * Math.PI * 2;
            star.x = Math.cos(star.orbitAngle) * radius;
            star.z = Math.sin(star.orbitAngle) * radius;
            star.mesh.position.set(star.x, star.y, star.z);
            smallStars.push(star);
        }
        
        // ================= 5. 星云背景 =================
        const nebulaCount = 18000;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPos = new Float32Array(nebulaCount * 3);
        for (let i = 0; i < nebulaCount; i++) {
            const r = 15 + Math.random() * 60, a = Math.random() * Math.PI * 2;
            nebulaPos[i*3] = Math.cos(a) * r;
            nebulaPos[i*3+1] = (Math.random() - 0.5) * 6;
            nebulaPos[i*3+2] = Math.sin(a) * r;
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
        const nebulaCloud = new THREE.Points(nebulaGeom, new THREE.PointsMaterial({ color: 0x88aaff, size: 0.09, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending }));
        scene.add(nebulaCloud);
        
        const bgStarCount = 10000;
        const bgStarGeom = new THREE.BufferGeometry();
        const bgStarPos = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            bgStarPos[i*3] = (Math.random() - 0.5) * 550;
            bgStarPos[i*3+1] = (Math.random() - 0.5) * 320;
            bgStarPos[i*3+2] = (Math.random() - 0.5) * 380 - 120;
        }
        bgStarGeom.setAttribute('position', new THREE.BufferAttribute(bgStarPos, 3));
        const bgStars = new THREE.Points(bgStarGeom, new THREE.PointsMaterial({ color: 0xaaccff, size: 0.13, transparent: true, opacity: 0.55 }));
        scene.add(bgStars);
        
        // ================= 音乐 =================
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.3;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => { musicStarted = true; musicBtn.innerHTML = "🎵 星渊旋律 🔊"; }).catch(e => {});
            }
        }
        document.body.addEventListener('click', startMusic, { once: true });
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) startMusic();
            else if (bgMusic.paused) { bgMusic.play(); musicBtn.innerHTML = "🎵 星渊旋律 🔊"; }
            else { bgMusic.pause(); musicBtn.innerHTML = "🎵 星渊旋律 🔇"; }
        });
        
        function showToast(title, desc, url) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将打开链接`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1800);
            setTimeout(() => toast.remove(), 2300);
            if(url) setTimeout(() => window.open(url, '_blank'), 700);
        }
        
        fetch('https://v1.hitokoto.cn')
            .then(res => res.json())
            .then(data => document.getElementById('hitokoto-display').innerHTML = `🌠 “${data.hitokoto}” — ${data.from}`)
            .catch(() => {});
        
        // ================= 动画 =================
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            bigStars.forEach(s => s.update(time));
            for (let i = smallStars.length-1; i >= 0; i--) {
                if (!smallStars[i].update()) smallStars.splice(i,1);
            }
            nebulaCloud.rotation.y += 0.00035;
            innerAcc.rotation.z += 0.012;
            midAcc.rotation.z -= 0.01;
            outerAcc.rotation.z += 0.008;
            dustRing.rotation.y += 0.008;
            attractRing.rotation.z += 0.003;
            
            const pulse = 1 + Math.sin(time * 0.004) * 0.013;
            blackHoleCore.scale.set(pulse, pulse, pulse);
            eventHorizonGlow.scale.setScalar(1 + Math.sin(time * 0.005) * 0.028);
            coreLight.intensity = 1.1 + Math.sin(time * 0.0038) * 0.35;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
