<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>宇宙大爆炸 · 太空粉尘奇点 | fallingmeteorite</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            background: #000;
        }
        
        /* 全屏覆盖层：展示动态太空粉尘 + 引爆按钮 */
        .prelude-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.5s ease;
            will-change: transform, opacity;
            transform-origin: center center;
        }
        .dust-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
        }
        .bigbang-btn-overlay {
            position: relative;
            background: radial-gradient(circle at 30% 10%, #ff7e5e, #feb47b);
            border: none;
            border-radius: 80px;
            padding: 16px 48px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 310;
            box-shadow: 0 0 35px rgba(255, 80, 40, 0.8), 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            letter-spacing: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,200,100,0.9);
            font-family: monospace;
            white-space: nowrap;
            transform: scale(1);
            transition: transform 0.2s;
        }
        .bigbang-btn-overlay:hover {
            transform: scale(1.03);
            box-shadow: 0 0 55px rgba(255, 100, 30, 1);
        }
        
        /* 压缩动画时的样式 (动态添加) */
        .compress-animation {
            transform: scale(0) translate(0, 0) !important;
            opacity: 0 !important;
            transition: transform 0.55s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.45s ease !important;
        }
        
        /* 正常3D界面元素 (初始透明不可见，爆炸后显现) */
        .info-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(8, 5, 20, 0.75); backdrop-filter: blur(14px);
            border-radius: 24px; padding: 14px 24px; z-index: 100;
            border: 1px solid rgba(180, 100, 255, 0.6);
            pointer-events: none; max-width: 440px;
            opacity: 0;
            transition: opacity 1.2s ease;
        }
        .info-panel h1 { margin: 0 0 6px; font-size: 1.45rem; background: linear-gradient(135deg, #e2a5ff, #a366ff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 1px; }
        .info-panel p { margin: 4px 0; font-size: 0.82rem; opacity: 0.92; }
        .quote { font-style: italic; font-size: 0.75rem; border-top: 1px solid rgba(200, 130, 255, 0.5); margin-top: 9px; padding-top: 7px; color: #ddc9ff; }
        
        .controls-hint {
            position: absolute; bottom: 18px; left: 18px;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
            padding: 6px 16px; border-radius: 28px;
            font-size: 12px; color: #ddd; z-index: 100; pointer-events: none;
            font-family: monospace;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .music-btn {
            position: absolute; bottom: 22px; right: 22px;
            background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
            padding: 8px 20px; border-radius: 44px; font-size: 13px; font-weight: 500;
            color: #e2b0ff; cursor: pointer; z-index: 100; border: 1px solid #b77eff;
            transition: all 0.25s ease; letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease, background 0.2s;
        }
        .music-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .music-btn:hover { background: #b77eff; color: #0a0a1a; transform: scale(1.02); box-shadow: 0 0 15px #b77eff; }
        
        .star-label {
            background: radial-gradient(circle, rgba(100, 50, 160, 0.92), rgba(40, 20, 90, 0.92));
            backdrop-filter: blur(10px); padding: 6px 18px; border-radius: 60px;
            font-size: 13px; font-weight: bold; white-space: nowrap;
            border: 1px solid rgba(210, 130, 255, 0.85);
            pointer-events: auto; cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: system-ui, -apple-system, sans-serif;
            box-shadow: 0 0 12px rgba(160, 80, 255, 0.3);
        }
        .star-label:hover { transform: scale(1.08); background: radial-gradient(circle, rgba(150, 90, 240, 1), rgba(90, 50, 160, 0.98)); border-color: #ffc0ff; box-shadow: 0 0 20px #c88eff; }
        .toast-message {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            padding: 12px 28px; border-radius: 60px; color: #efcdff;
            border-top: 2px solid #cc99ff; border-bottom: 1px solid #aa77ff;
            z-index: 200; font-size: 0.85rem; font-weight: 500;
            white-space: nowrap; font-family: monospace; text-align: center;
            box-shadow: 0 0 25px rgba(170, 100, 255, 0.5);
        }
        @media (max-width: 700px) {
            .star-label { font-size: 9px; padding: 4px 12px; }
            .info-panel { padding: 8px 16px; max-width: 260px; }
            .bigbang-btn-overlay { font-size: 1.2rem; padding: 12px 28px; white-space: nowrap; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
    </style>
</head>
<body>
    <!-- 预爆炸覆盖层：动态太空粉尘Canvas + 引爆按钮 -->
    <div id="preludeOverlay" class="prelude-overlay">
        <canvas id="dustCanvas" class="dust-canvas"></canvas>
        <button id="bigbangTriggerBtn" class="bigbang-btn-overlay">💥 引爆宇宙 💥</button>
    </div>
    
    <!-- 3D宇宙相关UI (初始不可见，爆炸后渐显) -->
    <div class="info-panel" id="infoPanel">
        <h1>🌀 星渊幻境 · 大爆炸新生</h1>
        <p>✨ fallingmeteorite · 创世纪元 ✨</p>
        <div class="quote" id="hitokoto-display">⚛️ 奇点绽放，万物伊始 ⚛️</div>
    </div>
    <div class="controls-hint" id="controlsHint">🖱️ 拖拽旋转视角 | 滚动缩放 | ✨ 点击大星探索作品 ✨</div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊共振 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ================= 1. 太空粉尘 Canvas 动画 =================
        const canvas = document.getElementById('dustCanvas');
        let ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        
        function initParticles() {
            particles = [];
            const particleCount = Math.min(800, Math.floor(window.innerWidth * window.innerHeight / 4000));
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.5 + 0.2,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.2,
                    color: `hsl(${Math.random() * 60 + 200}, 70%, 60%)`
                });
            }
        }
        
        function drawDust() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 深邃星空渐变背景
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#050510');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制粉尘粒子
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(100, 100, 255, 0.5)';
                ctx.fill();
                // 移动粒子
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            // 额外绘制飘浮星云光晕
            ctx.shadowBlur = 0;
            for (let i = 0; i < 30; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 3 + 1, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 130, 255, ${Math.random() * 0.3})`;
                ctx.fill();
            }
            animationId = requestAnimationFrame(drawDust);
        }
        
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        resizeCanvas();
        drawDust();
        
        // ================= 2. Three.js 3D 宇宙场景 =================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010004);
        scene.fog = new THREE.FogExp2(0x010004, 0.000038);
        
        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 2200);
        camera.position.set(26, 14, 42);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // 后期特效
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.12;
        bloomPass.strength = 0.95;
        bloomPass.radius = 0.45;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // CSS2渲染文字
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 0.9;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // 全局爆炸标志
        let explosionPlayed = false;
        let allCosmicObjects = [];
        
        function addToUniverse(obj) {
            if (obj) {
                obj.visible = false;
                allCosmicObjects.push(obj);
                scene.add(obj);
            }
            return obj;
        }
        
        // ========= 3. 宇宙天体组件（全部初始隐藏） =========
        // 黑洞核心
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.85, 128, 128),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.02, metalness: 0.99, emissive: 0x8800aa, emissiveIntensity: 1.6 })
        );
        addToUniverse(blackHoleCore);
        
        const accInner = new THREE.Mesh(new THREE.TorusGeometry(2.5, 0.16, 100, 320), new THREE.MeshStandardMaterial({ color: 0xff66cc, emissive: 0xff44aa, emissiveIntensity: 1.6, transparent: true }));
        accInner.rotation.x = Math.PI / 2 + 0.2;
        addToUniverse(accInner);
        
        const accMid = new THREE.Mesh(new THREE.TorusGeometry(3.3, 0.18, 120, 360), new THREE.MeshStandardMaterial({ color: 0xff88dd, emissive: 0xdd66cc, emissiveIntensity: 1.3, transparent: true }));
        accMid.rotation.x = Math.PI / 2 - 0.05;
        addToUniverse(accMid);
        
        const accOuter = new THREE.Mesh(new THREE.TorusGeometry(4.2, 0.2, 130, 400), new THREE.MeshStandardMaterial({ color: 0xcc99ff, emissive: 0xaa55dd, emissiveIntensity: 1.1, transparent: true }));
        accOuter.rotation.x = Math.PI / 2 + 0.1;
        addToUniverse(accOuter);
        
        const energyRingA = new THREE.Mesh(new THREE.TorusGeometry(2.95, 0.1, 80, 280), new THREE.MeshBasicMaterial({ color: 0xff66aa, transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending }));
        energyRingA.rotation.x = Math.PI / 2;
        addToUniverse(energyRingA);
        
        const energyRingB = new THREE.Mesh(new THREE.TorusGeometry(3.7, 0.09, 80, 300), new THREE.MeshBasicMaterial({ color: 0x88aaff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending }));
        energyRingB.rotation.z = Math.PI / 3.5;
        energyRingB.rotation.x = Math.PI / 2.8;
        addToUniverse(energyRingB);
        
        const eventGlow = new THREE.Mesh(new THREE.SphereGeometry(2.3, 64, 64), new THREE.MeshBasicMaterial({ color: 0xc066ff, transparent: true, opacity: 0.48, blending: THREE.AdditiveBlending }));
        addToUniverse(eventGlow);
        
        const gravityRing = new THREE.Mesh(new THREE.RingGeometry(17.2, 18.8, 80), new THREE.MeshBasicMaterial({ color: 0xff77cc, transparent: true, opacity: 0.55, side: THREE.DoubleSide, blending: THREE.AdditiveBlending }));
        gravityRing.rotation.x = -Math.PI / 2;
        gravityRing.position.y = -0.2;
        addToUniverse(gravityRing);
        
        // 粒子光环
        const rippleParticleCount = 2200;
        const rippleGeo = new THREE.BufferGeometry();
        const ripplePos = [];
        for (let i = 0; i < rippleParticleCount; i++) {
            const rad = 4.2 + Math.random() * 4.5;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 1.8;
            ripplePos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
        }
        rippleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ripplePos), 3));
        const ripplePoints = new THREE.Points(rippleGeo, new THREE.PointsMaterial({ color: 0xff88dd, size: 0.1, blending: THREE.AdditiveBlending, transparent: true }));
        addToUniverse(ripplePoints);
        
        // 光源
        const coreLight = new THREE.PointLight(0xff44cc, 2.0, 60);
        coreLight.position.set(0, 0, 0);
        addToUniverse(coreLight);
        const fillLightA = new THREE.PointLight(0xaa88ff, 0.9);
        fillLightA.position.set(8, 7, 9);
        addToUniverse(fillLightA);
        const fillLightB = new THREE.PointLight(0xff77aa, 0.7);
        fillLightB.position.set(-5, 4, 12);
        addToUniverse(fillLightB);
        const ambientLight = new THREE.AmbientLight(0x15112a);
        scene.add(ambientLight);
        
        // 螺旋支路
        const BRANCH_ANGLES = [Math.PI / 4, 3 * Math.PI / 4, 5 * Math.PI / 4, 7 * Math.PI / 4];
        const BRANCH_COLORS = [0xff77bb, 0x77ffbb, 0x88aaff, 0xffaa77];
        BRANCH_ANGLES.forEach((angle, idx) => {
            const points = [];
            for (let r = 18; r > 2.3; r -= 0.22) {
                const t = (18 - r) / 15.7;
                const spiralAngle = angle + t * (Math.PI * 1.35);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.75) * 0.48;
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: BRANCH_COLORS[idx], transparent: true, opacity: 0.9 });
            const lineObj = new THREE.Line(lineGeo, lineMat);
            addToUniverse(lineObj);
            
            const glowTrail = [];
            for (let r = 18; r > 2.8; r -= 1.2) {
                const t = (18 - r) / 15.2;
                const spiralAngle = angle + t * (Math.PI * 1.35);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.75) * 0.45;
                glowTrail.push(new THREE.Vector3(x, y, z));
            }
            const trailPoints = new THREE.Points(new THREE.BufferGeometry().setFromPoints(glowTrail), new THREE.PointsMaterial({ color: BRANCH_COLORS[idx], size: 0.28, transparent: true, blending: THREE.AdditiveBlending }));
            addToUniverse(trailPoints);
        });
        
        // 银河盘星尘
        const galaxyPositions = [];
        for (let i = 0; i < 4000; i++) {
            const rad = 55 + Math.random() * 70;
            const ang = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 14 * (1 - (rad - 55) / 85);
            galaxyPositions.push(Math.cos(ang) * rad, yOff, Math.sin(ang) * rad);
        }
        const galaxyPointsGeom = new THREE.BufferGeometry();
        galaxyPointsGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(galaxyPositions), 3));
        const galaxyDust = new THREE.Points(galaxyPointsGeom, new THREE.PointsMaterial({ color: 0x99bbff, size: 0.22, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending }));
        addToUniverse(galaxyDust);
        
        // 星云流光粒子
        const flowCount = 3800;
        const flowGeom = new THREE.BufferGeometry();
        const flowPos = [], flowColors = [];
        for (let i = 0; i < flowCount; i++) {
            const rad = 18 + Math.random() * 68;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 9;
            flowPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
            const hue = 0.5 + Math.random() * 0.5;
            flowColors.push(hue, 0.7, 0.8);
        }
        flowGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(flowPos), 3));
        flowGeom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(flowColors), 3));
        const flowNebula = new THREE.Points(flowGeom, new THREE.PointsMaterial({ size: 0.18, vertexColors: true, transparent: true, opacity: 0.55, blending: THREE.AdditiveBlending }));
        addToUniverse(flowNebula);
        
        // 繁星背景
        const starFieldPos = [];
        for (let i = 0; i < 7000; i++) starFieldPos.push((Math.random() - 0.5) * 620, (Math.random() - 0.5) * 380, (Math.random() - 0.5) * 450 - 130);
        const starFieldGeom = new THREE.BufferGeometry();
        starFieldGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starFieldPos), 3));
        const starFieldPoints = new THREE.Points(starFieldGeom, new THREE.PointsMaterial({ color: 0xbdd4ff, size: 0.13, transparent: true, opacity: 0.6 }));
        addToUniverse(starFieldPoints);
        
        const vortexDust = 6000;
        const vortexGeom = new THREE.BufferGeometry();
        const vortexPos = [];
        for (let i = 0; i < vortexDust; i++) {
            const r = 2.5 + Math.random() * 5.2;
            const ang = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 3.2;
            vortexPos.push(Math.cos(ang) * r, yOff, Math.sin(ang) * r);
        }
        vortexGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vortexPos), 3));
        const vortexPoints = new THREE.Points(vortexGeom, new THREE.PointsMaterial({ color: 0xff99dd, size: 0.08, blending: THREE.AdditiveBlending }));
        addToUniverse(vortexPoints);
        
        // 黑洞 CSS 标签
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 奇点深渊 🌀`;
        blackHoleDiv.style.background = "rgba(0,0,0,0.85)";
        blackHoleDiv.style.border = "2px solid #ff44aa";
        blackHoleDiv.style.pointerEvents = "none";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 2.3, 0);
        addToUniverse(blackHoleLabel);
        
        // 大星星作品集
        const worksData = [
            { name: "task_scheduling", desc: "⚙️ 高级Python调度器", link: "https://github.com/fallingmeteorite/task_scheduling", color: 0x6c9eff, icon: "✨" },
            { name: "BilBil 主页", desc: "🎬 创意空间", link: "https://space.bilibili.com/1484690146", color: 0x88ddff, icon: "📺" },
            { name: "nsfw-image-check", desc: "🔞 ComfyUI 鉴黄节点", link: "https://github.com/fallingmeteorite/nsfw-image-check-comfyui", color: 0xdd88aa, icon: "🔍" },
            { name: "registry_cleaner", desc: "🧹 注册表清理工具", link: "https://github.com/fallingmeteorite/registry_cleaner", color: 0x77cc88, icon: "🧰" },
            { name: "Illustrate_AI_toolbox", desc: "🎨 依绘工具箱", link: "https://github.com/fallingmeteorite/Illustrate_AI_toolbox", color: 0xffaa88, icon: "🖌️" },
            { name: "Lora_box", desc: "📦 Lora 一键包", link: "https://github.com/fallingmeteorite/Lora_box", color: 0xdd99ff, icon: "💎" },
            { name: "GITHUB 主页", desc: "🐙 开源宇宙", link: "https://github.com/fallingmeteorite/", color: 0xccccdd, icon: "⭐" },
            { name: "task_scheduling文档", desc: "📖 详细说明库", link: "https://fallingmeteorite.github.io/task_scheduling/", color: 0xff99cc, icon: "📘" }
        ];
        
        function createStarShape(color, sz = 0.48) {
            const geometry = new THREE.IcosahedronGeometry(sz, 0);
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.9, metalness: 0.3, roughness: 0.2 });
            return new THREE.Mesh(geometry, material);
        }
        
        class BigStarNode {
            constructor(data) {
                this.data = data;
                const radius = 26 + Math.random() * 25;
                const angle = Math.random() * Math.PI * 2;
                this.radius = radius;
                this.angle = angle;
                this.yOffset = (Math.random() - 0.5) * 3.2;
                this.orbitSpeed = 0.00028 + Math.random() * 0.00055;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset;
                this.mesh = createStarShape(data.color, 0.47);
                this.mesh.position.set(this.x, this.y, this.z);
                addToUniverse(this.mesh);
                this.glowLight = new THREE.PointLight(data.color, 0.95, 22);
                this.mesh.add(this.glowLight);
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc}</small>`;
                div.addEventListener('click', (e) => { e.stopPropagation(); showToast(data.name, data.desc, data.link); });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.85, this.z);
                addToUniverse(this.label);
            }
            update(t) {
                if (!this.mesh.visible) return;
                this.angle += this.orbitSpeed;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(t * 0.00065) * 0.18;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.9, this.z);
                this.mesh.rotation.y += 0.0035;
                const intensity = 0.8 + Math.sin(t * 0.0022) * 0.35;
                this.glowLight.intensity = intensity;
            }
        }
        const bigStars = worksData.map(d => new BigStarNode(d));
        
        // 小型恒星系统
        const TOTAL_SMALL_STARS = 2800;
        const ATTRACT_RADIUS = 18.2;
        const GRAV_PULL = 0.00115;
        
        class SmallStar {
            constructor(type, customRad = null) {
                this.type = type;
                this.gravityInfluence = (type !== 'orbit-only');
                this.orbitRadius = customRad !== null ? customRad : (this.gravityInfluence ? 27 + Math.random() * 25 : 33 + Math.random() * 30);
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.orbitSpeed = 0.0007 + Math.random() * 0.0016;
                this.yOffset = (Math.random() - 0.5) * 3.0;
                this.x = Math.cos(this.orbitAngle) * this.orbitRadius;
                this.z = Math.sin(this.orbitAngle) * this.orbitRadius;
                this.y = this.yOffset + Math.sin(this.orbitAngle * 1.8) * 0.35;
                this.state = 'orbit';
                this.targetBranch = 0;
                this.spiralProg = 0;
                this.spiralStartAng = 0;
                this.spiralStartRad = 0;
                const hue = this.gravityInfluence ? 0.03 + Math.random() * 0.12 : 0.55 + Math.random() * 0.25;
                const baseCol = new THREE.Color().setHSL(hue, 0.95, 0.62);
                const geom = new THREE.IcosahedronGeometry(0.14 + Math.random() * 0.09, 0);
                const mat = new THREE.MeshStandardMaterial({ color: baseCol, emissive: this.gravityInfluence ? 0xff5533 : 0x4488ff, emissiveIntensity: this.gravityInfluence ? 0.8 : 0.55, metalness: 0.2 });
                this.mesh = new THREE.Mesh(geom, mat);
                this.mesh.position.set(this.x, this.y, this.z);
                addToUniverse(this.mesh);
                this.active = true;
                this.initialColor = baseCol.clone();
                this.phase = Math.random() * Math.PI * 2;
                this.rotSpeed = 0.015 + Math.random() * 0.025;
            }
            updateOrbitPos() {
                if (this.gravityInfluence && this.state === 'orbit') {
                    this.orbitRadius -= GRAV_PULL;
                    if (this.orbitRadius <= ATTRACT_RADIUS) { this.startAttract(); return true; }
                    if (this.orbitRadius < 28) this.orbitSpeed = 0.0016 + (30 - this.orbitRadius) * 0.0002;
                }
                this.orbitAngle += this.orbitSpeed;
                this.x = Math.cos(this.orbitAngle) * this.orbitRadius;
                this.z = Math.sin(this.orbitAngle) * this.orbitRadius;
                this.y = this.yOffset + Math.sin(this.orbitAngle * 2) * 0.32;
                this.mesh.position.set(this.x, this.y, this.z);
                if (this.gravityInfluence && this.orbitRadius < 30) {
                    const intens = 0.8 + (32 - this.orbitRadius) * 0.08;
                    this.mesh.material.emissiveIntensity = Math.min(2.0, intens);
                } else this.mesh.material.emissiveIntensity = this.gravityInfluence ? 0.75 : 0.55;
                return true;
            }
            startAttract() {
                const curAng = Math.atan2(this.z, this.x);
                let best = 0, minD = Math.PI;
                for (let i = 0; i < BRANCH_ANGLES.length; i++) {
                    let d = Math.abs(curAng - BRANCH_ANGLES[i]);
                    d = Math.min(d, Math.PI * 2 - d);
                    if (d < minD) { minD = d; best = i; }
                }
                this.targetBranch = best;
                this.spiralStartAng = curAng;
                this.spiralStartRad = Math.sqrt(this.x*this.x + this.z*this.z);
                this.spiralProg = 0;
                this.state = 'attracted';
            }
            updateSpiral() {
                let delta = 0.023;
                if (this.spiralProg > 0.45) delta = 0.036;
                if (this.spiralProg > 0.8) delta = 0.058;
                this.spiralProg += delta;
                if (this.spiralProg >= 1.0) { this.destroy(); return false; }
                const rad = this.spiralStartRad * (1 - this.spiralProg) + 2.3 * this.spiralProg;
                const branchAng = BRANCH_ANGLES[this.targetBranch];
                let angDiff = (branchAng + Math.PI / 2.3) - this.spiralStartAng;
                while (angDiff > Math.PI) angDiff -= Math.PI*2;
                while (angDiff < -Math.PI) angDiff += Math.PI*2;
                let spiralAng = this.spiralStartAng + angDiff * this.spiralProg;
                spiralAng += Math.sin(this.spiralProg * Math.PI * 2.6) * 0.28;
                let x = Math.cos(spiralAng) * rad;
                let z = Math.sin(spiralAng) * rad;
                const sway = Math.sin(this.spiralProg * Math.PI * 4.2 + this.phase) * 0.2;
                x += -Math.sin(spiralAng) * sway;
                z += Math.cos(spiralAng) * sway;
                const y = Math.sin(this.spiralProg * Math.PI) * 0.55 * (1 - this.spiralProg * 0.5);
                this.mesh.position.set(x, y, z);
                const hotFactor = Math.max(0.5, 1 - (rad-2)/14);
                this.mesh.material.emissiveIntensity = 1.1 + (1 - hotFactor) * 2.2;
                if (rad < 6.5) this.mesh.material.color.setRGB(1.0, 0.3, 0.15);
                else this.mesh.material.color = this.initialColor;
                return true;
            }
            update() {
                if (!this.active) return false;
                this.mesh.rotation.x += this.rotSpeed;
                this.mesh.rotation.y += this.rotSpeed * 0.9;
                if (this.state === 'orbit') return this.updateOrbitPos();
                else return this.updateSpiral();
            }
            destroy() {
                this.active = false;
                scene.remove(this.mesh);
                if (this.gravityInfluence && this.mesh.visible) {
                    setTimeout(() => { smallStars.push(new SmallStar('falling', 34 + Math.random() * 22)); }, 50);
                }
            }
        }
        
        let smallStars = [];
        for (let i = 0; i < TOTAL_SMALL_STARS; i++) {
            const type = Math.random() < 0.68 ? 'falling' : 'orbit-only';
            smallStars.push(new SmallStar(type));
        }
        for (let i = 0; i < 150; i++) smallStars.push(new SmallStar('falling', 17.5 + Math.random() * 5.5));
        
        // 流星系统
        class MeteorStreak {
            constructor() { this.active = true; this.reset(); }
            reset() { 
                const angle = Math.random() * Math.PI * 2; 
                const startRad = 48 + Math.random() * 28; 
                this.startX = Math.cos(angle) * startRad; 
                this.startZ = Math.sin(angle) * startRad; 
                this.startY = (Math.random() - 0.5) * 14; 
                const targetAngle = angle + (Math.random() - 0.5) * 1.5; 
                this.endX = Math.cos(targetAngle) * 6.5; 
                this.endZ = Math.sin(targetAngle) * 6.5; 
                this.endY = (Math.random() - 0.5) * 5; 
                this.progress = 0; 
                this.speed = 0.006 + Math.random() * 0.009; 
                this.color = new THREE.Color().setHSL(0.08 + Math.random() * 0.2, 1.0, 0.65); 
                this.geom = new THREE.BufferGeometry(); 
                this.pointsObj = new THREE.Points(this.geom, new THREE.PointsMaterial({ color: this.color, size: 0.24, blending: THREE.AdditiveBlending })); 
                scene.add(this.pointsObj); 
                if(!explosionPlayed) this.pointsObj.visible = false; 
                else this.pointsObj.visible = true; 
            }
            update() { 
                if (!this.active) return false; 
                this.progress += this.speed; 
                if (this.progress >= 1) { scene.remove(this.pointsObj); return false; } 
                const t = this.progress; 
                const x = this.startX * (1 - t) + this.endX * t; 
                const z = this.startZ * (1 - t) + this.endZ * t; 
                const y = this.startY * (1 - t) + this.endY * t; 
                const positions = []; 
                for (let i = 0; i <= 12; i++) { 
                    const trailT = Math.max(0, t - i * 0.022); 
                    if (trailT >= 0) { 
                        const tx = this.startX * (1 - trailT) + this.endX * trailT; 
                        const tz = this.startZ * (1 - trailT) + this.endZ * trailT; 
                        const ty = this.startY * (1 - trailT) + this.endY * trailT; 
                        positions.push(tx, ty, tz); 
                    } 
                } 
                if (this.pointsObj.geometry) this.pointsObj.geometry.dispose(); 
                const newGeom = new THREE.BufferGeometry(); 
                newGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3)); 
                this.pointsObj.geometry = newGeom; 
                return true; 
            } 
        }
        let meteors = [];
        function spawnMeteor() { if (explosionPlayed && meteors.length < 10 && Math.random() < 0.025) meteors.push(new MeteorStreak()); }
        
        // 增强爆炸特效
        function createBigBangExplosion() {
            const particleCount = 1800;
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 2.5;
                positions[i*3+1] = (Math.random() - 0.5) * 2.5;
                positions[i*3+2] = (Math.random() - 0.5) * 2.5;
            }
            geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.32, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geom, particleMat);
            scene.add(particles);
            
            const hotCount = 1200;
            const hotGeom = new THREE.BufferGeometry();
            const hotPos = [];
            for (let i = 0; i < hotCount; i++) hotPos.push((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3);
            hotGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(hotPos), 3));
            const hotMat = new THREE.PointsMaterial({ color: 0xff5533, size: 0.28, blending: THREE.AdditiveBlending });
            const hotParticles = new THREE.Points(hotGeom, hotMat);
            scene.add(hotParticles);
            
            // 全屏闪光
            const flashDiv = document.createElement('div');
            flashDiv.style.position = 'fixed';
            flashDiv.style.top = '0';
            flashDiv.style.left = '0';
            flashDiv.style.width = '100%';
            flashDiv.style.height = '100%';
            flashDiv.style.backgroundColor = '#fff';
            flashDiv.style.zIndex = '350';
            flashDiv.style.opacity = '0.9';
            flashDiv.style.pointerEvents = 'none';
            flashDiv.style.transition = 'opacity 0.3s ease';
            document.body.appendChild(flashDiv);
            setTimeout(() => { flashDiv.style.opacity = '0'; }, 200);
            setTimeout(() => { if (flashDiv.parentNode) flashDiv.remove(); }, 600);
            
            let frame = 0;
            function animateBang() {
                frame++;
                const intensity = Math.max(0, 1 - frame / 40);
                particleMat.opacity = intensity * 0.9;
                hotMat.opacity = intensity * 0.85;
                particles.scale.setScalar(1 + frame * 0.55);
                hotParticles.scale.setScalar(1 + frame * 0.5);
                if (frame > 48) {
                    scene.remove(particles);
                    scene.remove(hotParticles);
                    return;
                }
                requestAnimationFrame(animateBang);
            }
            requestAnimationFrame(animateBang);
            
            // 音效
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 70;
                gain.gain.value = 0.5;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1.2);
                osc.stop(audioCtx.currentTime + 1.2);
            } catch(e) {}
        }
        
        // 显示宇宙万物
        function revealUniverse() {
            allCosmicObjects.forEach(obj => { if (obj) obj.visible = true; });
            explosionPlayed = true;
            document.getElementById('infoPanel').style.opacity = '1';
            document.getElementById('controlsHint').style.opacity = '1';
            document.getElementById('musicToggleBtn').classList.add('visible');
            if (bgMusic && !musicStarted) startMusic();
            setInterval(() => spawnMeteor(), 800);
        }
        
        // 压缩动画 + 爆炸
        function startCompressionAndBang() {
            const overlay = document.getElementById('preludeOverlay');
            const btn = document.getElementById('bigbangTriggerBtn');
            if (!overlay) return;
            overlay.classList.add('compress-animation');
            btn.style.transform = 'scale(0)';
            btn.style.opacity = '0';
            setTimeout(() => {
                if (overlay.parentNode) overlay.remove();
                if (animationId) cancelAnimationFrame(animationId);
                createBigBangExplosion();
                revealUniverse();
            }, 580);
        }
        
        const bangBtn = document.getElementById('bigbangTriggerBtn');
        if (bangBtn) bangBtn.addEventListener('click', startCompressionAndBang);
        
        // 音乐：使用本地文件 background_music.mp3
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.28;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        function startMusic() { if (!musicStarted && bgMusic) { bgMusic.play().then(() => { musicStarted = true; musicBtn.innerHTML = "🎵 星渊共振 🔊"; }).catch(e => console.log("音乐播放失败，请检查文件")); } }
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) startMusic();
            else if (bgMusic.paused) { bgMusic.play(); musicBtn.innerHTML = "🎵 星渊共振 🔊"; }
            else { bgMusic.pause(); musicBtn.innerHTML = "🎵 星渊共振 🔇"; }
        });
        
        function showToast(title, desc, url) {
            const toast = document.createElement('div'); toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将跳转`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1700);
            setTimeout(() => toast.remove(), 2200);
            if (url) setTimeout(() => window.open(url, '_blank'), 650);
        }
        fetch('https://v1.hitokoto.cn').then(res => res.json()).then(data => document.getElementById('hitokoto-display').innerHTML = `🌌 “${data.hitokoto}” — ${data.from}`).catch(() => {});
        
        // 动画循环
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            bigStars.forEach(s => s.update(time));
            for (let i = smallStars.length-1; i >= 0; i--) if (!smallStars[i].update()) smallStars.splice(i,1);
            for (let i = meteors.length-1; i >= 0; i--) if (!meteors[i].update()) meteors.splice(i,1);
            
            if (explosionPlayed) {
                galaxyDust.rotation.y += 0.0002;
                flowNebula.rotation.y += 0.00028;
                vortexPoints.rotation.y += 0.004;
                ripplePoints.rotation.y -= 0.003;
                energyRingA.rotation.z += 0.006; energyRingA.rotation.y += 0.003;
                energyRingB.rotation.x += 0.004; energyRingB.rotation.z += 0.003;
                accInner.rotation.z += 0.013; accMid.rotation.z -= 0.011; accOuter.rotation.z += 0.009;
                gravityRing.rotation.z += 0.002;
                const pulse = 1 + Math.sin(time * 0.004) * 0.018;
                blackHoleCore.scale.set(pulse, pulse, pulse);
                eventGlow.scale.setScalar(1 + Math.sin(time * 0.0055) * 0.035);
                if (coreLight) coreLight.intensity = 1.35 + Math.sin(time * 0.004) * 0.5;
            }
            controls.update();
            effectComposer.render();
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            resizeCanvas();
        });
    </script>
</body>
