<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>黑洞星墟 | Fallingmeteorite · 作品星群</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            color: white;
        }
        
        /* 信息面板 - 黑洞介绍 */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 22px;
            z-index: 100;
            border: 1px solid rgba(200, 100, 255, 0.6);
            pointer-events: none;
            font-family: monospace;
            max-width: 300px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .info-panel h1 {
            margin: 0 0 5px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .info-panel p { margin: 4px 0; font-size: 0.8rem; opacity: 0.9; }
        .quote { font-style: italic; font-size: 0.75rem; border-top: 1px solid rgba(200,100,255,0.4); margin-top: 8px; padding-top: 6px; }
        
        /* 控制提示 */
        .controls-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaa;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
        }
        
        /* 音乐控制按钮 */
        .music-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #d4a5ff;
            cursor: pointer;
            z-index: 100;
            border: 1px solid #a855f7;
            font-family: monospace;
            transition: 0.2s;
            pointer-events: auto;
        }
        .music-btn:hover {
            background: #a855f7;
            color: black;
            transform: scale(1.02);
        }
        
        /* 星星标签样式 */
        .star-label {
            background: linear-gradient(135deg, rgba(20, 10, 40, 0.85), rgba(50, 30, 80, 0.9));
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
            border-left: 4px solid #c084fc;
            border-right: 1px solid rgba(200,100,255,0.3);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Segoe UI', monospace;
            box-shadow: 0 0 15px rgba(160, 80, 255, 0.2);
        }
        .star-label:hover {
            transform: scale(1.08);
            background: rgba(100, 50, 160, 0.9);
            border-left-color: #f0a0ff;
            box-shadow: 0 0 25px rgba(200, 100, 255, 0.5);
        }
        .star-label small {
            font-size: 10px;
            opacity: 0.8;
            font-weight: normal;
        }
        
        /* 提示弹窗 */
        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            color: #e2b0ff;
            border-top: 2px solid #c084fc;
            z-index: 200;
            font-size: 0.85rem;
            text-align: center;
            white-space: nowrap;
            font-family: monospace;
            transition: opacity 0.3s;
            pointer-events: none;
            font-weight: 500;
        }
        
        @media (max-width: 700px) {
            .star-label { font-size: 10px; padding: 4px 12px; }
            .info-panel { padding: 8px 15px; max-width: 240px; font-size: 11px; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🌀 奇点 · Fallingmeteorite</h1>
        <p>✨ 高中开发者 | 星辰造物主 ✨</p>
        <p>📡 求知若饥 · 虚心若愚</p>
        <div class="quote" id="hitokoto-display">🌠 正在汲取星环能量...</div>
    </div>
    <div class="controls-hint">
        🖱️ 鼠标拖拽旋转视角 | 右键平移 | 滚动缩放 | ✨ 点击大星星探索作品 ✨
    </div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊旋律 🔇</div>
    
    <!-- 引入Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- 初始化场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010005);
        scene.fog = new THREE.FogExp2(0x010005, 0.0004);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 8, 28);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'auto';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- 控制器 (允许拖动旋转/缩放，体验银河漫游) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 0.9;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // ================= 1. 中心黑洞 =================
        // 黑洞核心 (暗黑球体)
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.6, 128, 128),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1, metalness: 0.9, emissive: 0x110022, emissiveIntensity: 0.3 })
        );
        scene.add(blackHoleCore);
        
        // 吸积盘 (光环粒子环)
        const accretionDisk = new THREE.Mesh(
            new THREE.TorusGeometry(2.3, 0.18, 64, 200),
            new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0x8822aa, emissiveIntensity: 0.9, transparent: true, side: THREE.DoubleSide })
        );
        accretionDisk.rotation.x = Math.PI / 2;
        scene.add(accretionDisk);
        
        // 第二层内光环
        const innerGlowRing = new THREE.Mesh(
            new THREE.TorusGeometry(2.0, 0.08, 64, 200),
            new THREE.MeshBasicMaterial({ color: 0xff66cc, transparent: true, blending: THREE.AdditiveBlending })
        );
        innerGlowRing.rotation.x = Math.PI / 2 + 0.2;
        scene.add(innerGlowRing);
        
        // 黑洞外围光晕粒子 (螺旋粒子)
        const haloParticleCount = 1800;
        const haloGeometry = new THREE.BufferGeometry();
        const haloPositions = [];
        for (let i = 0; i < haloParticleCount; i++) {
            const radius = 2.2 + Math.random() * 1.2;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.4;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            haloPositions.push(x, yOff, z);
        }
        haloGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(haloPositions), 3));
        const haloMat = new THREE.PointsMaterial({ color: 0xff88dd, size: 0.045, blending: THREE.AdditiveBlending, transparent: true });
        const haloParticles = new THREE.Points(haloGeometry, haloMat);
        scene.add(haloParticles);
        
        // 黑洞的CSS标签 (个人介绍)
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 事件视界 · Fallingmeteorite 🌀<br><small>「高中开发者 | 全栈/逆向/UE5/硬件」</small>`;
        blackHoleDiv.style.background = "rgba(0,0,0,0.8)";
        blackHoleDiv.style.borderLeft = "4px solid #ff44cc";
        blackHoleDiv.style.pointerEvents = "none";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 1.2, 0);
        scene.add(blackHoleLabel);
        
        // 黑洞引力扭曲效果 (轻微扭曲粒子场)
        const distortionRing = new THREE.Mesh(
            new THREE.TorusGeometry(2.9, 0.05, 64, 300),
            new THREE.MeshBasicMaterial({ color: 0xaa55ff, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.5 })
        );
        distortionRing.rotation.x = Math.PI / 2;
        distortionRing.rotation.z = 0.3;
        scene.add(distortionRing);
        
        // 环境光源 + 点光源烘托黑洞氛围
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const centerLight = new THREE.PointLight(0xaa44ff, 0.8, 25);
        centerLight.position.set(0, 0, 0);
        scene.add(centerLight);
        const fillLight = new THREE.PointLight(0x8844aa, 0.5);
        fillLight.position.set(3, 2, 4);
        scene.add(fillLight);
        const backLight = new THREE.DirectionalLight(0x8866cc, 0.4);
        backLight.position.set(-2, 1, -5);
        scene.add(backLight);
        
        // ================= 2. 小装饰星星 (大量的闪烁小星点) =================
        const tinyStarsCount = 3500;
        const tinyStarsGeo = new THREE.BufferGeometry();
        const tinyStarsPos = new Float32Array(tinyStarsCount * 3);
        for (let i = 0; i < tinyStarsCount; i++) {
            // 分布在半径 12 到 45 的球形区域
            const radius = 14 + Math.random() * 32;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta) * 0.6; // 略微扁平
            const z = radius * Math.cos(phi);
            tinyStarsPos[i*3] = x;
            tinyStarsPos[i*3+1] = y;
            tinyStarsPos[i*3+2] = z;
        }
        tinyStarsGeo.setAttribute('position', new THREE.BufferAttribute(tinyStarsPos, 3));
        const tinyStarMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.08, transparent: true, opacity: 0.6 });
        const tinyStarsField = new THREE.Points(tinyStarsGeo, tinyStarMat);
        scene.add(tinyStarsField);
        
        // 第二层更远星尘
        const dustCount = 2000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const r = 32 + Math.random() * 40;
            const theta2 = Math.random() * Math.PI * 2;
            const phi2 = Math.acos(2 * Math.random() - 1);
            dustPos[i*3] = r * Math.sin(phi2) * Math.cos(theta2);
            dustPos[i*3+1] = r * Math.sin(phi2) * Math.sin(theta2) * 0.5;
            dustPos[i*3+2] = r * Math.cos(phi2);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.05, transparent: true, opacity: 0.4 });
        const dustField = new THREE.Points(dustGeo, dustMat);
        scene.add(dustField);
        
        // ================= 3. 大星星 (代表作品，所有核心内容都在这些大星星上) =================
        // 作品数据 (硬编码，代表8颗闪耀的大星)
        const bigStarsData = [
            { name: "💻 星轨编译器", desc: "Python字节码分析工具 · 可视化执行流", link: "https://github.com/fallingmeteorite/star-compiler", color: 0x6c9eff, size: 0.62, radius: 7.2, angle: 0, speed: 0.0023, icon: "🪐" },
            { name: "🎮 流光·虚幻引擎", desc: "UE5开放世界 · 动态星空粒子系统", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0x88ddff, size: 0.68, radius: 9.5, angle: 1.2, speed: 0.0019, icon: "✨" },
            { name: "🔧 逆向星芒", desc: "软件逆向分析笔记 & CTF 实战库", link: "https://github.com/fallingmeteorite/reverse-constellation", color: 0xdd88aa, size: 0.6, radius: 12.0, angle: 2.5, speed: 0.0016, icon: "⚙️" },
            { name: "🤖 星尘·嵌入式OS", desc: "STM32微型实时系统 · 星图显示", link: "https://github.com/fallingmeteorite/stardust-rtos", color: 0x77cc88, size: 0.64, radius: 14.8, angle: 3.8, speed: 0.0014, icon: "📡" },
            { name: "📡 流星信标", desc: "全栈导航站 + 动态星空API", link: "https://github.com/fallingmeteorite/meteor-beacon", color: 0xffaa88, size: 0.61, radius: 17.5, angle: 5.0, speed: 0.0012, icon: "🌠" },
            { name: "🎨 光源AI绘画盒子", desc: "AI创意工具 · 社区生成平台", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0xdd99ff, size: 0.63, radius: 20.2, angle: 6.3, speed: 0.0010, icon: "🎨" },
            { name: "🌌 星尘档案馆", desc: "全部开源项目索引与开发日志", link: "https://github.com/fallingmeteorite", color: 0xccccdd, size: 0.6, radius: 23.0, angle: 4.5, speed: 0.0009, icon: "⭐" },
            { name: "🌀 黑洞边缘实验室", desc: "WebGL 奇幻交互实验 & 粒子系统", link: "https://github.com/fallingmeteorite/horizon-lab", color: 0xff99cc, size: 0.65, radius: 25.8, angle: 2.0, speed: 0.0008, icon: "🌌" }
        ];
        
        const bigStars = []; // 存储大星星对象 { mesh, label, data, angle, radius, speed }
        
        // 添加大星星的轨道线 (装饰)
        bigStarsData.forEach(star => {
            const points = [];
            const segments = 100;
            for (let i = 0; i <= segments; i++) {
                const ang = (i / segments) * Math.PI * 2;
                const x = star.radius * Math.cos(ang);
                const z = star.radius * Math.sin(ang);
                points.push(new THREE.Vector3(x, 0, z));
            }
            const orbitGeo = new THREE.BufferGeometry().setFromPoints(points);
            const orbitMat = new THREE.LineBasicMaterial({ color: 0xaa88ff, transparent: true, opacity: 0.2 });
            const orbitLine = new THREE.LineLoop(orbitGeo, orbitMat);
            scene.add(orbitLine);
        });
        
        // 创建大星星 (视觉上更亮、带光晕)
        bigStarsData.forEach((data, idx) => {
            // 球体核心
            const geo = new THREE.SphereGeometry(data.size, 64, 64);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.45, metalness: 0.3, roughness: 0.2 });
            const starMesh = new THREE.Mesh(geo, mat);
            starMesh.castShadow = true;
            scene.add(starMesh);
            
            // 添加光晕效果 (点光源跟随星星)
            const glowLight = new THREE.PointLight(data.color, 0.6, 12);
            starMesh.add(glowLight);
            
            // CSS2D 标签 (可点击)
            const labelDiv = document.createElement('div');
            labelDiv.className = 'star-label';
            labelDiv.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc.substring(0, 28)}${data.desc.length > 28 ? '…' : ''}</small>`;
            labelDiv.style.cursor = 'pointer';
            const labelObj = new CSS2DObject(labelDiv);
            scene.add(labelObj);
            
            // 点击事件: 展示详情并跳转链接
            labelDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                showToast(data.name, data.desc, data.link);
                // 闪烁效果
                starMesh.material.emissiveIntensity = 1.2;
                glowLight.intensity = 1.3;
                setTimeout(() => {
                    starMesh.material.emissiveIntensity = 0.45;
                    glowLight.intensity = 0.6;
                }, 400);
            });
            
            // 初始角度
            const initAngle = data.angle !== undefined ? data.angle : (idx / bigStarsData.length) * Math.PI * 2;
            bigStars.push({
                mesh: starMesh,
                label: labelObj,
                data: data,
                angle: initAngle,
                radius: data.radius,
                speed: data.speed,
                glowLight: glowLight
            });
        });
        
        // 额外添加几颗漂浮的大星星（动态变化）
        const extraBigStars = [
            { name: "📖 星海博客", desc: "技术随笔与星空哲思", link: "https://fallingmeteorite.github.io", color: 0xffaa77, size: 0.55, radius: 28.5, angle: 3.0, speed: 0.0007, icon: "📖" },
            { name: "🔮 幻境渲染器", desc: "实时体积光与星云渲染实验", link: "https://github.com/fallingmeteorite/nebula-render", color: 0x77aaff, size: 0.58, radius: 30.2, angle: 5.2, speed: 0.00065, icon: "🔮" }
        ];
        
        extraBigStars.forEach((data, idx) => {
            const geo = new THREE.SphereGeometry(data.size, 64, 64);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, emissive: data.color, emissiveIntensity: 0.4, metalness: 0.2 });
            const starMesh = new THREE.Mesh(geo, mat);
            scene.add(starMesh);
            const glowLight = new THREE.PointLight(data.color, 0.5, 10);
            starMesh.add(glowLight);
            
            const labelDiv = document.createElement('div');
            labelDiv.className = 'star-label';
            labelDiv.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc}</small>`;
            labelDiv.style.cursor = 'pointer';
            const labelObj = new CSS2DObject(labelDiv);
            scene.add(labelObj);
            
            labelDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                showToast(data.name, data.desc, data.link);
                starMesh.material.emissiveIntensity = 1.0;
                glowLight.intensity = 1.1;
                setTimeout(() => {
                    starMesh.material.emissiveIntensity = 0.4;
                    glowLight.intensity = 0.5;
                }, 400);
            });
            
            bigStars.push({
                mesh: starMesh,
                label: labelObj,
                data: data,
                angle: data.angle,
                radius: data.radius,
                speed: data.speed,
                glowLight: glowLight
            });
        });
        
        // ========= 额外装饰: 螺旋星云粒子流 (提升视觉) =========
        const nebulaParticles = new THREE.BufferGeometry();
        const nebulaCount = 2500;
        const nebulaPos = [];
        for (let i = 0; i < nebulaCount; i++) {
            const r = 18 + Math.random() * 20;
            const ang = Math.random() * Math.PI * 2;
            const yOff = Math.sin(ang * 3) * 1.2 + (Math.random() - 0.5) * 1.5;
            const x = Math.cos(ang) * r;
            const z = Math.sin(ang) * r;
            nebulaPos.push(x, yOff, z);
        }
        nebulaParticles.setAttribute('position', new THREE.BufferAttribute(new Float32Array(nebulaPos), 3));
        const nebulaMatGlow = new THREE.PointsMaterial({ color: 0xcc88ff, size: 0.07, transparent: true, blending: THREE.AdditiveBlending });
        const nebulaField = new THREE.Points(nebulaParticles, nebulaMatGlow);
        scene.add(nebulaField);
        
        // ========= 背景音乐 (深邃太空氛围) =========
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.28;
        // 使用可用的太空氛围音乐链接 (pixabay开放资源)
        bgMusic.src = "https://cdn.pixabay.com/download/audio/2022/05/27/audio_1c8b2b1f0c.mp3?filename=space-ambient-112633.mp3";
        let musicStarted = false;
        let musicPlaying = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        
        function tryPlayMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicPlaying = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(e => { console.log("需用户交互"); });
            }
        }
        // 用户首次点击页面任意位置启动音乐 (体验友好)
        document.body.addEventListener('click', () => tryPlayMusic(), { once: true });
        
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) {
                tryPlayMusic();
            } else {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicPlaying = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                } else {
                    bgMusic.pause();
                    musicPlaying = false;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔇";
                }
            }
        });
        
        // 显示toast函数
        function showToast(title, desc, url) {
            let oldToast = document.getElementById('dynamicToast');
            if(oldToast) oldToast.remove();
            const toastDiv = document.createElement('div');
            toastDiv.id = 'dynamicToast';
            toastDiv.className = 'toast-message';
            toastDiv.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将打开链接`;
            document.body.appendChild(toastDiv);
            setTimeout(() => {
                if(toastDiv) toastDiv.style.opacity = '0';
                setTimeout(() => toastDiv.remove(), 500);
            }, 2000);
            if(url) {
                setTimeout(() => { window.open(url, '_blank'); }, 700);
            }
        }
        
        // 一言接口
        fetch('https://v1.hitokoto.cn')
            .then(res => res.json())
            .then(data => { document.getElementById('hitokoto-display').innerHTML = `🌠 “${data.hitokoto}” — ${data.from}`; })
            .catch(() => { document.getElementById('hitokoto-display').innerHTML = '🌀 黑洞引力，星尘不息'; });
        
        // ========= 动画循环 (大星星公转 + 黑洞周围粒子旋转) =========
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            const delta = 1/60;
            time += delta;
            
            // 大星星公转
            bigStars.forEach(star => {
                star.angle += star.speed * (delta * 60);
                if(star.angle > Math.PI * 2) star.angle -= Math.PI * 2;
                const x = Math.cos(star.angle) * star.radius;
                const z = Math.sin(star.angle) * star.radius;
                star.mesh.position.set(x, 0, z);
                star.label.position.set(x, 0.65, z);
                // 让光晕轻微变色
                if(star.glowLight && star.data) {
                    const intensity = 0.5 + Math.sin(time * 2 + star.angle) * 0.2;
                    star.glowLight.intensity = intensity;
                }
            });
            
            // 黑洞旋转特效
            accretionDisk.rotation.z += 0.008;
            innerGlowRing.rotation.y += 0.005;
            innerGlowRing.rotation.x = Math.PI / 2 + Math.sin(time * 0.8) * 0.1;
            distortionRing.rotation.z += 0.003;
            distortionRing.rotation.y += 0.002;
            haloParticles.rotation.y += 0.002;
            nebulaField.rotation.y += 0.0005;
            tinyStarsField.rotation.y -= 0.0002;
            
            // 黑洞核心脉动
            const scale = 1 + Math.sin(time * 3) * 0.01;
            blackHoleCore.scale.set(scale, scale, scale);
            
            controls.update(); // 更新相机控制
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log("%c🌀 黑洞星墟已开启 | 点击大星星探索作品集 🌀", "color: #c084fc; font-size: 14px; font-weight: bold;");
        console.log("%c✨ 每颗大星皆为一个星辰作品，所有内容皆载于其上 ✨", "color: #aa88ff");
    </script>
</body>
</html>
