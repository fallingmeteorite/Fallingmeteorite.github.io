<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星云漩涡 | 黑洞吞噬小星辰 · 作品永恒漂浮</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            color: white;
        }
        
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 14px 22px;
            z-index: 100;
            border: 1px solid rgba(200, 100, 255, 0.7);
            pointer-events: none;
            font-family: monospace;
            max-width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .info-panel h1 {
            margin: 0 0 5px;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .info-panel p { margin: 4px 0; font-size: 0.8rem; opacity: 0.9; }
        .quote { font-style: italic; font-size: 0.75rem; border-top: 1px solid rgba(200,100,255,0.4); margin-top: 8px; padding-top: 6px; }
        
        .controls-hint {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #ccc;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        
        .music-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #d4a5ff;
            cursor: pointer;
            z-index: 100;
            border: 1px solid #a855f7;
            font-family: monospace;
            transition: 0.2s;
            pointer-events: auto;
            font-weight: 500;
        }
        .music-btn:hover {
            background: #a855f7;
            color: black;
            transform: scale(1.02);
        }
        
        .star-label {
            background: radial-gradient(circle, rgba(80, 40, 140, 0.9), rgba(40, 20, 80, 0.85));
            backdrop-filter: blur(12px);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            border: 1px solid rgba(200, 120, 255, 0.6);
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: 'Segoe UI', monospace;
            box-shadow: 0 0 20px rgba(160, 80, 255, 0.3);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .star-label:hover {
            transform: scale(1.1);
            background: radial-gradient(circle, rgba(120, 70, 200, 0.95), rgba(80, 40, 140, 0.9));
            border-color: #ffaaee;
            box-shadow: 0 0 30px rgba(200, 100, 255, 0.8);
        }
        .star-label small {
            font-size: 9px;
            opacity: 0.85;
            font-weight: normal;
        }
        
        .toast-message {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(16px);
            padding: 12px 24px;
            border-radius: 50px;
            color: #e2b0ff;
            border-top: 2px solid #c084fc;
            z-index: 200;
            font-size: 0.85rem;
            text-align: center;
            white-space: nowrap;
            font-family: monospace;
            transition: opacity 0.3s;
            pointer-events: none;
            font-weight: 500;
        }
        
        @media (max-width: 700px) {
            .star-label { font-size: 10px; padding: 4px 12px; }
            .info-panel { padding: 8px 15px; max-width: 240px; font-size: 11px; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>🌀 奇点 · Fallingmeteorite</h1>
        <p>✨ 高中开发者 | 星辰造物主 ✨</p>
        <p>📡 求知若饥 · 虚心若愚</p>
        <div class="quote" id="hitokoto-display">🌠 星云旋涡，小星辰被吞噬，作品永恒漂浮...</div>
    </div>
    <div class="controls-hint">
        🖱️ 鼠标拖拽旋转视角 | 右键平移 | 滚动缩放 | ✨ 点击大星星探索作品 ✨ | 🌟 小星星会被黑洞吸入并在远处重生
    </div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊旋律 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // --- 初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020008);
        scene.fog = new THREE.FogExp2(0x020008, 0.00025);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 5, 28);
        camera.lookAt(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = false;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'auto';
        document.body.appendChild(labelRenderer.domElement);
        
        // 控制器 - 完全可拖动
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.5;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.9;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        controls.update();
        
        renderer.domElement.style.pointerEvents = 'auto';
        
        // ================= 1. 黑洞核心 =================
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(1.5, 96, 96),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.05, metalness: 0.95, emissive: 0x330033, emissiveIntensity: 0.5 })
        );
        scene.add(blackHoleCore);
        
        // 吸积盘内环
        const accretionInner = new THREE.Mesh(
            new THREE.TorusGeometry(2.0, 0.12, 64, 200),
            new THREE.MeshStandardMaterial({ color: 0xff44aa, emissive: 0xff2288, emissiveIntensity: 0.9, transparent: true })
        );
        accretionInner.rotation.x = Math.PI / 2 + 0.2;
        scene.add(accretionInner);
        
        // 吸积盘外环
        const accretionOuter = new THREE.Mesh(
            new THREE.TorusGeometry(2.8, 0.18, 80, 260),
            new THREE.MeshStandardMaterial({ color: 0xcc66ff, emissive: 0x8833cc, emissiveIntensity: 0.6, transparent: true })
        );
        accretionOuter.rotation.x = Math.PI / 2 - 0.1;
        scene.add(accretionOuter);
        
        // 黑洞光晕粒子
        const dustHaloCount = 2500;
        const dustHaloGeo = new THREE.BufferGeometry();
        const dustHaloPos = [];
        for (let i = 0; i < dustHaloCount; i++) {
            const r = 1.8 + Math.random() * 1.5;
            const angle = Math.random() * Math.PI * 2;
            const yOff = (Math.random() - 0.5) * 1.2;
            dustHaloPos.push(Math.cos(angle) * r, yOff, Math.sin(angle) * r);
        }
        dustHaloGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustHaloPos), 3));
        const dustHaloMat = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.04, blending: THREE.AdditiveBlending });
        const dustHalo = new THREE.Points(dustHaloGeo, dustHaloMat);
        scene.add(dustHalo);
        
        // 黑洞CSS标签
        const blackHoleDiv = document.createElement('div');
        blackHoleDiv.className = 'star-label';
        blackHoleDiv.innerHTML = `🌀 奇点 · Fallingmeteorite 🌀<br><small>「高中开发者 | 全栈/逆向/UE5/硬件」</small>`;
        blackHoleDiv.style.background = "rgba(0,0,0,0.85)";
        blackHoleDiv.style.border = "1px solid #ff44aa";
        blackHoleDiv.style.pointerEvents = "none";
        const blackHoleLabel = new CSS2DObject(blackHoleDiv);
        blackHoleLabel.position.set(0, 1.3, 0);
        scene.add(blackHoleLabel);
        
        // 光源
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const coreLight = new THREE.PointLight(0xaa44ff, 1.0, 30);
        coreLight.position.set(0, 0, 0);
        scene.add(coreLight);
        const fillLight = new THREE.PointLight(0x7744aa, 0.5);
        fillLight.position.set(4, 3, 5);
        scene.add(fillLight);
        
        // ================= 2. 星云粒子系统 (装饰) =================
        const nebulaParticleCount = 8000;
        const nebulaGeometry = new THREE.BufferGeometry();
        const nebulaPositions = new Float32Array(nebulaParticleCount * 3);
        const nebulaColors = new Float32Array(nebulaParticleCount * 3);
        
        for (let i = 0; i < nebulaParticleCount; i++) {
            const radius = 3.2 + Math.pow(Math.random(), 1.5) * 26;
            const angle = Math.random() * Math.PI * 2;
            const spiralOffset = radius * 0.45;
            const finalAngle = angle + spiralOffset;
            const yOffset = Math.sin(radius * 0.8) * 1.2 + (Math.random() - 0.5) * 1.5;
            const x = Math.cos(finalAngle) * radius;
            const z = Math.sin(finalAngle) * radius;
            nebulaPositions[i*3] = x;
            nebulaPositions[i*3+1] = yOffset * (1 - radius / 35);
            nebulaPositions[i*3+2] = z;
            
            const mixFactor = Math.min(1, radius / 20);
            nebulaColors[i*3] = 0.8 - mixFactor * 0.3;
            nebulaColors[i*3+1] = 0.4 + mixFactor * 0.3;
            nebulaColors[i*3+2] = 0.9 - mixFactor * 0.2;
        }
        nebulaGeometry.setAttribute('position', new THREE.BufferAttribute(nebulaPositions, 3));
        nebulaGeometry.setAttribute('color', new THREE.BufferAttribute(nebulaColors, 3));
        const nebulaMat = new THREE.PointsMaterial({ size: 0.09, vertexColors: true, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const nebulaCloud = new THREE.Points(nebulaGeometry, nebulaMat);
        scene.add(nebulaCloud);
        
        // 第二层星雾
        const starMistCount = 4000;
        const mistGeo = new THREE.BufferGeometry();
        const mistPos = new Float32Array(starMistCount * 3);
        for (let i = 0; i < starMistCount; i++) {
            const r = 12 + Math.random() * 22;
            const ang = Math.random() * Math.PI * 2;
            const spiral = r * 0.3;
            const x = Math.cos(ang + spiral) * r;
            const z = Math.sin(ang + spiral) * r;
            const y = (Math.random() - 0.5) * 2.5;
            mistPos[i*3] = x;
            mistPos[i*3+1] = y;
            mistPos[i*3+2] = z;
        }
        mistGeo.setAttribute('position', new THREE.BufferAttribute(mistPos, 3));
        const mistMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.06, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const starMist = new THREE.Points(mistGeo, mistMat);
        scene.add(starMist);
        
        // ================= 3. 大星星 (作品，不受黑洞影响，稳定漂浮) =================
        const worksData = [
            { name: "💻 星轨编译器", desc: "Python字节码分析工具 · 可视化执行流", link: "https://github.com/fallingmeteorite/star-compiler", color: 0x6c9eff, icon: "🪐" },
            { name: "🎮 流光·虚幻引擎", desc: "UE5开放世界 · 动态星空粒子系统", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0x88ddff, icon: "✨" },
            { name: "🔧 逆向星芒", desc: "软件逆向分析笔记 & CTF 实战库", link: "https://github.com/fallingmeteorite/reverse-constellation", color: 0xdd88aa, icon: "⚙️" },
            { name: "🤖 星尘·嵌入式OS", desc: "STM32微型实时系统 · 星图显示", link: "https://github.com/fallingmeteorite/stardust-rtos", color: 0x77cc88, icon: "📡" },
            { name: "📡 流星信标", desc: "全栈导航站 + 动态星空API", link: "https://github.com/fallingmeteorite/meteor-beacon", color: 0xffaa88, icon: "🌠" },
            { name: "🎨 光源AI绘画盒子", desc: "AI创意工具 · 社区生成平台", link: "https://www.bilibili.com/video/BV1YC411z7yQ", color: 0xdd99ff, icon: "🎨" },
            { name: "🌌 星尘档案馆", desc: "全部开源项目索引与开发日志", link: "https://github.com/fallingmeteorite", color: 0xccccdd, icon: "⭐" },
            { name: "🌀 黑洞边缘实验室", desc: "WebGL奇幻交互实验 & 粒子系统", link: "https://github.com/fallingmeteorite/horizon-lab", color: 0xff99cc, icon: "🌌" },
            { name: "📖 星海博客", desc: "技术随笔与星空哲思", link: "https://fallingmeteorite.github.io", color: 0xffaa77, icon: "📖" },
            { name: "🔮 幻境渲染器", desc: "实时体积光与星云渲染实验", link: "https://github.com/fallingmeteorite/nebula-render", color: 0x77aaff, icon: "🔮" }
        ];
        
        class BigStar {
            constructor(data, index) {
                this.data = data;
                // 大星星在固定轨道半径范围漂浮，不受黑洞吸引
                const radius = 9 + Math.random() * 22;
                const angle = Math.random() * Math.PI * 2;
                const spiralOffset = radius * 0.35;
                this.angle = angle + spiralOffset;
                this.radius = radius;
                this.yOffset = (Math.random() - 0.5) * 2.2;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset;
                
                // 缓慢的轨道运动速度 (不被吸入)
                this.orbitSpeed = 0.0015 + Math.random() * 0.002;
                
                const geometry = new THREE.SphereGeometry(0.32 + Math.random() * 0.12, 48, 48);
                const material = new THREE.MeshStandardMaterial({ 
                    color: data.color, 
                    emissive: data.color, 
                    emissiveIntensity: 0.65,
                    metalness: 0.4,
                    roughness: 0.2
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                
                this.glowLight = new THREE.PointLight(data.color, 0.7, 14);
                this.mesh.add(this.glowLight);
                
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc.substring(0, 28)}…</small>`;
                div.style.cursor = 'pointer';
                div.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showToast(data.name, data.desc, data.link);
                    this.mesh.material.emissiveIntensity = 1.3;
                    this.glowLight.intensity = 1.3;
                    setTimeout(() => {
                        if(this.mesh.material) this.mesh.material.emissiveIntensity = 0.65;
                        if(this.glowLight) this.glowLight.intensity = 0.7;
                    }, 400);
                });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 0.5, this.z);
                scene.add(this.label);
            }
            
            update() {
                // 大星星缓慢沿轨道运动，半径基本不变，不被黑洞吸引
                this.angle += this.orbitSpeed;
                if (this.angle > Math.PI * 2) this.angle -= Math.PI * 2;
                
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                // 轻微上下浮动
                this.y = this.yOffset + Math.sin(Date.now() * 0.001 + this.radius) * 0.1;
                
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 0.55, this.z);
                
                // 呼吸光效
                const breath = 0.55 + Math.sin(Date.now() * 0.002) * 0.2;
                this.glowLight.intensity = 0.6 + breath * 0.2;
            }
        }
        
        const bigStars = [];
        worksData.forEach((data, idx) => {
            const star = new BigStar(data, idx);
            bigStars.push(star);
        });
        
        // ================= 4. 小星星粒子 (会被黑洞吸引，吸入后在远处重生) =================
        const SMALL_STAR_COUNT = 1800;
        const MIN_RADIUS = 5;
        const MAX_RADIUS = 32;
        const ABSORB_THRESHOLD = 2.0;
        
        class SmallStar {
            constructor() {
                this.reset();
            }
            
            reset() {
                // 在星云区域随机重生
                this.radius = MIN_RADIUS + Math.random() * (MAX_RADIUS - MIN_RADIUS);
                this.angle = Math.random() * Math.PI * 2;
                // 螺旋偏移，让分布更自然
                const spiralOffset = this.radius * 0.3;
                this.angle += spiralOffset;
                this.yOffset = (Math.random() - 0.5) * 2.5;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset * (this.radius / 20);
                
                // 向黑洞坠落的速度 (随机)
                this.fallSpeed = 0.003 + Math.random() * 0.005;
                this.orbitSpeed = 0.008 + Math.random() * 0.012;
                
                // 颜色: 偏蓝白或淡紫
                const colorVal = 0x88aaff + Math.random() * 0x664466;
                const geometry = new THREE.SphereGeometry(0.12 + Math.random() * 0.08, 16, 16);
                const material = new THREE.MeshStandardMaterial({ 
                    color: colorVal, 
                    emissive: 0x8844aa, 
                    emissiveIntensity: 0.35,
                    metalness: 0.1
                });
                this.mesh = new THREE.Mesh(geometry, material);
                this.mesh.position.set(this.x, this.y, this.z);
                scene.add(this.mesh);
                
                this.active = true;
                this.absorbing = false;
            }
            
            update() {
                if (!this.active) return false;
                
                // 向黑洞坠落 - 半径减小
                this.radius -= this.fallSpeed;
                // 角速度随半径减小而加快 (螺旋吸入)
                const currentSpeed = this.orbitSpeed * (1 + (1 - Math.min(1, this.radius / 15)) * 1.2);
                this.angle += currentSpeed;
                
                // 被吸入黑洞
                if (this.radius <= ABSORB_THRESHOLD) {
                    this.absorb();
                    return false;
                }
                
                // 计算新位置
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset * (this.radius / 20) * 0.8;
                
                this.mesh.position.set(this.x, this.y, this.z);
                
                // 靠近黑洞时变亮变红
                const proximity = Math.max(0, Math.min(1, (this.radius - 2) / 10));
                const intensity = 0.3 + (1 - proximity) * 0.7;
                this.mesh.material.emissiveIntensity = 0.2 + (1 - proximity) * 0.6;
                
                if (this.radius < 5) {
                    const mix = 1 - (this.radius - 2) / 3;
                    this.mesh.material.color.setRGB(1.0, 0.4 + mix * 0.4, 0.3 + mix * 0.5);
                }
                
                return true;
            }
            
            absorb() {
                this.active = false;
                // 吸入特效
                createAbsorbEffect(this.mesh.position.clone());
                scene.remove(this.mesh);
                // 在远处重生新的小星星
                setTimeout(() => {
                    const newStar = new SmallStar();
                    smallStars.push(newStar);
                }, 50);
            }
        }
        
        function createAbsorbEffect(position) {
            const particleCount = 40;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 0.6;
                positions[i*3+1] = (Math.random() - 0.5) * 0.6;
                positions[i*3+2] = (Math.random() - 0.5) * 0.6;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.06, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(geometry, material);
            particles.position.copy(position);
            scene.add(particles);
            
            let progress = 0;
            const startPos = position.clone();
            const endPos = new THREE.Vector3(0, 0, 0);
            function animateParticle() {
                progress += 0.07;
                if (progress >= 1) {
                    scene.remove(particles);
                    return;
                }
                const t = progress;
                particles.position.lerpVectors(startPos, endPos, t);
                particles.scale.setScalar(1 - t * 0.8);
                requestAnimationFrame(animateParticle);
            }
            requestAnimationFrame(animateParticle);
        }
        
        // 创建小星星
        let smallStars = [];
        for (let i = 0; i < SMALL_STAR_COUNT; i++) {
            smallStars.push(new SmallStar());
        }
        
        // 背景星星 (静态)
        const bgStarCount = 4500;
        const bgStarsGeo = new THREE.BufferGeometry();
        const bgStarsPos = new Float32Array(bgStarCount * 3);
        for (let i = 0; i < bgStarCount; i++) {
            bgStarsPos[i*3] = (Math.random() - 0.5) * 220;
            bgStarsPos[i*3+1] = (Math.random() - 0.5) * 130;
            bgStarsPos[i*3+2] = (Math.random() - 0.5) * 150 - 80;
        }
        bgStarsGeo.setAttribute('position', new THREE.BufferAttribute(bgStarsPos, 3));
        const bgStarMat = new THREE.PointsMaterial({ color: 0xaaccff, size: 0.12, transparent: true, opacity: 0.55 });
        const bgStars = new THREE.Points(bgStarsGeo, bgStarMat);
        scene.add(bgStars);
        
        // ================= 音乐 (使用 background_music.mp3) =================
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.35;
        bgMusic.src = "background_music.mp3";
        
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        
        function startMusic() {
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(e => {
                    console.log("音乐播放需要交互，请点击页面任意位置");
                    musicBtn.innerHTML = "🎵 点击播放";
                });
            }
        }
        
        document.body.addEventListener('click', startMusic, { once: true });
        document.body.addEventListener('touchstart', startMusic, { once: true });
        
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!musicStarted) {
                bgMusic.play().then(() => {
                    musicStarted = true;
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                }).catch(err => console.log(err));
            } else {
                if (bgMusic.paused) {
                    bgMusic.play();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔊";
                } else {
                    bgMusic.pause();
                    musicBtn.innerHTML = "🎵 星渊旋律 🔇";
                }
            }
        });
        
        function showToast(title, desc, url) {
            let old = document.getElementById('dynamicToast');
            if(old) old.remove();
            const toast = document.createElement('div');
            toast.id = 'dynamicToast';
            toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将打开链接`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1800);
            setTimeout(() => toast.remove(), 2300);
            if(url) setTimeout(() => window.open(url, '_blank'), 700);
        }
        
        fetch('https://v1.hitokoto.cn')
            .then(res => res.json())
            .then(data => document.getElementById('hitokoto-display').innerHTML = `🌠 “${data.hitokoto}” — ${data.from}`)
            .catch(() => document.getElementById('hitokoto-display').innerHTML = '🌀 小星坠入奇点，作品永恒漂浮');
        
        // 动画循环
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            
            // 更新大星星 (不受黑洞影响)
            bigStars.forEach(star => star.update());
            
            // 更新小星星 (会被吸入并重生)
            for (let i = smallStars.length-1; i >= 0; i--) {
                const star = smallStars[i];
                star.update();
                if (!star.active) {
                    smallStars.splice(i, 1);
                }
            }
            
            // 星云旋转
            nebulaCloud.rotation.y += 0.0015;
            starMist.rotation.y += 0.0008;
            dustHalo.rotation.y += 0.008;
            dustHalo.rotation.x += 0.003;
            accretionInner.rotation.z += 0.012;
            accretionOuter.rotation.z -= 0.008;
            
            // 黑洞脉动
            const pulse = 1 + Math.sin(time * 3.5) * 0.015;
            blackHoleCore.scale.set(pulse, pulse, pulse);
            coreLight.intensity = 0.8 + Math.sin(time * 2.8) * 0.2;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log("%c✅ 相机控制正常 | 小星星会被黑洞吸入并在远处重生 | 大星星不受影响 ✅", "color: #88ff88; font-size: 14px");
        console.log("%c🌀 音乐文件: background_music.mp3 | 请确保文件在同目录下 🌀", "color: #c084fc");
    </script>
</body>
</html>
