<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>宇宙大爆炸 · 黑洞深渊 | fallingmeteorite</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Microsoft YaHei', sans-serif;
            background: #000;
        }
        
        /* 全屏覆盖层：动态太空粉尘 + 引爆按钮 */
        .prelude-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.5s ease;
            will-change: transform, opacity;
            transform-origin: center center;
        }
        .dust-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
        }
        .bigbang-btn-overlay {
            position: relative;
            background: radial-gradient(circle at 30% 10%, #ff7e5e, #feb47b);
            border: none;
            border-radius: 80px;
            padding: 16px 48px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 310;
            box-shadow: 0 0 35px rgba(255, 80, 40, 0.8), 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            letter-spacing: 4px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,200,100,0.9);
            font-family: monospace;
            white-space: nowrap;
            transform: scale(1);
        }
        .bigbang-btn-overlay:hover {
            transform: scale(1.03);
            box-shadow: 0 0 55px rgba(255, 100, 30, 1);
        }
        
        /* 压缩动画 */
        .compress-animation {
            transform: scale(0) translate(0, 0) !important;
            opacity: 0 !important;
            transition: transform 0.55s cubic-bezier(0.7, 0, 0.3, 1), opacity 0.45s ease !important;
        }
        
        /* UI面板 - 高亮紫色半透明 */
        .info-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(80, 40, 140, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px; padding: 14px 24px; z-index: 100;
            border: 1px solid rgba(200, 120, 255, 0.9);
            pointer-events: none; max-width: 440px;
            opacity: 0;
            transition: opacity 1.2s ease;
            box-shadow: 0 0 25px rgba(160, 80, 255, 0.4);
        }
        .info-panel h1 {
            margin: 0 0 6px;
            font-size: 1.45rem;
            background: linear-gradient(135deg, #f0b0ff, #c880ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(200, 100, 255, 0.5);
        }
        .info-panel p {
            margin: 4px 0;
            font-size: 0.82rem;
            color: #f0e6ff;
            font-weight: 500;
            text-shadow: 0 0 2px rgba(0,0,0,0.3);
        }
        .quote {
            font-style: italic;
            font-size: 0.75rem;
            border-top: 1px solid rgba(220, 150, 255, 0.7);
            margin-top: 9px;
            padding-top: 7px;
            color: #e5ccff;
        }
        
        .controls-hint {
            position: absolute; bottom: 18px; left: 18px;
            background: rgba(60, 30, 100, 0.75);
            backdrop-filter: blur(8px);
            padding: 6px 16px; border-radius: 28px;
            font-size: 12px; color: #e0c0ff; z-index: 100;
            pointer-events: none;
            font-family: monospace;
            opacity: 0;
            transition: opacity 1s ease;
            border: 1px solid rgba(200, 120, 255, 0.5);
        }
        .music-btn {
            position: absolute; bottom: 22px; right: 22px;
            background: rgba(80, 40, 140, 0.85);
            backdrop-filter: blur(12px);
            padding: 8px 20px; border-radius: 44px; font-size: 13px; font-weight: 500;
            color: #f0d0ff; cursor: pointer; z-index: 100;
            border: 1px solid #c880ff;
            transition: all 0.25s ease; letter-spacing: 1px;
            opacity: 0;
            pointer-events: none;
        }
        .music-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .music-btn:hover {
            background: #a066ff;
            color: #0a0a1a;
            transform: scale(1.02);
            box-shadow: 0 0 15px #b77eff;
        }
        
        .star-label {
            background: radial-gradient(circle, rgba(100, 50, 160, 0.92), rgba(40, 20, 90, 0.92));
            backdrop-filter: blur(10px); padding: 6px 18px; border-radius: 60px;
            font-size: 13px; font-weight: bold; white-space: nowrap;
            border: 1px solid rgba(210, 130, 255, 0.85);
            pointer-events: auto; cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: system-ui, -apple-system, sans-serif;
            box-shadow: 0 0 12px rgba(160, 80, 255, 0.3);
        }
        .star-label:hover { transform: scale(1.08); background: radial-gradient(circle, rgba(150, 90, 240, 1), rgba(90, 50, 160, 0.98)); border-color: #ffc0ff; box-shadow: 0 0 20px #c88eff; }
        .toast-message {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            padding: 12px 28px; border-radius: 60px; color: #efcdff;
            border-top: 2px solid #cc99ff; border-bottom: 1px solid #aa77ff;
            z-index: 200; font-size: 0.85rem; font-weight: 500;
            white-space: nowrap; font-family: monospace; text-align: center;
            box-shadow: 0 0 25px rgba(170, 100, 255, 0.5);
        }
        @media (max-width: 700px) {
            .star-label { font-size: 9px; padding: 4px 12px; }
            .info-panel { padding: 8px 16px; max-width: 260px; }
            .bigbang-btn-overlay { font-size: 1.2rem; padding: 12px 28px; white-space: nowrap; }
            .toast-message { font-size: 0.7rem; white-space: normal; width: 80vw; }
        }
    </style>
</head>
<body>
    <div id="preludeOverlay" class="prelude-overlay">
        <canvas id="dustCanvas" class="dust-canvas"></canvas>
        <button id="bigbangTriggerBtn" class="bigbang-btn-overlay">💥 引爆宇宙 💥</button>
    </div>
    
    <div class="info-panel" id="infoPanel">
        <h1>🌀 星渊幻境 · 大爆炸新生</h1>
        <p>✨ fallingmeteorite · 创世纪元 ✨</p>
        <div class="quote" id="hitokoto-display">⚛️ 奇点绽放，万物伊始 ⚛️</div>
    </div>
    <div class="controls-hint" id="controlsHint">🖱️ 拖拽旋转视角 | 滚动缩放 | ✨ 点击大星探索作品 ✨</div>
    <div class="music-btn" id="musicToggleBtn">🎵 星渊共振 🔇</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // ================= 1. 动态太空粉尘 Canvas =================
        const canvas = document.getElementById('dustCanvas');
        let ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        
        function initParticles() {
            particles = [];
            const particleCount = Math.min(1500, Math.floor(window.innerWidth * window.innerHeight / 3200));
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2.2 + 0.6,
                    alpha: Math.random() * 0.6 + 0.2,
                    speedX: (Math.random() - 0.5) * 0.45,
                    speedY: (Math.random() - 0.5) * 0.35,
                    color: `hsl(${Math.random() * 100 + 200}, 75%, 65%)`
                });
            }
        }
        
        function drawDust() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            grad.addColorStop(0, '#050510');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 6;
                ctx.shadowColor = 'rgba(180, 120, 255, 0.8)';
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            // 大星云光晕
            for (let i = 0; i < 60; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, Math.random() * 5 + 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 140, 255, ${Math.random() * 0.5})`;
                ctx.fill();
            }
            animationId = requestAnimationFrame(drawDust);
        }
        
        window.addEventListener('resize', () => resizeCanvas());
        resizeCanvas();
        drawDust();
        
        // ================= 2. Three.js 场景（黑洞极致震撼版）=================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010004);
        scene.fog = new THREE.FogExp2(0x010004, 0.000028);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2200);
        camera.position.set(26, 14, 42);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.body.appendChild(renderer.domElement);
        
        // 后期特效
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.45, 0.95);
        bloomPass.threshold = 0.06;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.55;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 0.9;
        controls.zoomSpeed = 1.2;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        let explosionPlayed = false;
        let allCosmicObjects = [];
        
        function addToUniverse(obj) {
            if (obj) {
                obj.visible = false;
                allCosmicObjects.push(obj);
                scene.add(obj);
            }
            return obj;
        }
        
        // ========= 3. 黑洞极致优化 =========
        // 黑洞核心（增强自发光）
        const blackHoleCore = new THREE.Mesh(
            new THREE.SphereGeometry(2.0, 256, 256),
            new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.01, metalness: 0.99, emissive: 0xcc44ff, emissiveIntensity: 2.2 })
        );
        addToUniverse(blackHoleCore);
        
        // 事件视界光晕（多层）
        const eventHorizonGlow1 = new THREE.Mesh(new THREE.SphereGeometry(2.4, 128, 128), new THREE.MeshBasicMaterial({ color: 0xff44aa, transparent: true, opacity: 0.35, blending: THREE.AdditiveBlending }));
        addToUniverse(eventHorizonGlow1);
        const eventHorizonGlow2 = new THREE.Mesh(new THREE.SphereGeometry(2.7, 128, 128), new THREE.MeshBasicMaterial({ color: 0xaa66ff, transparent: true, opacity: 0.25, blending: THREE.AdditiveBlending }));
        addToUniverse(eventHorizonGlow2);
        
        // 吸积盘（5层，更密集，颜色渐变）
        const accLayers = [];
        const accColors = [0xff44aa, 0xff66cc, 0xff88ee, 0xcc88ff, 0xaa66ff];
        const accRadii = [2.55, 3.2, 3.95, 4.8, 5.7];
        const accWidths = [0.18, 0.2, 0.22, 0.24, 0.26];
        const accIntensities = [2.2, 1.9, 1.7, 1.5, 1.3];
        for (let i = 0; i < 5; i++) {
            const torus = new THREE.Mesh(
                new THREE.TorusGeometry(accRadii[i], accWidths[i], 180, 520),
                new THREE.MeshStandardMaterial({ color: accColors[i], emissive: accColors[i], emissiveIntensity: accIntensities[i], transparent: true, side: THREE.DoubleSide })
            );
            torus.rotation.x = Math.PI / 2 + (i % 2 === 0 ? 0.18 : -0.08);
            addToUniverse(torus);
            accLayers.push(torus);
        }
        
        // 高速旋转的能量环（3层）
        const energyRings = [];
        const ringRadii = [3.1, 3.9, 4.7];
        const ringColors = [0xff66aa, 0x88aaff, 0xffaa88];
        ringRadii.forEach((rad, idx) => {
            const ring = new THREE.Mesh(new THREE.TorusGeometry(rad, 0.12, 120, 400), new THREE.MeshBasicMaterial({ color: ringColors[idx], transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending }));
            if (idx === 1) ring.rotation.x = Math.PI / 2.3;
            else if (idx === 2) ring.rotation.z = 0.7;
            else ring.rotation.x = Math.PI / 2;
            addToUniverse(ring);
            energyRings.push(ring);
        });
        
        // 引力透镜扭曲球体（模拟时空弯曲）
        const lensGeometry = new THREE.SphereGeometry(5.5, 64, 64);
        const lensMaterial = new THREE.MeshBasicMaterial({ color: 0xaa88ff, transparent: true, opacity: 0.08, wireframe: true });
        const lensSphere = new THREE.Mesh(lensGeometry, lensMaterial);
        addToUniverse(lensSphere);
        
        // 黑洞两极喷流（粒子流）
        const jetParticleCount = 1800;
        const jetGeometry = new THREE.BufferGeometry();
        const jetPositions = [];
        for (let i = 0; i < jetParticleCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() < 0.5 ? Math.random() * 0.5 : Math.PI - Math.random() * 0.5;
            const r = 2.5 + Math.random() * 8;
            const x = Math.sin(phi) * Math.cos(theta) * r;
            const z = Math.sin(phi) * Math.sin(theta) * r;
            const y = Math.cos(phi) * r;
            jetPositions.push(x, y, z);
        }
        jetGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(jetPositions), 3));
        const jetMaterial = new THREE.PointsMaterial({ color: 0xff88aa, size: 0.12, blending: THREE.AdditiveBlending, transparent: true });
        const jetParticles = new THREE.Points(jetGeometry, jetMaterial);
        addToUniverse(jetParticles);
        
        // 粒子漩涡（吸积盘内部快速旋转粒子）
        const vortexCount = 8000;
        const vortexGeo = new THREE.BufferGeometry();
        const vortexPos = [];
        for (let i = 0; i < vortexCount; i++) {
            const rad = 2.8 + Math.random() * 5.2;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 2.2;
            vortexPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
        }
        vortexGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vortexPos), 3));
        const vortexPoints = new THREE.Points(vortexGeo, new THREE.PointsMaterial({ color: 0xffaa99, size: 0.1, blending: THREE.AdditiveBlending }));
        addToUniverse(vortexPoints);
        
        // 吸入粒子流（更多粒子，动态旋转）
        const inflowCount = 7500;
        const inflowGeo = new THREE.BufferGeometry();
        const inflowPos = [];
        for (let i = 0; i < inflowCount; i++) {
            const rad = 4 + Math.random() * 14;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 5;
            inflowPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
        }
        inflowGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(inflowPos), 3));
        const inflowPoints = new THREE.Points(inflowGeo, new THREE.PointsMaterial({ color: 0xff8866, size: 0.13, blending: THREE.AdditiveBlending }));
        addToUniverse(inflowPoints);
        
        // 黑洞周围的光晕粒子云
        const haloCount = 4000;
        const haloGeo = new THREE.BufferGeometry();
        const haloPos = [];
        for (let i = 0; i < haloCount; i++) {
            const rad = 2.0 + Math.random() * 4.5;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 3;
            haloPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
        }
        haloGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(haloPos), 3));
        const haloPoints = new THREE.Points(haloGeo, new THREE.PointsMaterial({ color: 0xffaacc, size: 0.08, blending: THREE.AdditiveBlending }));
        addToUniverse(haloPoints);
        
        // 光源（增强）
        const coreLight = new THREE.PointLight(0xff44cc, 2.8, 90);
        coreLight.position.set(0, 0, 0);
        addToUniverse(coreLight);
        const fillLights = [
            new THREE.PointLight(0xaa88ff, 1.4), new THREE.PointLight(0xff77aa, 1.2)
        ];
        fillLights[0].position.set(8, 7, 9);
        fillLights[1].position.set(-6, 5, 12);
        fillLights.forEach(l => addToUniverse(l));
        const ambient = new THREE.AmbientLight(0x201530);
        scene.add(ambient);
        
        // 黑洞CSS标签
        const blackLabelDiv = document.createElement('div');
        blackLabelDiv.className = 'star-label';
        blackLabelDiv.innerHTML = `🌀 奇点深渊 · 引力奇点 🌀`;
        blackLabelDiv.style.background = "rgba(0,0,0,0.85)";
        blackLabelDiv.style.border = "2px solid #ff44aa";
        blackLabelDiv.style.fontSize = "14px";
        const blackLabel = new CSS2DObject(blackLabelDiv);
        blackLabel.position.set(0, 3.0, 0);
        addToUniverse(blackLabel);
        
        // ========= 4. 其他宇宙组件（星云、星星、螺旋支路等）保持不变，但优化数量 =========
        const BRANCH_ANGLES = [Math.PI / 4, 3 * Math.PI / 4, 5 * Math.PI / 4, 7 * Math.PI / 4];
        const BRANCH_COLORS = [0xff77bb, 0x77ffbb, 0x88aaff, 0xffaa77];
        BRANCH_ANGLES.forEach((angle, idx) => {
            const points = [];
            for (let r = 20; r > 2.0; r -= 0.18) {
                const t = (20 - r) / 18;
                const spiralAngle = angle + t * (Math.PI * 1.45);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.85) * 0.6;
                points.push(new THREE.Vector3(x, y, z));
            }
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: BRANCH_COLORS[idx], transparent: true, opacity: 0.98 });
            addToUniverse(new THREE.Line(lineGeo, lineMat));
            
            const glowTrail = [];
            for (let r = 20; r > 2.2; r -= 0.9) {
                const t = (20 - r) / 17.8;
                const spiralAngle = angle + t * (Math.PI * 1.45);
                const x = Math.cos(spiralAngle) * r;
                const z = Math.sin(spiralAngle) * r;
                const y = Math.sin(r * 0.85) * 0.58;
                glowTrail.push(new THREE.Vector3(x, y, z));
            }
            const trailPoints = new THREE.Points(new THREE.BufferGeometry().setFromPoints(glowTrail), new THREE.PointsMaterial({ color: BRANCH_COLORS[idx], size: 0.38, transparent: true, blending: THREE.AdditiveBlending }));
            addToUniverse(trailPoints);
        });
        
        // 星云粒子
        const nebulaCount = 8000;
        const nebulaGeom = new THREE.BufferGeometry();
        const nebulaPos = [];
        for (let i = 0; i < nebulaCount; i++) {
            const rad = 18 + Math.random() * 75;
            const ang = Math.random() * Math.PI * 2;
            const yoff = (Math.random() - 0.5) * 13;
            nebulaPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
        }
        nebulaGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(nebulaPos), 3));
        const nebulaPoints = new THREE.Points(nebulaGeom, new THREE.PointsMaterial({ color: 0x99aaff, size: 0.22, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending }));
        addToUniverse(nebulaPoints);
        
        // 繁星背景
        const starCount = 15000;
        const starGeom = new THREE.BufferGeometry();
        const starPos = [];
        for (let i = 0; i < starCount; i++) starPos.push((Math.random() - 0.5) * 800, (Math.random() - 0.5) * 500, (Math.random() - 0.5) * 600 - 180);
        starGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
        const starsField = new THREE.Points(starGeom, new THREE.PointsMaterial({ color: 0xcceeff, size: 0.16, transparent: true, opacity: 0.75 }));
        addToUniverse(starsField);
        
        // 大星星作品集（保持不变）
        const worksData = [
            { name: "task_scheduling", desc: "⚙️ 高级Python调度器", link: "https://github.com/fallingmeteorite/task_scheduling", color: 0x7cafff, icon: "✨" },
            { name: "BilBil 主页", desc: "🎬 创意空间", link: "https://space.bilibili.com/1484690146", color: 0x99eeff, icon: "📺" },

        function createStarShape(color, sz = 0.52) {
            const geom = new THREE.IcosahedronGeometry(sz, 0);
            const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 1.1, metalness: 0.3, roughness: 0.2 });
            return new THREE.Mesh(geom, mat);
        }
        
        class BigStar {
            constructor(data) {
                this.data = data;
                const radius = 22 + Math.random() * 30;
                const angle = Math.random() * Math.PI * 2;
                this.radius = radius;
                this.angle = angle;
                this.yOffset = (Math.random() - 0.5) * 3.8;
                this.speed = 0.00022 + Math.random() * 0.00065;
                this.x = Math.cos(angle) * radius;
                this.z = Math.sin(angle) * radius;
                this.y = this.yOffset;
                this.mesh = createStarShape(data.color, 0.52);
                this.mesh.position.set(this.x, this.y, this.z);
                addToUniverse(this.mesh);
                this.glow = new THREE.PointLight(data.color, 1.1, 28);
                this.mesh.add(this.glow);
                const div = document.createElement('div');
                div.className = 'star-label';
                div.innerHTML = `${data.icon} ${data.name}<br><small>${data.desc}</small>`;
                div.addEventListener('click', (e) => { e.stopPropagation(); showToast(data.name, data.desc, data.link); });
                this.label = new CSS2DObject(div);
                this.label.position.set(this.x, this.y + 1.0, this.z);
                addToUniverse(this.label);
            }
            update(t) {
                if (!this.mesh.visible) return;
                this.angle += this.speed;
                this.x = Math.cos(this.angle) * this.radius;
                this.z = Math.sin(this.angle) * this.radius;
                this.y = this.yOffset + Math.sin(t * 0.0007) * 0.22;
                this.mesh.position.set(this.x, this.y, this.z);
                this.label.position.set(this.x, this.y + 1.05, this.z);
                this.mesh.rotation.y += 0.0045;
                this.glow.intensity = 1.0 + Math.sin(t * 0.0025) * 0.5;
            }
        }
        const bigStars = worksData.map(d => new BigStar(d));
        
        // 小型星星（引力坠落）
        const STAR_TOTAL = 3800;
        const ATTRACT_RADIUS = 18.8;
        const GRAVITY = 0.00125;
        
        class SmallStar {
            constructor(type, customRad = null) {
                this.type = type;
                this.gravity = (type !== 'orbit-only');
                this.rad = customRad !== null ? customRad : (this.gravity ? 25 + Math.random() * 29 : 31 + Math.random() * 33);
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.0005 + Math.random() * 0.0019;
                this.yOff = (Math.random() - 0.5) * 3.5;
                this.x = Math.cos(this.angle) * this.rad;
                this.z = Math.sin(this.angle) * this.rad;
                this.y = this.yOff + Math.sin(this.angle * 2) * 0.45;
                this.state = 'orbit';
                this.targetBranch = 0;
                this.spiral = 0;
                this.spiralStartAng = 0;
                this.spiralStartRad = 0;
                const hue = this.gravity ? 0.01 + Math.random() * 0.16 : 0.53 + Math.random() * 0.32;
                const baseCol = new THREE.Color().setHSL(hue, 0.95, 0.68);
                const geom = new THREE.IcosahedronGeometry(0.15 + Math.random() * 0.11, 0);
                const mat = new THREE.MeshStandardMaterial({ color: baseCol, emissive: this.gravity ? 0xff6644 : 0x5599ff, emissiveIntensity: this.gravity ? 0.95 : 0.7, metalness: 0.2 });
                this.mesh = new THREE.Mesh(geom, mat);
                this.mesh.position.set(this.x, this.y, this.z);
                addToUniverse(this.mesh);
                this.active = true;
                this.baseColor = baseCol.clone();
                this.phase = Math.random() * Math.PI * 2;
                this.rotSpeed = 0.01 + Math.random() * 0.035;
            }
            updateOrbit() {
                if (this.gravity && this.state === 'orbit') {
                    this.rad -= GRAVITY;
                    if (this.rad <= ATTRACT_RADIUS) { this.startFall(); return true; }
                    if (this.rad < 28) this.speed = 0.0020 + (30 - this.rad) * 0.0003;
                }
                this.angle += this.speed;
                this.x = Math.cos(this.angle) * this.rad;
                this.z = Math.sin(this.angle) * this.rad;
                this.y = this.yOff + Math.sin(this.angle * 2) * 0.42;
                this.mesh.position.set(this.x, this.y, this.z);
                if (this.gravity && this.rad < 30) {
                    const intens = 1.0 + (32 - this.rad) * 0.12;
                    this.mesh.material.emissiveIntensity = Math.min(2.5, intens);
                } else this.mesh.material.emissiveIntensity = this.gravity ? 0.95 : 0.7;
                return true;
            }
            startFall() {
                this.state = 'fall';
                const curAng = Math.atan2(this.z, this.x);
                let best = 0, minD = Math.PI;
                for (let i = 0; i < BRANCH_ANGLES.length; i++) {
                    let d = Math.abs(curAng - BRANCH_ANGLES[i]);
                    d = Math.min(d, Math.PI * 2 - d);
                    if (d < minD) { minD = d; best = i; }
                }
                this.targetBranch = best;
                this.spiralStartAng = curAng;
                this.spiralStartRad = Math.sqrt(this.x*this.x + this.z*this.z);
                this.spiral = 0;
            }
            updateFall() {
                let delta = 0.028;
                if (this.spiral > 0.45) delta = 0.045;
                if (this.spiral > 0.8) delta = 0.072;
                this.spiral += delta;
                if (this.spiral >= 1.0) { this.destroy(); return false; }
                const rad = this.spiralStartRad * (1 - this.spiral) + 2.5 * this.spiral;
                const branchAng = BRANCH_ANGLES[this.targetBranch];
                let angDiff = (branchAng + Math.PI / 2.15) - this.spiralStartAng;
                while (angDiff > Math.PI) angDiff -= Math.PI*2;
                while (angDiff < -Math.PI) angDiff += Math.PI*2;
                let spiralAng = this.spiralStartAng + angDiff * this.spiral;
                spiralAng += Math.sin(this.spiral * Math.PI * 3.0) * 0.32;
                let x = Math.cos(spiralAng) * rad;
                let z = Math.sin(spiralAng) * rad;
                const sway = Math.sin(this.spiral * Math.PI * 4.8 + this.phase) * 0.24;
                x += -Math.sin(spiralAng) * sway;
                z += Math.cos(spiralAng) * sway;
                const y = Math.sin(this.spiral * Math.PI) * 0.7 * (1 - this.spiral * 0.65);
                this.mesh.position.set(x, y, z);
                const heat = Math.max(0.5, 1 - (rad-2)/14);
                this.mesh.material.emissiveIntensity = 1.5 + (1 - heat) * 2.8;
                if (rad < 5.8) this.mesh.material.color.setRGB(1.0, 0.4, 0.25);
                else this.mesh.material.color = this.baseColor;
                return true;
            }
            update() {
                if (!this.active) return false;
                this.mesh.rotation.x += this.rotSpeed;
                this.mesh.rotation.y += this.rotSpeed * 0.9;
                if (this.state === 'orbit') return this.updateOrbit();
                else return this.updateFall();
            }
            destroy() {
                this.active = false;
                scene.remove(this.mesh);
                if (this.gravity && this.mesh.visible) {
                    setTimeout(() => { smallStars.push(new SmallStar('falling', 34 + Math.random() * 25)); }, 45);
                }
            }
        }
        
        let smallStars = [];
        for (let i = 0; i < STAR_TOTAL; i++) {
            const type = Math.random() < 0.72 ? 'falling' : 'orbit-only';
            smallStars.push(new SmallStar(type));
        }
        for (let i = 0; i < 220; i++) smallStars.push(new SmallStar('falling', 16.5 + Math.random() * 6.5));
        
        // 流星雨
        class Meteor {
            constructor() { this.active = true; this.reset(); }
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const startRad = 52 + Math.random() * 35;
                this.sx = Math.cos(angle) * startRad;
                this.sz = Math.sin(angle) * startRad;
                this.sy = (Math.random() - 0.5) * 18;
                const tAngle = angle + (Math.random() - 0.5) * 2.0;
                this.ex = Math.cos(tAngle) * 5.0;
                this.ez = Math.sin(tAngle) * 5.0;
                this.ey = (Math.random() - 0.5) * 7;
                this.prog = 0;
                this.speed = 0.008 + Math.random() * 0.014;
                this.color = new THREE.Color().setHSL(0.04 + Math.random() * 0.22, 1.0, 0.72);
                this.geom = new THREE.BufferGeometry();
                this.obj = new THREE.Points(this.geom, new THREE.PointsMaterial({ color: this.color, size: 0.32, blending: THREE.AdditiveBlending }));
                scene.add(this.obj);
                if (!explosionPlayed) this.obj.visible = false;
                else this.obj.visible = true;
            }
            update() {
                if (!this.active) return false;
                this.prog += this.speed;
                if (this.prog >= 1) { scene.remove(this.obj); return false; }
                const t = this.prog;
                const x = this.sx * (1 - t) + this.ex * t;
                const z = this.sz * (1 - t) + this.ez * t;
                const y = this.sy * (1 - t) + this.ey * t;
                const trail = [];
                for (let i = 0; i <= 18; i++) {
                    const pt = Math.max(0, t - i * 0.016);
                    if (pt >= 0) {
                        const tx = this.sx * (1 - pt) + this.ex * pt;
                        const tz = this.sz * (1 - pt) + this.ez * pt;
                        const ty = this.sy * (1 - pt) + this.ey * pt;
                        trail.push(tx, ty, tz);
                    }
                }
                if (this.obj.geometry) this.obj.geometry.dispose();
                const newGeom = new THREE.BufferGeometry();
                newGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(trail), 3));
                this.obj.geometry = newGeom;
                return true;
            }
        }
        let meteors = [];
        function spawnMeteor() { if (explosionPlayed && meteors.length < 18 && Math.random() < 0.035) meteors.push(new Meteor()); }
        
        // ========= 爆炸特效（保持原样）=========
        function createShockwave(color, size, duration) {
            const ringGeo = new THREE.RingGeometry(0.5, 1.2, 48);
            const ringMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.9, side: THREE.DoubleSide, blending: THREE.AdditiveBlending });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.set(0, 0, 0);
            scene.add(ring);
            let scale = 1;
            function expand() {
                scale += 0.22;
                ring.scale.set(scale, scale, 1);
                ring.material.opacity = 0.9 - (scale - 1) * 0.04;
                if (scale < size) requestAnimationFrame(expand);
                else scene.remove(ring);
            }
            requestAnimationFrame(expand);
        }
        
        function screenShake(intensity, duration) {
            let originalPos = camera.position.clone();
            let count = 0;
            function shake() {
                if (count >= duration) {
                    camera.position.copy(originalPos);
                    return;
                }
                camera.position.x = originalPos.x + (Math.random() - 0.5) * intensity;
                camera.position.y = originalPos.y + (Math.random() - 0.5) * intensity;
                intensity *= 0.92;
                count++;
                requestAnimationFrame(shake);
            }
            shake();
        }
        
        function createBigBang() {
            const layers = [
                { count: 3500, color: 0xffaa66, size: 0.42, scaleSpeed: 0.7 },
                { count: 2500, color: 0xff6644, size: 0.38, scaleSpeed: 0.65 },
                { count: 1800, color: 0xff2288, size: 0.34, scaleSpeed: 0.6 }
            ];
            const particlesList = [];
            layers.forEach(layer => {
                const geom = new THREE.BufferGeometry();
                const pos = new Float32Array(layer.count * 3);
                for (let i = 0; i < layer.count; i++) {
                    pos[i*3] = (Math.random() - 0.5) * 3.2;
                    pos[i*3+1] = (Math.random() - 0.5) * 3.2;
                    pos[i*3+2] = (Math.random() - 0.5) * 3.2;
                }
                geom.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const mat = new THREE.PointsMaterial({ color: layer.color, size: layer.size, blending: THREE.AdditiveBlending });
                const pts = new THREE.Points(geom, mat);
                scene.add(pts);
                particlesList.push({ obj: pts, mat: mat, scaleSpeed: layer.scaleSpeed });
            });
            
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = '#fff';
            flash.style.zIndex = '350';
            flash.style.opacity = '1';
            flash.style.pointerEvents = 'none';
            flash.style.transition = 'opacity 0.4s ease';
            document.body.appendChild(flash);
            setTimeout(() => flash.style.opacity = '0', 150);
            setTimeout(() => flash.remove(), 700);
            
            const colorFlash = document.createElement('div');
            colorFlash.style.position = 'fixed';
            colorFlash.style.top = '0';
            colorFlash.style.left = '0';
            colorFlash.style.width = '100%';
            colorFlash.style.height = '100%';
            colorFlash.style.backgroundColor = '#ff44aa';
            colorFlash.style.zIndex = '349';
            colorFlash.style.opacity = '0.6';
            colorFlash.style.pointerEvents = 'none';
            colorFlash.style.transition = 'opacity 0.2s ease';
            document.body.appendChild(colorFlash);
            setTimeout(() => colorFlash.style.opacity = '0', 100);
            setTimeout(() => colorFlash.remove(), 500);
            
            for (let i = 0; i < 5; i++) {
                setTimeout(() => createShockwave(0xffaa66, 18 + i * 2, 40), i * 70);
                setTimeout(() => createShockwave(0xff44aa, 14 + i * 2, 35), i * 90);
            }
            screenShake(0.45, 35);
            
            let frame = 0;
            function boomAnim() {
                frame++;
                const alpha = Math.max(0, 1 - frame / 48);
                particlesList.forEach(p => {
                    p.mat.opacity = alpha * 0.95;
                    p.obj.scale.setScalar(1 + frame * p.scaleSpeed);
                });
                if (frame > 55) {
                    particlesList.forEach(p => scene.remove(p.obj));
                    return;
                }
                requestAnimationFrame(boomAnim);
            }
            requestAnimationFrame(boomAnim);
            
            const burstCount = 1200;
            const burstGeom = new THREE.BufferGeometry();
            const burstPos = [];
            for (let i = 0; i < burstCount; i++) {
                const rad = 2 + Math.random() * 4;
                const ang = Math.random() * Math.PI * 2;
                const yoff = (Math.random() - 0.5) * 3;
                burstPos.push(Math.cos(ang) * rad, yoff, Math.sin(ang) * rad);
            }
            burstGeom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(burstPos), 3));
            const burstMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.22, blending: THREE.AdditiveBlending });
            const burstPoints = new THREE.Points(burstGeom, burstMat);
            scene.add(burstPoints);
            let burstFrame = 0;
            function burstAnim() {
                burstFrame++;
                burstPoints.scale.setScalar(1 + burstFrame * 0.35);
                burstMat.opacity = Math.max(0, 1 - burstFrame / 35);
                if (burstFrame > 40) scene.remove(burstPoints);
                else requestAnimationFrame(burstAnim);
            }
            requestAnimationFrame(burstAnim);
            
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 55;
                gain.gain.value = 0.85;
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.8);
                osc.stop(now + 1.8);
                
                const sub = audioCtx.createOscillator();
                const subGain = audioCtx.createGain();
                sub.connect(subGain);
                subGain.connect(audioCtx.destination);
                sub.frequency.value = 30;
                subGain.gain.value = 0.65;
                sub.start();
                subGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
                sub.stop(now + 1.5);
            } catch(e) {}
        }
        
        function revealUniverse() {
            allCosmicObjects.forEach(obj => { if (obj) obj.visible = true; });
            explosionPlayed = true;
            document.getElementById('infoPanel').style.opacity = '1';
            document.getElementById('controlsHint').style.opacity = '1';
            document.getElementById('musicToggleBtn').classList.add('visible');

            setInterval(() => spawnMeteor(), 650);

        function startCompressionAndBang() {
            const overlay = document.getElementById('preludeOverlay');
            const btn = document.getElementById('bigbangTriggerBtn');
            if (!overlay) return;
            overlay.classList.add('compress-animation');
            btn.style.transform = 'scale(0)';
            btn.style.opacity = '0';
            setTimeout(() => {
                if (overlay.parentNode) overlay.remove();
                if (animationId) cancelAnimationFrame(animationId);
                createBigBang();
                revealUniverse();
            }, 580);
        }
        
        document.getElementById('bigbangTriggerBtn').addEventListener('click', startCompressionAndBang);
        
        const bgMusic = new Audio();
        bgMusic.loop = true;
        bgMusic.volume = 0.3;
        bgMusic.src = "background_music.mp3";
        let musicStarted = false;
        const musicBtn = document.getElementById('musicToggleBtn');
        function startMusic() { if (!musicStarted && bgMusic) { bgMusic.play().then(() => { musicStarted = true; musicBtn.innerHTML = "🎵 星渊共振 🔊"; }).catch(()=>{}); } }
        musicBtn.addEventListener('click', (e) => {

        function showToast(title, desc, url) {
            const toast = document.createElement('div'); toast.className = 'toast-message';
            toast.innerHTML = `✨ ${title} ✨<br>📖 ${desc}<br>🔗 即将跳转`;
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '0', 1700);
            setTimeout(() => toast.remove(), 2200);
            if (url) setTimeout(() => window.open(url, '_blank'), 650);
        }
        fetch('https://v1.hitokoto.cn').then(res => res.json()).then(data => document.getElementById('hitokoto-display').innerHTML = `🌌 “${data.hitokoto}” — ${data.from}`).catch(() => {});
        
        // 动画循环
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 16;
            bigStars.forEach(s => s.update(time));
            for (let i = smallStars.length-1; i >= 0; i--) if (!smallStars[i].update()) smallStars.splice(i,1);
            for (let i = meteors.length-1; i >= 0; i--) if (!meteors[i].update()) meteors.splice(i,1);
            
            if (explosionPlayed) {
                // 黑洞动态效果
                nebulaPoints.rotation.y += 0.00028;
                vortexPoints.rotation.y -= 0.007;
                inflowPoints.rotation.y -= 0.006;
                haloPoints.rotation.y += 0.005;
                jetParticles.rotation.y += 0.003;
                jetParticles.rotation.x = Math.sin(time * 0.001) * 0.2;
                
                // 吸积盘高速旋转
                accLayers.forEach((a, i) => {
                    a.rotation.z += i === 0 ? 0.022 : (i === 1 ? -0.018 : (i === 2 ? 0.015 : (i === 3 ? -0.012 : 0.01)));
                });
                energyRings.forEach((r, idx) => {
                    r.rotation.z += 0.012;
                    if (idx === 1) r.rotation.x += 0.004;
                });
                lensSphere.rotation.y += 0.0005;
                lensSphere.rotation.x += 0.0003;
                
                const pulse = 1 + Math.sin(time * 0.005) * 0.025;
                blackHoleCore.scale.set(pulse, pulse, pulse);
                eventHorizonGlow1.scale.setScalar(1 + Math.sin(time * 0.006) * 0.05);
                eventHorizonGlow2.scale.setScalar(1 + Math.sin(time * 0.004) * 0.04);
                coreLight.intensity = 1.9 + Math.sin(time * 0.0045) * 0.8;
            }
            controls.update();
            effectComposer.render();
            labelRenderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            resizeCanvas();
        });
